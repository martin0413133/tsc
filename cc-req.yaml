      const int *_Borrow r = &_Const x;\nint *_Borrow mr = &_Mut y;\nfree((void *_Owned)p);\n\
      ```\n\n### Wrong — causes compilation error: \"unknown type name '_Owned'\"\n\
      \n```c\n_Owned char* msg = malloc(14);     // WRONG — _Owned is not a type\n\
