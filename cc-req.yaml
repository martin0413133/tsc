    text: "Base directory for this skill: /home/user/project/bsc_str_lib-master/.claude/skills/bsc-design\n\
      \n# BiSheng C Design Skill\n\nBSC is not just \"C with annotations\" — the ownership\
      \ system changes how APIs are shaped.\nThis skill covers design decisions you\
      \ face when **starting from a blank file**, not when\nporting existing C.\n\n\
      ## 1. Rules of Thumb (read this first)\n\nEight rules to consult when designing\
      \ any BSC API. If you only remember one thing,\nremember **Rule 2**.\n\n###\
      \ Rule 1 — Return values, borrow arguments\nReturn `_Owned` by value; take `_Borrow`\
      \ as arguments. Only take `_Owned` arguments when\nthe function truly **consumes**\
      \ (moves) the value (e.g. `Vec::push`, `set_string`).\n\n```c\n// GOOD: caller\
      \ keeps ownership, function borrows\n_Safe String format_greeting(const String*\
      \ _Borrow name);\n\n// BAD: caller must move a value it probably still wants\n\
      _Safe String format_greeting(String name);\n```\n\n### Rule 2 — Make the `_Unsafe`\
      \ surface as small as possible\nDon't mark whole functions `_Unsafe` just because\
      \ one line needs it. Wrap the minimum\nwith `_Unsafe { ... }` and keep the function's\
      \ interface `_Safe`. An `_Unsafe` interface\nis **contagious** — every caller\
      \ pays the cost.\n\n```c\n/* GOOD: interface _Safe, only the libc call is _Unsafe\
      \ */\n_Safe size_t strlen_via_libc(const char *_Borrow _ArrayElem s) {\n   \
      \ size_t n = 0;\n    _Unsafe { n = strlen(s); }\n    return n;\n}\n\n/* BAD:\
      \ whole function is _Unsafe for one line's sake */\n_Unsafe size_t strlen_via_libc(const\
      \ char *s) {\n    return strlen(s);\n}\n```\n\n### Rule 3 — Choose `T` vs `T\
      \ *_Owned` deliberately\n\nThis is a real design decision, not a default. Both\
      \ are valid; pick based on the type's\nsize, lifetime, and use sites.\n\n**Return\
      \ `struct T` (by value) when:**\n- The type is **small to medium** (~< few hundred\
      \ bytes) — moves are cheap.\n- The caller will use it locally and let `name_free`\
      \ consume it at scope exit.\n- You want zero-allocation construction.\n\n```c\n\
      _Safe struct String str_new(void);                       /* small, local use\
      \ */\n```\n\n**Return `T *_Owned` (raw owned pointer) when:**\n- The type is\
      \ **large** — pointer-move is `O(1)`, value-move copies bytes.\n- The result\
      \ must be **nullable** explicitly without an INVALID-sentinel.\n- The caller's\
      \ lifetime model needs an explicit pointer hand-off.\n\nFor most types in this\
      \ subset, value-return + INVALID-sentinel (see `bsc-invalid-sentinel`) covers\n\
      the nullability need and avoids an extra indirection.\n\n### Rule 4 — Many `_Const`\
      \ readers OR one `_Mut` writer (never both)\n\n`_Const` borrows compose: any\
      \ number of immutable borrows can coexist on the same value.\nWhat the checker\
      \ forbids is **overlapping a `_Mut` with anything else** — another `_Mut`,\n\
      or any `_Const`.\n\n```c\n// FINE: many readers, no writer\nconst T* _Borrow\
      \ r1 = &_Const x;\nconst T* _Borrow r2 = &_Const x;\nconst T* _Borrow r3 = &_Const\
      \ x;\nread(r1); read(r2); read(r3);   // all OK\n\n// BAD: writer overlaps reader\n\
      const T* _Borrow r = &_Const x;\nT* _Borrow w = &_Mut x;          // error:\
      \ r is still live\nmodify(w);\n\n// BAD: two writers overlap\nT* _Borrow w1\
      \ = &_Mut x;\nT* _Borrow w2 = &_Mut x;          // error: w1 is still live\n\
      ```\n\n**Design implication:** if your API needs multiple readers, take `const\
      \ T* _Borrow` and\npass freely. If it needs to mutate, take `T* _Borrow` (mut)\
      \ and ensure no other borrow is\nlive during the call. If you find yourself\
      \ wanting overlapping `_Mut` borrows, the design\nis wrong — restructure.\n\n\
      ```c\n// COMMON DESIGN ERROR: tries to mut-borrow `val` twice\nJSON_Object*\
      \ _Borrow obj = val.get_object();   // mut borrow #1\nval.validate(&_Mut schema);\
      \                     // mut borrow #2 — conflicts\n\n// FIX: scope the first\
      \ borrow tightly\n{\n    JSON_Object* _Borrow obj = val.get_object();\n    obj->set_string(...);\n\
      }   // borrow #1 ends here\nval.validate(&_Mut schema);   // now OK\n```\n\n\
      ### Rule 5 — By-value destructor pattern\nFor every plain struct that holds\
      \ one or more `T *_Owned _ArrayElem` fields,\nwrite a destructor function that\
      \ takes the struct by value and consumes each\n`_Owned` field via the project's\
      \ `safe_free_*` wrapper.\n\n```c\nstruct String {\n    char *_Owned _ArrayElem\
      \ _Nullable data;\n    size_t len;\n    size_t cap;\n};\n\n_Safe void str_free(struct\
      \ String s) {\n    safe_free_chars(s.data);   /* consumes s.data; s falls out\
      \ cleanly */\n}\n```\n\nThe destructor must be called explicitly on every code\
      \ path — there is no\nauto-call at scope end.\n\n### Rule 6 — Free functions\
      \ only\nEvery operation is a free function taking either `struct T *_Borrow\
      \ s` (read/mutate)\nor `struct T s` (consume/destroy). No method-like organisation\
      \ exists at the\nlanguage level; pick clear `name_op` prefixes (`str_push`,\
      \ `str_find`, `str_free`)\nso call sites read naturally.\n\n```c\n_Safe size_t\
      \ str_len(const struct String *_Borrow s);\n_Safe void   str_push(struct String\
      \ *_Borrow s, char c);\n_Safe void   str_free(struct String s);\n```\n\n###\
      \ Rule 7 — Pick the unsafe seam deliberately\nEvery BSC library has at least\
      \ one `_Unsafe` seam. Place it at the **boundary** where\nBSC's model doesn't\
      \ match reality:\n\n- **FFI / system calls** (`fopen`, `read`, pointer arithmetic\
      \ on buffers)\n- **Raw allocator wrappers** (`calloc`/`free` + `__take_array_from_raw`\
      \ /\n  `__move_array_to_raw` inside one `_Unsafe` block per element type)\n\
      - **Performance-critical hot paths** (where the checker would force unnecessary\
      \ clones)\n\nLookups that may miss are **not** a seam — return `T *_Borrow _Nullable`\
      \ (compile-time\nnullability tracking keeps the call site `_Safe`). See Rule\
      \ 8.\n\nNever put the seam in the middle of business logic.\n\n### Rule 8 —\
      \ Prefer `_Nonnull`; reach for `_Nullable` only when \"absent\" is real\n\n\
      `_Owned` and `_Borrow` default to `_Nonnull`. Keep them that way unless the\
      \ API genuinely\nhas a no-result/optional/absent case to represent. `_Nullable`\
      \ forces every use site to\nnull-check before deref — choosing it when the pointer\
      \ is never actually null just adds\ncaller burden for no benefit.\n\n**Keep\
      \ default `_Nonnull`** when:\n- The parameter is required (no \"absent input\"\
      \ case)\n- The return is always produced when the function returns successfully\n\
      - The struct field is always populated after construction\n\n**Reach for `_Nullable`**\
      \ when:\n- Allocation may fail and you surface that: `T *_Owned _Nullable try_alloc(size_t)`\n\
      - Cleanup paths hold a pointer that may not have been set: `Node *_Owned _Nullable\
      \ item = nullptr;`\n- A struct field is legitimately optional\n- A setter accepts\
      \ \"clear\" as a valid input: `void set_cache(Cache *_Owned _Nullable c)`\n\n\
      ```c\n// GOOD — Nonnull by default; caller doesn't null-check\n_Safe void render(const\
      \ Canvas *_Borrow c, const Frame *_Borrow f);\n\n// GOOD — allocation may fail,\
      \ nullable surfaces it\n_Safe Buffer *_Owned _Nullable try_create_buffer(size_t\
      \ n);\n\n// BAD — declared _Nullable out of caution; callers null-check for\
      \ no reason\n_Safe void render(const Canvas *_Borrow _Nullable c, const Frame\
      \ *_Borrow _Nullable f);\n```\n\nChanging a pointer's nullability (Nonnull ↔\
      \ Nullable) on an existing API is a **breaking\nchange** — every caller's null-check\
      \ assumption shifts. Decide at design time, not patch time.\n\n> For compile-time\
      \ nullability tracking mechanics and null-check patterns, see `bsc-nullability`\
      \ Skill.\n\n### Rule 9 — Concentrate all `_Unsafe` into named semantic helpers;\
      \ public API is zero-`_Unsafe`\n\nRule 2 applies to individual functions. At\
      \ the **module level**, apply it one\nlevel up: collect every raw memory operation\
      \ into a dedicated `static _Safe`\nhelper, each containing exactly one `_Unsafe`\
      \ block for one semantic operation\n(raw view, raw copy, raw compare, free-through-borrow,\
      \ etc.). Every public\nfunction is then composed entirely from these helpers\
      \ with no `_Unsafe` of its\nown.\n\nPer-byte read/write through a `*_Borrow`\
      \ does NOT need a helper at all — the\n`_Owned _ArrayElem` subscript `s->data[i]`\
      \ works directly in `_Safe` code (see\n`bsc-ownership` §8). Helpers are only\
      \ needed for operations that touch raw\nmemory in ways the safe zone forbids\
      \ (memcpy/memcmp/memmove, `free` of the\nunderlying buffer, raw pointer arithmetic).\n\
      \nThe cleanest layering uses a two-tier split:\n\n- **Bottom tier** (`bsc_str_safe.cbs`):\
      \ wrappers over `<string.h>` / `<stdlib.h>`\n  that take `char *_Borrow _ArrayElem`\
      \ parameters and contain one minimal\n  `_Unsafe` each. They are independent\
      \ of any particular struct.\n- **Top tier** (`bsc_str.cbs`): `static _Safe`\
      \ helpers that hand-off to the\n  bottom tier via `&_Mut s->data[offset]` /\
      \ `&_Const s->data[offset]`. **Embed\n  the offset in the subscript at the borrow\
      \ site** so the wrapper doesn't need\n  an explicit offset argument.\n\n```c\n\
      /* bottom tier — takes a borrow at the exact location, no offset param needed\
      \ */\n_Safe void safe_memcpy_into(char *_Borrow _ArrayElem dst, const char *src,\
      \ size_t n) {\n    _Unsafe { char *raw = (char *)&_Mut *dst; memcpy(raw, src,\
      \ n); }\n}\n_Safe int safe_memcmp_arr(const char *_Borrow _ArrayElem a,\n  \
      \                        const char *_Borrow _ArrayElem b, size_t n) {\n   \
      \ int r;\n    _Unsafe {\n        const char *ra = (const char *)&_Const *a;\n\
      \        const char *rb = (const char *)&_Const *b;\n        r = memcmp(ra,\
      \ rb, n);\n    }\n    return r;\n}\n/* exception — memmove inside one buffer\
      \ takes one borrow + two offsets,\n * because the borrow checker rejects two\
      \ simultaneous &_Mut into the same buffer */\n_Safe void safe_memmove_within(char\
      \ *_Borrow _ArrayElem buf,\n                               size_t dst_off, size_t\
      \ src_off, size_t n) {\n    _Unsafe { char *raw = (char *)&_Mut *buf; memmove(raw\
      \ + dst_off, raw + src_off, n); }\n}\n\n/* top tier — zero _Unsafe; offset goes\
      \ into the subscript */\nstatic _Safe void str__write_raw(struct String *_Borrow\
      \ s, size_t offset,\n                                 const char *src, size_t\
      \ n) {\n    safe_memcpy_into(&_Mut s->data[offset], src, n);\n}\nstatic _Safe\
      \ int str__cmpn(const struct String *_Borrow a,\n                          \
      \ const struct String *_Borrow b, size_t n) {\n    return safe_memcmp_arr(&_Const\
      \ a->data[0], &_Const b->data[0], n);\n}\n\n/* public API — zero _Unsafe; subscript\
      \ reads/writes are inlined */\n_Safe void str_to_upper(struct String *_Borrow\
      \ s) {\n    for (size_t i = 0; i < s->len; i++) {\n        char c = s->data[i];\
      \                                   /* direct subscript */\n        if (c >=\
      \ 'a' && c <= 'z') s->data[i] = (char)(c - 'a' + 'A');\n    }\n}\n```\n\nBenefits\
      \ of this factoring:\n\n- **Auditability**: the full `_Unsafe` surface of the\
      \ module is the list of\n  helpers. An auditor can read ~8 short functions and\
      \ cover all unsafe code.\n- **Testability**: each helper has one responsibility\
      \ and can be exercised\n  through the public API that calls it.\n- **Composition\
      \ safety**: public functions are fully `_Safe` — they can be\n  called from\
      \ any safe context, and their callers do not become `_Unsafe` just\n  because\
      \ the implementation touches raw memory.\n- **Easy extension**: adding a new\
      \ public function means writing safe code only;\n  the set of raw operations\
      \ is already enumerated.\n\n---\n\n## 2. Designing Types\n\n### Choose the type\
      \ shape\n\n| Your type has... | Use |\n|---|---|\n| Plain data (no heap pointers,\
      \ no cleanup) | Plain `struct` with scalar fields only |\n| One heap buffer\
      \ of a single element type, supports `[]` | Plain `struct` with `T *_Owned _ArrayElem\
      \ _Nullable` field (see `bsc-ownership` §7.5) + `name_free` consumer |\n| Multiple\
      \ heap buffers | Plain struct with several `T *_Owned _ArrayElem` fields; the\
      \ `name_free` consumer must release each |\n| A closed set of variants | Plain\
      \ `struct` with a tag enum + one field per variant (all variants always initialised;\
      \ destructor frees them all). |\n| **Large inline data** (≥ a few hundred bytes\
      \ of inline fields/arrays) | Heap-box the whole struct — see \"Large structs\"\
      \ below |\n\n### Large structs — heap-box rather than by-value\n\nThe by-value\
      \ handle pattern is designed for **small handle structs** (typically\n3–6 scalar/pointer\
      \ fields, ~24–64 bytes total). The `_Owned _ArrayElem` buffer\nlives on the\
      \ heap; the handle just carries a pointer and some bookkeeping, so\nby-value\
      \ passing and `name_free` consumption are cheap. clang's RVO/NRVO\nusually collapses\
      \ these to a single store anyway.\n\nWhen the struct itself has large inline\
      \ data (`int meta[1024]`, several inline\nsub-structs, dozens of fields), the\
      \ by-value handle pattern stops being free.\nHeap-box the whole struct and pass\
      \ an owned pointer instead.\n\n```c\nstruct Big {\n    int    meta[64];\n  \
      \  char   name[128];\n    size_t counts[16];\n    /* ... large body ... */\n\
      };\n\n_Safe struct Big *_Owned _Nullable big_new(void) {\n    struct Big *raw;\n\
      \    _Unsafe { raw = (struct Big *)calloc(1, sizeof(struct Big)); }\n    if\
      \ (raw == nullptr) return nullptr;\n    _Unsafe { return __take_from_raw(raw);\
      \ }\n}\n\n_Safe void big_free(struct Big *_Owned _Nullable b) {\n    if (b ==\
      \ nullptr) return;\n    struct Big *_Owned nonnull = b;                 /* narrow\
      \ */\n    _Unsafe { free(__move_to_raw(nonnull)); }\n}\n\n/* Operations take\
      \ borrows; ownership only moves at construction / destruction. */\n_Safe int\
      \  big_get(const struct Big *_Borrow b, size_t i) { return b->meta[i]; }\n_Safe\
      \ void big_set(struct Big *_Borrow b, size_t i, int v) { b->meta[i] = v; }\n\
      ```\n\nCallsite — `&_Mut *b` / `&_Const *b` to feed `_Borrow`-taking helpers:\n\
      \n```c\nstruct Big *_Owned _Nullable b = big_new();\nif (b == nullptr) return\
      \ -1;\nbig_set(&_Mut *b, 0, 42);\nint x = big_get(&_Const *b, 0);\nbig_free(b);\n\
      ```\n\nThe handle is now one pointer (8 bytes). Move semantics are still preserved\
      \ —\nmove of `struct Big *_Owned` is an 8-byte pointer move regardless of `Big`'s\n\
      size. Failure stays expressible via `_Nullable + nullptr` (INVALID-sentinel\
      \ at\nthe pointer level instead of the struct level — see `bsc-invalid-sentinel`).\n\
      \n#### Variant: wrap the owned pointer in a tiny handle struct\n\nIf you want\
      \ surface consistency with the rest of your `String`/`Vec`-style\ntypes (return-by-value,\
      \ `name_free(name h)` consumer), wrap the owned pointer\nin a one-field handle:\n\
      \n```c\nstruct BigHandle {\n    struct Big *_Owned _Nullable inner;\n};\n_Safe\
      \ struct BigHandle bigh_new(void)        { /* ... */ }\n_Safe void         \
      \  bigh_free(struct BigHandle h) { /* by-value consumer */ }\n```\n\nThe runtime\
      \ cost is identical to the bare-pointer version (handle is still 8\nbytes).\
      \ The benefit is type-level disambiguation between `struct BigHandle`\nand an\
      \ arbitrary `struct Big *_Owned`, and the same compile-time field-leak\ndetection\
      \ that small handles get.\n\n#### Anti-pattern: `ensure_init` out-param for\
      \ large structs\n\nA tempting \"no by-value copy\" alternative is to give the\
      \ caller a\n`struct Big big;` on its stack and have a function fill it via\n\
      `__attribute__((ensure_init))` + `*_Borrow`. **Do not do this for large\nstructs.**\
      \ The caller pays the full `sizeof(struct Big)` in stack frame —\nwhich is exactly\
      \ the cost you were trying to avoid. `ensure_init` out-params\nare appropriate\
      \ for small POD types (`int`, `struct Point`) where stack\nallocation is genuinely\
      \ cheaper than a heap call, not for large structs.\n\n### Decision rule (large\
      \ vs. small)\n\n| Struct shape | Use |\n|---|---|\n| Handle (`_Owned _ArrayElem`\
      \ fields + a few scalars), total ≤ ~64 B | By-value handle. Don't optimise.\
      \ |\n| Many fields but each small, total still ≤ ~128 B | By-value handle; trust\
      \ RVO. |\n| Large inline arrays / nested big structs, total ≥ few hundred bytes\
      \ | Heap-box: `struct Big *_Owned _Nullable` (optionally wrapped in a one-field\
      \ handle struct). |\n| Used heavily across many borrowed call chains, by-value-return\
      \ is rare | Heap-box, even if it's borderline-sized. The hot path is borrow-based,\
      \ so the heap-alloc cost is paid once at construction. |\n\n### Tagged-struct\
      \ cost for variant types\n\nA plain struct with `{tag, var_a, var_b, var_c}`\
      \ keeps every variant's storage\nlive at once. For variants holding heap buffers,\
      \ the constructor must allocate\neach one (even if the active tag uses only\
      \ one) so the destructor can free them\nall uniformly. Memory cost grows with\
      \ the number of variants; accept the cost or\nrestructure to avoid the union\
      \ pattern.\n\n### Destructor (consumer-function) design\n\nThe destructor is\
      \ a free function that takes the struct by value and consumes\nevery `_Owned`\
      \ field. It is not auto-called; every code path must invoke it.\n\nFor non-memory\
      \ resources (file handles, sockets, locks), declare the resource\nfield `_Owned`\
      \ and re-declare the libc creator/destroyer as `_Safe` with\nownership qualifiers\
      \ (mixed-mode `_Safe` redeclaration — see `bsc-safe-zone`\n§5). The borrow checker\
      \ then tracks the handle exactly like a heap buffer,\npreventing leaks and double-close\
      \ at compile time.\n\n```c\n/* Mixed-mode _Safe redeclaration of libc — tells\
      \ the borrow checker\n * that fopen produces an owned resource and fclose consumes\
      \ one. */\n_Safe FILE *_Owned _Nullable fopen(const char *_Borrow _ArrayElem\
      \ path,\n                                   const char *_Borrow _ArrayElem mode);\n\
      _Safe int fclose(FILE *_Owned fp);\n\nstruct FileHandle {\n    FILE *_Owned\
      \ _Nullable fp;   /* tracked as owned; null on closed state */\n};\n\n_Safe\
      \ struct FileHandle filehandle_open(const char *_Borrow _ArrayElem path) {\n\
      \    return (struct FileHandle){ .fp = fopen(path, \"r\") };\n}\n\n_Safe void\
      \ filehandle_close(struct FileHandle h) {\n    if (h.fp == nullptr) return;\n\
      \    FILE *_Owned fp = h.fp;          /* narrow nullable → nonnull */\n    (void)fclose(fp);\
      \                /* consumes fp; no _Unsafe needed */\n}\n```\n\nCases that\
      \ require an explicit destructor body:\n\n- Heap buffers held by `T *_Owned\
      \ _ArrayElem` → call `safe_free_T(s.field)`.\n- Foreign resources (`FILE *`,\
      \ sockets, locks) → declare the field `_Owned`\n  and use a `_Safe`-redeclared\
      \ destroyer that consumes the `_Owned` value.\n- Side-effect logic (logging,\
      \ notifying) before release.\n\n### One-line pass-through wrappers — `static\
      \ inline` in the header\n\nFor per-type wrappers whose body is a single call\
      \ or expression — typically\n`name_free`, `name_is_valid`, `name_len`, the per-type\
      \ `safe_calloc_T` /\n`safe_free_T` allocator pair, and similar trivial accessors\
      \ — put the\ndefinition in the header as `static inline`:\n\n```c\n/* In the\
      \ .hbs / .h header */\nstatic inline _Safe void str_free(struct String s) {\n\
      \    safe_free_chars(s.data);\n}\n\nstatic inline _Safe _Bool str_is_valid(const\
      \ struct String *_Borrow s) {\n    return s->data != nullptr;\n}\n\nstatic inline\
      \ _Safe size_t str_len(const struct String *_Borrow s) {\n    return s->len;\n\
      }\n```\n\nWhy `static inline` and not just `inline` or a regular non-inline\
      \ function:\n\n- **`static inline` is the safe C99/C11 idiom for header-defined\
      \ functions.**\n  Each translation unit gets its own copy if the call isn't\
      \ inlined; the\n  compiler inlines at any optimisation level. No link-step coordination\
      \ needed.\n- **Plain `inline` (no `static`)** requires an external definition\
      \ somewhere\n  per the C99/C11 rules — easy to get wrong under dual-build with\n\
      \  `bsc_compat.h`, where the standard-C path may need it but the BSC path\n\
      \  inlines it. Avoid.\n- **Non-inline function in a .c**: works fine, but for\
      \ one-liners the\n  wrapper's call/ret + 24-byte by-value copy is pure overhead\
      \ at `-O0`,\n  and even at `-O2` you depend on cross-TU inlining or LTO. `static\n\
      \  inline` removes the dependency.\n\nWhen **not** to inline:\n\n- Body is ≥\
      \ 3 lines, has branches, or contains `_Unsafe { ... }` blocks\n  beyond a single\
      \ statement. Inlining grows binary size at every callsite\n  without meaningful\
      \ benefit; let the compiler decide via -O.\n- The wrapper has external linkage\
      \ requirements (taken-address, function\n  pointer use, etc.). Keep it a regular\
      \ `_Safe` function in the .c.\n\nNote this is **API hygiene, not performance\
      \ optimisation**. On modern CPUs the\ncall/ret cost of a per-call wrapper is\
      \ invisible in real workloads; the reason\nto use `static inline` is that the\
      \ wrapper is a notational convenience that\nought to compile to the same code\
      \ as inlining the body by hand. Verified to\ncompile with `_Safe` (`_Safe static\
      \ inline` and `static inline _Safe` both\naccepted); ownership / move / field-leak\
      \ tracking is unaffected by inlining.\n\n---\n\n## 3. Designing APIs\n\n###\
      \ Value-in, value-out vs. borrow-in, borrow-out\n\n```c\n// Pattern A: ownership\
      \ transfer\n_Safe JSON_Object JSON_Object::new(void);            // produces\
      \ owned value\n_Safe void Obj::set_value(Obj* _Borrow this, JSON_Value v); \
      \ // consumes `v`\n\n// Pattern B: read-only access\n_Safe const String* _Borrow\
      \ Obj::get_name(const Obj* _Borrow this, size_t i);\n_Safe size_t Obj::get_count(const\
      \ Obj* _Borrow this);\n\n// Pattern C: mutation via borrow\n_Safe void Obj::clear(Obj*\
      \ _Borrow this);\n```\n\n**Rule:** read → `_Borrow this` + `_Borrow` returns.\
      \ Mutate → `_Borrow this` (mut)\n+ `void` return or status code. Construct →\
      \ `_Owned` return, no `this`.\n\n### Returning `_Borrow` that depends on a local\n\
      \nThis bites everyone eventually. If you compute a local `String` and want to\
      \ return a\n`_Borrow` to something looked up through it, the checker rejects\
      \ it because the local\ndies at scope exit.\n\n**Three legitimate fixes:**\n\
      \n1. **Restructure** — take the key by borrow from the caller:\n   ```c\n  \
      \ _Safe T* _Borrow lookup(Table* _Borrow t, const String* _Borrow key);\n  \
      \ ```\n\n2. **Recursion** — if the local is a transformation of an input, pass\
      \ the transformed\n   value into a recursive call where its lifetime is self-contained.\n\
      \n3. **Minimal `_Unsafe` seam** — for lookups that the checker can't model (hash-map\
      \ hits),\n   cast through a raw pointer inside a tight `_Unsafe` block. Document\
      \ why. (Parson's\n   `dotget_value` does this.)\n\n### Returning a pointer into\
      \ a global — `_Borrow` is not directly available\n\nTwo BSC rules combine to\
      \ make \"return `_Borrow` to a global\" impossible to\nexpress directly:\n\n\
      1. `_Safe T *_Borrow f(void)` with no `_Borrow` parameter is **rejected** —\n\
      \   \"borrow return requires at least one borrow parameter\" (lifetime needs\
      \ an\n   anchor in the inputs).\n2. `&_Mut global` inside `_Safe` is **rejected**\
      \ — globals cannot be\n   mutably borrowed in safe zones.\n3. Returning a raw\
      \ `T *` from `&_Const global` in `_Safe` is **rejected** —\n   borrow → raw\
      \ conversion is forbidden in `_Safe`.\n\nSo even the read-only case `_Safe const\
      \ T *_Borrow get_g(void)` does not\ncompile. Decision tree (preferred order):\n\
      \n```\nNeed to expose a pointer to a global?\n├─ Reader only wants the value,\
      \ T is small/copyable\n│       → Return by value: _Safe T get_g(void);\n├─ Global\
      \ is a large const lookup table\n│       → Expose per-field accessors that return\
      \ by value:\n│         _Safe int  table_field(unsigned i);\n├─ \"Global\" is\
      \ really module-private state held for the program lifetime\n│       → Refactor\
      \ away the global: caller (main) constructs a context\n│         struct and\
      \ passes it as Ctx *_Borrow through every API.\n│         Borrows now anchor\
      \ on the parameter — type system and reality\n│         agree, no escape hatch\
      \ needed.\n└─ None of the above: see \"Escape hatch\" below.\n```\n\n#### Escape\
      \ hatch — mixed-mode: `_Safe` declaration + non-`_Safe` definition\n\nWhen refactoring\
      \ isn't viable (large read-mostly global, many callsites\nthat need a borrow\
      \ shape), use BSC's mixed-mode redeclaration: declare the\nfunction `_Safe`\
      \ so callers can call it from `_Safe` context, but **define\nit without `_Safe`**\
      \ so the body operates in non-safe context and can\nreturn raw addresses of\
      \ globals using plain C syntax. This applies to\nuser-defined functions, not\
      \ just libc wrappers — see `bsc-safe-zone` §5\nfor the general rule.\n\nTwo\
      \ shapes; pick by callsite count.\n\n**Shape A — return raw, each caller casts\
      \ in `_Unsafe`.** Cheap to write\nfor ≤ 3 callsites.\n\n```c\nstatic int g_x\
      \ = 42;\n\n/* Declaration: _Safe so callers in safe zones can call it. */\n\
      _Safe const int *get_g(void);\n\n/* Definition: non-_Safe; body is plain C,\
      \ &g_x is just C address-of. */\nconst int *get_g(void) {\n    return &g_x;\n\
      }\n\n_Safe int caller(void) {\n    const int *_Borrow b;\n    _Unsafe { b =\
      \ (const int *_Borrow)get_g(); }\n    return use_borrow(b);                \
      \        /* b feeds _Safe APIs */\n}\n```\n\n**Shape B — concentrated `_Safe`\
      \ helper that already returns `_Borrow`.**\nCallers stay zero-`_Unsafe`. Worth\
      \ it for > 5 callsites. Same mixed-mode\ntrick — declaration is `_Safe`, definition\
      \ is non-`_Safe` and uses a\nplain C cast.\n\n```c\nstatic const int g_anchor_dummy\
      \ = 0;             /* never read, anchor only */\n\n/* Declaration: _Safe +\
      \ _Borrow return + _Borrow param (the lifetime anchor) */\n_Safe const int *_Borrow\
      \ g_get(const int *_Borrow anchor);\n\n/* Definition: non-_Safe; body is plain\
      \ C, raw-to-borrow cast is just a C cast */\nconst int *_Borrow g_get(const\
      \ int *_Borrow anchor) {\n    (void)anchor;\n    return (const int *_Borrow)&g_x;\n\
      }\n\n_Safe int caller(void) {\n    const int *_Borrow b = g_get(&_Const g_anchor_dummy);\n\
      \    return use_borrow(b);                        /* no _Unsafe at the callsite\
      \ */\n}\n```\n\nWhy this is cleaner than wrapping the body in `_Unsafe { ...\
      \ }`: the body\nreads as ordinary C — no extra braces, no qualifier juggling.\
      \ The\nmixed-mode declaration carries the entire \"this is a safe-callable\n\
      function whose internals don't pass the safe-zone checker\" claim. Readers\n\
      see one place (the missing `_Safe` on the definition) instead of two (the\n\
      `_Safe` on the function plus `_Unsafe` blocks inside).\n\nFor the language mechanism\
      \ behind this — the two orthogonal meanings of\n`_Safe` (declaration = caller\
      \ contract, definition = body check) and when\nto use the pattern vs the default\
      \ `_Safe` definition + minimal `_Unsafe`\nblocks — see `bsc-safe-zone` §5.0\
      \ and §5.2.\n\n**The cost is the same hole in both shapes**: the `_Borrow` was\
      \ constructed\nby a raw cast, so the borrow checker does NOT know it aliases\
      \ the global.\n\n- **No freeze of the source.** External writes to the global\
      \ while the\n  \"borrow\" is live will not be diagnosed. Test 9.2 in the verification\n\
      \  suite confirmed this.\n- **No multi-borrow conflict detection.** Two callers\
      \ can hold a\n  \"`*_Borrow` to `g_x`\" and a `*_Mut`-shaped borrow simultaneously\
      \ without\n  the checker noticing.\n- **NLL is computed on the borrow variable,\
      \ but the underlying value may\n  have changed.** A late use of `b` reads whatever\
      \ is currently in the\n  global, not what was there when `b` was minted.\n\n\
      Use this escape hatch only when **all** of these hold:\n\n- The global is `const`\
      \ or treated as read-mostly by convention.\n- Mutation points (if any) are explicitly\
      \ documented; readers must not\n  hold the cast borrow across them.\n- Concurrent\
      \ mutation is impossible in your model (no threads touch this\n  global, or\
      \ external synchronisation already covers it).\n- A simpler alternative (return\
      \ by value, context-struct refactor) was\n  considered and ruled out.\n\nIf\
      \ those conditions are not all true, refactor instead — the borrow's\nfake lifetime\
      \ will eventually mask a real bug.\n\n#### Anti-pattern: fully `_Safe` definition\
      \ that returns `&_Const global`\n\nThis compiles, looks honest, and lies harder\
      \ than Shape B:\n\n```c\n/* DON'T — _Safe definition + &_Const global hides\
      \ the gap */\n_Safe const int *_Borrow get_g(const int *_Borrow anchor) {\n\
      \    (void)anchor;\n    return &_Const g_x;\n}\n```\n\nThe body reads as ordinary\
      \ safe-zone borrow code. A reviewer scanning\nthe function sees `_Safe`, sees\
      \ `&_Const`, and reasons about the result\nas a real borrow into `anchor`'s\
      \ lifetime. It is not — the source is\n`static` and the borrow's freeze/aliasing\
      \ guarantees don't hold.\n\nShape B above expresses the same idea using mixed-mode\
      \ (declaration\n`_Safe`, definition without `_Safe`) and an explicit C-style\
      \ cast in\nthe body:\n\n```c\n/* Shape B definition again, for comparison */\n\
      const int *_Borrow g_get(const int *_Borrow anchor) {\n    (void)anchor;\n \
      \   return (const int *_Borrow)&g_x;\n}\n```\n\nTwo signals tell a reader \"\
      the borrow checker does not fully model this\":\nthe missing `_Safe` on the\
      \ definition line, and the explicit pointer-type\ncast. Both are absent in the\
      \ anti-pattern, which is why the anti-pattern\nhides the gap and Shape B does\
      \ not.\n\n### Constructor pattern\n\nUse `name_new` / `name_with_capacity` /\
      \ `name_from_cstr` as the convention:\n\n```c\n_Safe struct String str_new(void);\n\
      _Safe struct String str_with_capacity(size_t cap);\n_Safe struct String str_from_cstr(const\
      \ char *_Borrow _ArrayElem s);\n```\n\nConstructors return the struct by value.\
      \ On allocation failure they return an\nINVALID instance (see `bsc-invalid-sentinel`)\
      \ rather than aborting.\n\n---\n\n## 4. Designing Ownership Flow\n\n### Where\
      \ ownership lives\n\nFor every heap allocation, decide: **who owns it, for how\
      \ long, and how does it\nget freed?** Then make the types reflect the answer.\n\
      \n```c\n/* Owner: the struct. Lifetime: until str_free(s) is called. */\nstruct\
      \ String { char *_Owned _ArrayElem _Nullable data; size_t len, cap; };\n\n/*\
      \ Owner: the caller of str_push. The char is copied; no transfer. */\n_Safe\
      \ void str_push(struct String *_Borrow s, char c);\n\n/* Owner: the struct.\
      \ Returned as a borrow for read-only use. */\n_Safe const char *_Nullable str_as_cstr(const\
      \ struct String *_Borrow s);\n```\n\n### Move semantics at API edges\n\nWhen\
      \ a function takes `T *_Owned` or `struct T` by value, the caller loses access\n\
      to the variable after the call. Design so the caller either:\n\n- **Moves it\
      \ in deliberately** (e.g. `str_free(s)` — `s` is consumed)\n- **Clones first**\
      \ if they need to keep using the value (`str_clone(&_Const s)`)\n\nDon't have\
      \ \"sometimes consumes, sometimes doesn't\" functions — pick one.\n\n### Sharing\n\
      \nSingle ownership only. If two places need to read the same value, pass each\
      \ one\na `*_Borrow`. If two places need to write, redesign the data flow so\
      \ only one\nwriter exists at a time. There is no shared-ownership primitive\
      \ in this subset.\n\n---\n\n## 5. Designing the `_Safe` / `_Unsafe` boundary\n\
      \n### Pick the boundary at design time, not during debugging\n\nBefore writing\
      \ code, list which functions will be `_Safe` and which `_Unsafe`. Common\nlibrary\
      \ structure:\n\n```\nPublic API (.hbs)\n  ├── _Safe for 90% of the surface\n\
      \  └── _Unsafe for:\n        - Constructors that take raw C strings (const char*)\n\
      \        - Functions that interop with existing C libraries\n        - Destructors\
      \ that close system resources\n\nInternal impl (.cbs)\n  ├── _Safe where the\
      \ model permits\n  └── _Unsafe blocks (NOT whole functions) for:\n        -\
      \ pointer arithmetic\n        - aliasing that the checker over-rejects\n```\n\
      \n### When to use `_Unsafe` blocks inside `_Safe` functions\n\nTotally legitimate\
      \ when:\n\n- You need `printf`/`puts` (formatted output is considered unsafe\
      \ in BSC)\n- You're doing pointer arithmetic over a known-safe buffer (`string->get(i)`\
      \ returning a raw char pointer)\n- You're casting between `_Owned` and raw for\
      \ `__take_from_raw` / `__move_to_raw` (C FFI)\n\nNot legitimate for:\n\n- Skipping\
      \ the borrow checker because it's \"annoying\"\n- Bypassing a diagnostic you\
      \ don't understand — figure out why it fires first\n\n---\n\n## 6. Anti-Patterns\n\
      \n### Anti-pattern: `_Unsafe` all the way down\nSymptom: every function is `_Unsafe`.\
      \ You're writing C with a .cbs extension.\nFix: mark the public API `_Safe`\
      \ and push the `_Unsafe` parts into blocks inside each\nfunction. The checker\
      \ still helps you at the boundaries.\n\n### Anti-pattern: God struct\nSymptom:\
      \ one plain struct with 15 fields, most unused in most code paths.\nFix: split\
      \ into smaller structs composed via `_Owned _ArrayElem` fields. Each\nsub-struct\
      \ gets its own `name_free` consumer.\n\n### Anti-pattern: returning raw `T*`\
      \ instead of `T *_Borrow`\nSymptom: a lookup returns `T*` (raw) instead of `T\
      \ *_Borrow`, forcing callers into\n`_Unsafe` just to use it.\nFix: if the function\
      \ always succeeds, return `T *_Borrow`. If it can fail, return\n`T *_Borrow\
      \ _Nullable` — compile-time nullability tracking keeps callers `_Safe` while\n\
      representing the miss case.\n\n### Anti-pattern: destructor that does too much\n\
      Symptom: destructor reaches into unrelated subsystems, calls logging, modifies\
      \ global state.\nFix: destructors should only release resources owned by `this`.\
      \ Side effects belong\nin explicit methods the caller invokes.\n\n### Anti-pattern:\
      \ designing for C first, then \"porting\"\nSymptom: you wrote a C-style API\
      \ (`Buffer* parse(const char*)`) and are now\nfighting the borrow checker.\n\
      Fix: start from the BSC types (`struct Buffer parse(const char *_Borrow _ArrayElem)`)\n\
      and let the signatures drive the implementation.\n\n---\n\n## 7. A Worked Example\n\
      \nA simple string library, designed subset-first:\n\n```c\n/* bsc_str.hbs */\n\
      struct String {\n    char *_Owned _ArrayElem _Nullable data;   /* nullptr →\
      \ INVALID */\n    size_t len;\n    size_t cap;\n};\n\n_Safe _Bool         str_is_valid(const\
      \ struct String *_Borrow s);\n_Safe struct String str_new(void);\n_Safe struct\
      \ String str_from_cstr(const char *_Borrow _ArrayElem s);\n_Safe void      \
      \    str_free(struct String s);            /* destructor */\n_Safe size_t  \
      \      str_len(const struct String *_Borrow s);\n_Safe void          str_push(struct\
      \ String *_Borrow s, char c);\n_Safe _Bool         str_eq(const struct String\
      \ *_Borrow a,\n                           const struct String *_Borrow b);\n\
      ```\n\nDesign notes:\n\n- **Rule 1:** constructors return by value; mutators\
      \ take `*_Borrow`; readers\n  take `const *_Borrow`.\n- **Rule 5:** `str_free(s)`\
      \ is the consumer destructor — explicit.\n- **Rule 6:** every operation is a\
      \ free function — no member-function syntax.\n- **Rule 9:** all raw `memcpy`/`memcmp`/`free`\
      \ calls live in `static _Safe` helpers\n  inside one `_Unsafe` block each; public\
      \ API has zero `_Unsafe`.\n- **INVALID-sentinel** (see `bsc-invalid-sentinel`):\
      \ on OOM, constructors return\n  `{nullptr, 0, 0}`; mutators on INVALID silently\
      \ no-op; `str_is_valid` is the\n  validity test.\n\n---\n\n## 8. Quick Reference\n\
      \n| Question | Answer |\n|---|---|\n| Should I return `struct T` or `T *_Owned`?\
      \ | Value for small/medium with INVALID-sentinel for nullability; `*_Owned`\
      \ for large or when an explicit pointer hand-off is needed |\n| Should I take\
      \ `struct T`, `T *_Owned`, or `T *_Borrow`? | `_Borrow` for read, mut-`_Borrow`\
      \ for modify, by-value for consume/destroy |\n| Should this be `_Safe` or `_Unsafe`?\
      \ | `_Safe` unless you can't — then wrap `_Unsafe` blocks inside |\n| Do I need\
      \ a destructor body? | Yes — every `_Owned _ArrayElem` field needs explicit\
      \ release in a `name_free(struct T s)` consumer |\n| How to signal \"absent\"\
      \ / OOM? | INVALID-sentinel pattern (see `bsc-invalid-sentinel`) — return a\
      \ struct with `data = nullptr` |\n\nBefore you write a single line: sketch the\
      \ types, annotate who owns what,\ndecide where the `_Unsafe` seams go. The code\
      \ almost writes itself after that.\n\n## 9. OOM-tolerant API design\n\nThe INVALID-sentinel\
      \ pattern (a plain struct with an `_Owned _ArrayElem\n_Nullable` buffer field,\
      \ where `data == nullptr` encodes the failure state)\nis the canonical way to\
      \ propagate allocation failure in this subset\ninstead of aborting. It is referenced\
      \ throughout this skill (§3 constructor\npattern, §7 worked example, §8 quick\
      \ reference, \"Large structs\"). For the\nfull pattern — VALID/INVALID model,\
      \ constructor / query / mutator /\ndestructor contracts, the mandatory defensive\
      \ null-guard in helpers — see\nthe dedicated `bsc-invalid-sentinel` skill.\n\
      \n\nARGUMENTS: 帮我基于此项目 继续开发出bsc的ftp服务器需求"
