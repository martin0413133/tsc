- role: tool
  tool_call_id: call_00_EJW6InAunKokgnYSHbZw3788
  content: "<path>/home/user/project/bsc_str_lib-master</path>\n<type>directory</type>\n<entries>\n.claude/\n.cursorrules\n.github/\n.opencode/\n.windsurfrules\nAGENTS.md\nbsc_compat.h\nbsc_str_safe.cbs\nbsc_str_safe.hbs\nbsc_str.cbs\nbsc_str.hbs\nCLAUDE.md\nMakefile\ntest_bsc_str.cbs\ntest.bin\n\n(15 entries)\n</entries>\n\n[Rule: /home/user/project/.github/copilot-instructions.md]\n[Match: copilot-instructions (always apply)]\n# BiSheng C (BSC) Language Reference\n\n> BiSheng C is a superset of C with Rust-inspired memory safety, traits, generics, and async/await.\n> Source files: `.cbs`. Header files: `.hbs`. Compiler: `clang file.cbs -o output`.\n\n## CRITICAL: Pointer Qualifier Grammar — Read Before Writing Any BSC Code\n\n`_Owned` and `_Borrow` are **pointer qualifiers** (like `const`). They go AFTER `*`, NEVER before the type.\n\nGrammar: `base_type *qualifier variable_name`\n\nThink of it like `const`: you write `int *const p`, not `const int* p` for a const pointer. Same rule: write `int *_Owned p`, not `_Owned int* p`.\n\nCorrect:\n```c\nchar *_Owned msg = (char *_Owned)malloc(14);\nint *_Owned p = (int *_Owned)malloc(sizeof(int));\nconst int *_Borrow r = &_Const x;\nint *_Borrow mr = &_Mut y;\nfree((void *_Owned)p);\n```\n\nWrong — causes compilation error \"unknown type name '_Owned'\":\n```c\n_Owned char* msg = malloc(14);     // WRONG\n_Borrow int* r = &_Const x;       // WRONG\n```\n\nIf you ever write `_Owned T*` or `_Borrow T*`, rewrite it: move the qualifier after `*` → `T *_Owned`.\n\n`malloc()` MUST be cast: `(T *_Owned)malloc(n)`. `free()` MUST cast: `free((void *_Owned)p)`.\n\n## C-to-BSC Translation\n\nIf translating/porting C code to BSC, you MUST read the \"C to BiSheng C Translation Skill\" section below BEFORE starting. Changing file extensions alone is NOT a translation — every pointer must be annotated with `_Owned` or `_Borrow`.\n\n---\n\n\n# BiSheng C Borrowing Skill\n\n## Pick `_Borrow`, Not `_Owned`, By Default for Pointer Parameters\n\nA function that **reads or mutates** a value through a pointer but does **not\ntake ownership** must use `_Borrow`, never `_Owned`.\n\n- The function frees the pointer, transfers it onward, or stores it long-term → `T *_Owned`.\n- The function only reads through the pointer → `const T *_Borrow`.\n- The function mutates *through* the pointer but does not free it → `T *_Borrow`.\n- The function does pointer arithmetic / iteration → raw `T *`.\n\n`_Owned` parameters consume the caller's variable. Most C functions don't do\nthat. Defaulting to `_Owned` everywhere makes every call site a one-shot move\nand forces ugly re-allocation patterns at the call sites — that's wrong.\n\nFor a translation context, see `/c-to-bsc` Step 2.5.\n\n## CRITICAL: `_Borrow` Syntax\n\n**`_Borrow` goes AFTER the `*`, not before the type.** It is a pointer qualifier.\n\n```c\n// CORRECT\nconst int *_Borrow r = &_Const x;\nint *_Borrow mr = &_Mut x;\n\n// WRONG (does not compile)\n_Borrow int* r = &_Const x;\n```\n\n## 1. Overview\n\nTemporary, non-owning references. The compiler enforces borrow rules at compile time — no dangling references, no aliased mutation.\n\n## 2. Creating Borrows\n\n```c\nint x = 42;\nconst int *_Borrow cr = &_Const x;   // immutable borrow — read only\nint *_Borrow mr = &_Mut x;           // mutable borrow — read/write\n```\n\nFrom `_Owned` pointer: `&_Const *owned_ptr` or `&_Mut *owned_ptr`.\n\n## 3. Semantics\n\n| Type | Access | Aliasing |\n|------|--------|----------|\n| `const T *_Borrow` | Read only | Multiple allowed simultaneously |\n| `T *_Borrow` | Read + Write | Exactly one at a time |\n\nMutable borrows implicitly convert to immutable: `T *_Borrow` -> `const T *_Borrow` (compiler inserts `&_Const *`). This works in declarations, assignments, function args, and returns.\n\n## 4. Non-Lexical Lifetimes (NLL)\n\nBorrow lifetimes use **NLL**: a borrow is active from its creation (or re-assignment) to its **last use**, NOT to the end of the lexical scope. NLL can be segmented — if a borrow variable is reassigned, it creates disjoint active ranges.\n\n```c\nvoid use(int *_Borrow p) {}\n\nvoid foo() {\n    int local1 = 1, local2 = 2;\n    int *_Borrow p = &_Mut local1;  // NLL segment 1 starts\n    use(p);                          // NLL segment 1 ends (last use)\n    // local1 is unfrozen here — p's borrow has ended\n    local1 = 10;                     // OK: p is no longer active\n    p = &_Mut local2;                // NLL segment 2 starts (and ends — no further use)\n}\n```\n\nUses that extend NLL: function calls `use(p)`, `return p`, dereference `*p`, member access `p->field`.\n\n## 5. Rules\n\n- **`_Borrow` goes after the `*`**: write `int *_Borrow`, NOT `_Borrow int*`\n- While **immutable borrow** active: original is read-only, no mutable borrows allowed\n- While **mutable borrow** active: original is **frozen** — no reads, writes, moves, or borrows\n- **Struct field borrows**: `&_Mut e.field` freezes only **that field** (blocks whole-struct modification); other fields remain accessible. `&_Const e.field` puts the field into read-only state\n- Borrow lifetime <= borrowed value's lifetime (compiler enforced)\n- Cannot create borrow of a borrow: `int *_Borrow *_Borrow` is illegal\n- Borrow variables must be initialized at declaration\n- Cannot be global variables or union members\n- `_Owned` and `_Borrow` cannot coexist on same pointer: `int *_Owned _Borrow` is illegal\n- No indexing (`p[i]`) and no pointer arithmetic (`p + n`, `p++`) on **plain** borrow pointers. For an array-element borrow, use `_Borrow _ArrayElem` (see §11) — that variant supports `[]`, `+`, `-`, `+=`, `-=`, `++`, `--`\n- Cannot use `_Borrow` pointer type as a generic type argument\n- No `_Trait` impl for borrow types; no member functions for borrow types\n- Cannot take borrow of a struct that itself contains borrow members\n- Globals: in safe zones, only immutable borrows (`&_Const`) allowed; no mutable borrows of globals\n- String literals: `&_Mut \"hello\"` is forbidden; `&_Mut * \"hello\"` is forbidden\n\n### Reassignment rules\n- Reassignment of a borrow variable requires the same type and the new source must have a lifetime >= the borrow variable's remaining lifetime\n\n## 6. Dereference and Member Access\n\n### Dereference (`*p`)\n| Operation | Immutable borrow | Mutable borrow (T is Copy) | Mutable borrow (T is Move) |\n|-----------|-----------------|---------------------------|---------------------------|\n| Read `*p` | OK | OK | OK |\n| Assign to `*p` | Error | OK | Error (cannot move-assign) |\n\n### Member access (`p->field`)\n- Immutable borrow: can read fields, cannot modify\n- Mutable borrow: can read and modify fields (for Copy types)\n- Immutable borrow cannot call mutable methods (`T *_Borrow this` methods)\n\n## 7. Type Conversions\n\n- **Trait upcasting**: explicit cast required; no implicit downcasting from trait to concrete\n- **`T *_Borrow` → `void *_Borrow`**: **implicit** when `T` is a trivial data type (no pointer fields, not an `_Owned struct`); otherwise the conversion is **forbidden**, even with an explicit cast\n  ```c\n  struct S { int *ptr; };\n  int a = 0; struct S s = {.ptr = nullptr};\n  _Safe {\n      int *_Borrow p1 = &_Mut a;\n      void *_Borrow p2 = p1;                       // ok: int is trivial\n      struct S *_Borrow p3 = &_Mut s;\n      void *_Borrow p4 = (void *_Borrow)p3;        // error: S has pointer field\n  }\n  ```\n- **`void *_Borrow` → `T *_Borrow`**: implicit conversion **forbidden**; explicit cast must be in `_Unsafe`\n- **Between `_Borrow` and raw pointer**: forbidden in `_Safe` zones; outside `_Safe`, casts go through the raw `T *` intermediate, never directly\n- **Between `_Owned` and `_Borrow`**: C-style casts in either direction are **forbidden**\n- **Between mutable and immutable borrows**: explicit cast is forbidden. Mutable→immutable is implicit (compiler inserts `&_Const *`); the reverse is never allowed\n- **`T *_Borrow _ArrayElem` → `T *_Borrow`**: allowed as an implicit conversion (equivalent to \"re-borrow at the current element, dropping array-iteration semantics\"). The reverse `T *_Borrow` → `T *_Borrow _ArrayElem` is forbidden\n- **Implicit `_Bool` conversion**: `_Borrow _Nullable` pointers can be used in conditions\n\n## 8. Additional Rules\n\n- Borrow pointers can be used in `if`/`while`/`do-while`/`for`/ternary conditions, but **NOT** in `switch`\n- Forbidden operators on **plain** borrow pointers: `-`, `~`, `[]`, `++`, `--`, `*`(arithmetic), `/`, `%`, `&`(bitwise), `|`, `<<`, `>>`, binary `+`, binary `-`. `_Borrow _ArrayElem` re-enables `[]`, binary `+`/`-`, `+=`/`-=`, `++`/`--` (see §11). The rest stay forbidden\n- Comparison (`==`, `!=`, `<`, `<=`, `>`, `>=`) is allowed between same-typed borrows. Top-level `const`/`volatile`/`restrict` on the pointee are ignored when comparing — `int *_Borrow` and `const int *_Borrow` are comparable\n- `sizeof(T *_Borrow) == sizeof(T *)` and the same for `_Alignof`. `_Borrow _ArrayElem` has the same size/alignment as `T *`\n- String literals auto-borrow to `const char *_Borrow` when passed to a `const char *_Borrow` parameter (compiler inserts `&_Const *`)\n\n## 9. Function Signatures\n\n```c\n// Read-only access\n_Safe int len(const Vec<int> *_Borrow this) {\n    return this->len;\n}\n\n// Mutable access\n_Safe void push(Vec<int> *_Borrow this, int value) { ... }\n\n// Return borrow — lifetime tied to input borrow\n_Safe int *_Borrow first(Vec<int> *_Borrow this) { ... }\n```\n\n- If return is `_Borrow` and one param is `_Borrow`: return lifetime = param lifetime\n- If multiple `_Borrow` params: return lifetime = union of all param lifetimes\n- If no `_Borrow` params but return is `_Borrow`: **compile error** — borrow return requires at least one borrow parameter\n\n## 10. Design Patterns\n\nThese idioms come up repeatedly when the borrow checker rejects \"obvious\" C-style code.\n\n### 10.1 Iterative traversal → convert to recursion\n\n**Problem:** You want\
    \ to walk a linked structure via a while-loop, reassigning a cursor\nat each step. The borrow checker forbids this because step N+1's borrow is derived from\nstep N's borrow, and reassignment invalidates the chain.\n\n```c\n// WRONG — cannot reassign `current` while borrows live through it\n_Safe T* _Borrow walk(Root* _Borrow root, const Path* _Borrow p) {\n    T* _Borrow current = root;\n    for (size_t i = 0; i < p->length(); i++) {\n        current = current->child(i);   // reassignment conflicts with derived borrow\n    }\n    return current;\n}\n```\n\n**Fix:** convert to tail-recursion. Each recursive call has its own fresh stack frame,\nso the borrow chain stays linear.\n\n```c\n_Safe static T* _Borrow walk_rec(T* _Borrow current, const Path* _Borrow p, size_t i) {\n    if (i >= p->length()) { return current; }\n    return walk_rec(current->child(i), p, i + 1);\n}\n_Safe T* _Borrow walk(Root* _Borrow root, const Path* _Borrow p) {\n    return walk_rec(root, p, 0);\n}\n```\n\nThe compiler typically optimizes tail-recursion back into a loop at `-O1` and above, so\nthere's no runtime cost. This pattern was necessary for BSC's `path_get_value` in parson.\n\n### 10.2 Chain calls, don't name intermediate borrows\n\n**Problem:** Extracting an intermediate value into a named variable can extend its\nborrow past where you want.\n\n```c\n// Potentially awkward — `obj` borrows from `val` through the whole block\nJSON_Object* _Borrow obj = val.get_object();\nobj->set_string(name, value);\n// ... lots of code ...\n// any other borrow of `val` conflicts with `obj`\n```\n\n**Fix:** when a borrow is used in only one call, chain it:\n\n```c\nval.get_object()->set_string(name, value);\n// no named borrow — no lifetime extension\n```\n\nName a borrow only when you use it multiple times; otherwise let it be a transient.\n\n### 10.3 Scope the borrow tightly\n\nIf you must name a borrow but don't need it for the whole function, wrap it in a\nblock so its lifetime ends explicitly:\n\n```c\n{\n    JSON_Object* _Borrow obj = val.get_object();\n    obj->set_string(name, value);\n}   // <-- `obj` released here\nval.validate(&_Mut schema);   // now free to mut-borrow `val` again\n```\n\n### 10.4 Extract the work, not the borrow\n\n**Problem:** you need data from the borrow but also need the borrowee freely afterwards.\n\n```c\n// WRONG — `key` transitively extends `parent`'s borrow\nconst String* _Borrow key = parent->get_name(0);\nparent->set_value(key, ...);   // mut-borrow conflicts with key\n```\n\n**Fix:** clone the data you need, drop the borrow, then do the mutation.\n\n```c\nString key_owned;\n{\n    const String* _Borrow key = parent->get_name(0);\n    key_owned = clone_string(key);\n}\nparent->set_value(&_Const key_owned, ...);   // parent is free again\n```\n\n## 11. Complete Example\n\n```c\n#include <stdio.h>\n\nvoid printValue(const int *_Borrow ref) {\n    printf(\"value = %d\\n\", *ref);\n}\n\nvoid doubleValue(int *_Borrow ref) {\n    *ref = *ref * 2;\n}\n\nconst int *_Borrow getFirst(const int *_Borrow arr, int len) {\n    return arr;\n}\n\nint main() {\n    int x = 21;\n\n    // Immutable borrow\n    const int *_Borrow cr = &_Const x;\n    printValue(cr);\n    printValue(&_Const x);   // inline borrow\n\n    // Mutable borrow\n    int *_Borrow mr = &_Mut x;\n    doubleValue(mr);\n    // NLL: mr's lifetime ended at last use (doubleValue call)\n    printf(\"x = %d\\n\", x);  // OK: x is no longer frozen\n\n    // Multiple immutable borrows are OK\n    const int *_Borrow r1 = &_Const x;\n    const int *_Borrow r2 = &_Const x;\n    printf(\"r1=%d, r2=%d\\n\", *r1, *r2);\n\n    // Struct field borrows — only the borrowed field is frozen\n    struct Point { int x; int y; };\n    struct Point p = {.x = 10, .y = 20};\n    int *_Borrow px = &_Mut p.x;  // only p.x is frozen\n    p.y = 30;                      // OK: p.y is a different field\n    *px = 50;\n    // px NLL ends here (last use above)\n\n    // Mutable-to-immutable implicit conversion\n    int val = 5;\n    int *_Borrow mp = &_Mut val;\n    const int *_Borrow ip = mp;  // OK: implicit conversion\n\n    // String literal auto-borrow\n    void print_str(const char *_Borrow s);\n    print_str(\"hello\");  // compiler auto-inserts &_Const *\n\n    return 0;\n}\n```\n\n## 11. `_Borrow _ArrayElem`: Borrowing Into Arrays\n\nTaking the address of an array element with `&_Mut arr[i]` or `&_Const arr[i]`\nyields a `_Borrow _ArrayElem` pointer. This is a borrow that **remembers it\npoints into an array**, so subscript and arithmetic are allowed on it (unlike\nplain `_Borrow`).\n\n```c\n_Safe int foo(void) {\n    int arr[4] = {1, 2, 3, 4};\n    int *_Borrow _ArrayElem p = &_Mut arr[0];\n    p = p + 1;            // ok: _Borrow _ArrayElem supports +\n    p += 1;               // ok: +=\n    ++p;                  // ok: ++\n    int x = p[0];         // ok: subscript\n\n    int *_Borrow q = p;   // ok: implicit downgrade to plain borrow\n    // q + 1;             // error: plain borrow forbids arithmetic\n    // q[0];              // error: plain borrow forbids subscript\n    return x;\n}\n```\n\nRules specific to `_Borrow _ArrayElem`:\n\n- Allowed operators: `[]`, binary `+`, `-`, `+=`, `-=`, `++`, `--`. All other\n  plain-`_Borrow` restrictions still apply (no `*` arithmetic, no bitwise, etc.).\n- **Implicit downgrade** `T *_Borrow _ArrayElem` → `T *_Borrow` is allowed\n  (equivalent to \"take a fresh plain borrow at the current element\"). The\n  reverse explicit cast is **forbidden**.\n- For mixed `_Safe`/`_Unsafe` declarations, `_Borrow _ArrayElem` is a single\n  qualifier unit — a `_Safe` redeclaration may add `_Borrow _ArrayElem` to a\n  bare-pointer `_Unsafe` parameter, but cannot swap between `_Borrow` and\n  `_Borrow _ArrayElem` once one is declared.\n- `sizeof(T *_Borrow _ArrayElem) == sizeof(T *)`.\n\nExcept for the operators above and these conversion rules, **everything else\nthat applies to plain `_Borrow` (lifetime, freezing, NLL, nullability,\ntype-compatibility, no-borrow-of-borrow, etc.) applies identically to\n`_Borrow _ArrayElem`**. Most of the time you only see this type implicitly via\n`&_Mut arr[i]` and immediately bind it to a plain `_Borrow`; name it explicitly\nonly when you need to subscript or step.\n\n> For ownership (owning pointers), see `bsc-ownership` Skill\n> For safe zones that require borrows, see `bsc-safe-zone` Skill\n> For nullability with borrows, see `bsc-nullability` Skill\n> For borrow errors (BSC-E02xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Common Mistakes Skill\n\n## 1. Safe Zone Mistakes\n\n### 1.1 Using `&` instead of `&_Const`/`&_Mut`\n```c\n_Safe void f(void) {\n    int x = 42;\n    // int* p = &x;                    // error: '&' forbidden in safe zone\n    const int *_Borrow p = &_Const x;  // correct\n}\n```\n\n### 1.2 Using `++`/`--` result as expression\n`++`/`--` are allowed as statements but return `void` — cannot use the result.\n```c\n_Safe void f(void) {\n    int i = 0;\n    i++;                               // ok: side-effect only\n    for (int j = 0; j < 10; j++) {}    // ok: iteration clause\n    // int x = i++;                    // error: result type is void\n}\n```\n\n### 1.3 Empty params without `void`\n```c\n// _Safe int f() { return 42; }     // error\n_Safe int f(void) { return 42; }    // correct\n```\n\n### 1.4 Partial init of structs with pointer fields\nOnly structs with pointer fields require complete initializers. Basic-type-only structs may be partially initialized.\n```c\n_Safe {\n    struct HasPtr hp = {nullptr, 0};  // ok: complete init (has pointer field)\n    // struct HasPtr hp2 = {0};       // error: partial init\n    struct NoPtr { int a; int b; };\n    struct NoPtr np = {0};            // ok: no pointer fields\n}\n```\n\n### 1.5 Union member access in safe zone\nUnions can be declared/initialized/passed, but member access is forbidden.\n```c\n_Safe {\n    union U { int i; float f; } u = {.i = 1};\n    // int x = u.i;                   // error\n    _Unsafe { int x = u.i; }          // ok: unsafe escape\n}\n```\n\n### 1.6 Forbidden casts in safe zone\nNo cross-category pointer casts (`_Owned`/`_Borrow`/raw), no pointer-integer casts, no float-to-integer casts. Exception: `T *_Owned` to `void *_Owned` is allowed.\n\n### 1.7 Mutable borrow of global in safe zone\nOnly `&_Const` of globals allowed; `&_Mut` of globals is forbidden.\n```c\nint g = 10;\n_Safe void f(void) {\n    // int *_Borrow p = &_Mut g;          // error\n    const int *_Borrow p = &_Const g;     // ok\n}\n```\n\n## 2. Ownership Mistakes\n\n### 2.1 Wrong `_Owned`/`_Borrow` qualifier placement\n**#1 LLM mistake.** `_Owned`/`_Borrow` go **after the `*`**, not before the type.\n```c\n// WRONG                              // CORRECT\n// _Owned char* msg                   char *_Owned msg = safe_malloc('\\0');\n// _Borrow int* r                     const int *_Borrow r = &_Const x;\n```\nPattern: always `T *_Owned` and `T *_Borrow`, never `_Owned T*` or `_Borrow T*`.\n\n### 2.2 Using variable after ownership transfer\n```c\nint *_Owned p = safe_malloc(42);\nint *_Owned q = p;        // p moved\n// printf(\"%d\\n\", *p);    // error: use of moved value\n```\n\n### 2.3 Forgetting to release `_Owned` before scope ends\n```c\nvoid f(void) {\n    int *_Owned p = safe_malloc(42);\n    safe_free((void *_Owned)p);   // must release: free, pass, or return\n}\n```\n\n### 2.4 Pointer arithmetic on `_Owned`\n```c\nint *_Owned p = safe_malloc(42);\n// p++;                    // error: no arithmetic on _Owned\n// p[3] = 0;               // error: no [] on plain _Owned\n```\n\nFor a heap **array** that you want to subscript, use `T *_Owned _ArrayElem`\n(allocate with `safe_malloc_array`, free with `safe_free_array`). It supports\n`p[i]` but still forbids arithmetic — `_Owned _ArrayElem` is **not** a free\nupgrade to a C-style array pointer. See `bsc-ownership` §8.\n\n```c\nint *_Owned _ArrayElem arr = safe_malloc_array(10, 0);\narr[3]\
    \ = 3;                            // ok: _ArrayElem allows subscript\n// arr += 1;                           // error: still no arithmetic\nsafe_free_array((void *_Owned _ArrayElem)arr);\n```\n\n## 3. Borrowing Mistakes\n\n### 3.1 Mutable borrow while immutable borrow active\n```c\nint x = 42;\n{\n    const int *_Borrow r = &_Const x;\n    printf(\"%d\\n\", *r);\n}\nint *_Borrow mr = &_Mut x;  // ok: immutable borrow ended\n```\n\n### 3.2 Borrow outlives source\n```c\n// const int *_Borrow dangling(void) {\n//     int x = 42;\n//     return &_Const x;  // error: borrow outlives local\n// }\n```\n\n### 3.3 Returning a borrow that depends on a local helper value\n\nOne of the most common ownership-model collisions. You compute a local `String`\n(or other owned value) to use as a key, then want to return the borrow you looked up\nthrough it.\n\n```c\n// WRONG — `key` dies at scope exit, but the returned borrow transitively depends on it\n_Safe JSON_Value* _Borrow lookup(Obj* _Borrow this, const char* k) {\n    String key = String::from(k);\n    JSON_Value* _Borrow child = this->get_value(&_Const key);\n    return child;   // error: `key` does not live long enough\n}\n```\n\n**Three legitimate fixes, in order of preference:**\n\n**Fix A — Take the key as a borrow from the caller** (best). The caller owns the\n`String`, its lifetime covers the call:\n```c\n_Safe JSON_Value* _Borrow lookup(Obj* _Borrow this, const String* _Borrow key) {\n    return this->get_value(key);\n}\n```\n\n**Fix B — Recursion** when the helper value is produced per-step of a traversal.\nPass the remainder of the path into a recursive call; the helper's lifetime is\nself-contained to one recursion level:\n```c\n_Safe static T* _Borrow navigate(Parent* _Borrow p, const Path* _Borrow path, size_t pos) {\n    String segment = path->slice(pos, ...);   // local; destroyed at return\n    T* _Borrow child = p->get(&_Const segment);\n    // tail-call recursion carries child's lifetime, not segment's\n    return navigate_further(child, path, next_pos);\n}\n```\n\n**Fix C — Minimal `_Unsafe` block** when the lookup genuinely has a lifetime the\nchecker can't model (e.g., hash-map hit is guaranteed to return a pointer into\nexisting data). Cast through raw pointer:\n```c\n_Safe JSON_Value* _Borrow lookup(Obj* _Borrow this, const char* k) {\n    String key = String::from(k);\n    _Unsafe {\n        JSON_Value* _Borrow child = (JSON_Value* _Borrow)this->get_value(&_Const key);\n        // `key` destroyed at end of block, but the returned borrow points into `this`,\n        // not into `key` — checker can't see that.\n        return child;\n    }\n}\n```\n\nUse Fix C only when A and B are structurally impossible. Document **why** — next reader\nwill ask. This is the pattern used by `dotget_value` in parson.\n\n### 3.4 How to read BSC borrow-checker diagnostics\n\nThe BSC compiler's borrow diagnostics are more informative than they look at\nfirst. **Always read the `note:` lines, not just the `error:` line** — the\n`note:` is where the hint lives.\n\n**Borrow conflict (alias):**\n```\nfile.cbs:22:29: error: cannot borrow `b` as mutable more than once at a time\nfile.cbs:21:29: note: first mut borrow occurs here\n```\nThe `note:` tells you exactly which earlier line started the conflicting\nborrow. Fix: scope the first borrow tighter (wrap it in a block that ends\nbefore the second borrow) or restructure so only one is live at a time.\n\n**Borrow across a conflicting mutation:**\n```\nerror: cannot use `X` because it was mutably borrowed\nerror: cannot borrow `*X` as mutable more than once at a time\n```\nSame idea — `note:` points to the first borrow. Typical fix: scope that first\nborrow, or do the operation in a different order.\n\n**Use after move (no `note:` today — known gap):**\n```\nfile.cbs:12:13: error: use of moved value: `b`\n```\nThe compiler currently does NOT print a `note:` for where `b` was moved. Use\nLSP `hover` on `b`'s declaration to see its full ownership flow (it shows\n`Moved into foo()` with the exact line). See `/bsc-compile` §5 for LSP setup.\n\n**Lifetime / borrow returns:**\n```\nerror: no _Borrow qualified type found in the function parameters,\n       the return type is not allowed to be _Borrow qualified\n```\nThis explains the rule directly — the function returns a `_Borrow` but has\nno `_Borrow` param whose lifetime the return could be tied to. Fix: add a\n`_Borrow` parameter whose lifetime matches the returned borrow, or return\nan owned value instead.\n\n**Not-obvious messages that trip people up:**\n- `does not live long enough` — the compiler name for a local whose\n  lifetime is shorter than the context demands (usually a returned\n  `_Borrow` pointing to a local). See §3.3 for three fixes.\n- `cannot cast between _Owned and raw pointer` — you need\n  `__take_from_raw` / `__move_to_raw` for ownership transfer, or\n  `(T *)&_Mut *p` / `(T *)&_Const *p` for a non-transferring cast.\n\n**When the diagnostic still isn't enough, use LSP hover:**\n\nHover on the complaining variable — BSC's LSP (when configured; see\n`/bsc-compile` §5) reports its **full ownership timeline including the\nlive range**:\n\n```\nOwnership Flow:\nline 21: Declared\nline 21: Mut borrow of b\nLive range: lines 21-21\n```\n\nFor an owned value, hover also shows `Moved into foo()` with line numbers.\nThis is the information the use-after-move diagnostic should print but\ndoesn't — LSP fills the gap.\n\n## 4. Trait Mistakes\n\n### 4.1 Non-pointer trait variable\n```c\n// _Trait Printable obj;       // error: only pointer form\n_Trait Printable* obj = &val;  // correct\n```\n\n### 4.2 Missing `struct` keyword\n```c\n// void S::method(S* this) { ... }               // error (unless typedef-ed)\nvoid struct S::method(struct S* this) { ... }     // correct\n```\n\n### 4.3 `_Impl` before methods defined\n```c\n// Define methods FIRST, then _Impl\nvoid struct Circle::print(struct Circle* this) { ... }\n_Impl _Trait Printable for struct Circle;\n```\n\n## 5. Nullability Mistakes\n\n### 5.1 `_Owned` pointer without `_Nullable` when it can be null\n```c\n// int *_Owned p = nullptr;               // error: _Owned is Nonnull by default\nint *_Owned _Nullable p = nullptr;        // correct\n```\n\n### 5.2 Dereferencing nullable pointer without null check\n```c\n_Safe void f(int *_Borrow _Nullable p) {\n    // *p = 10;                           // error: nullable pointer\n    if (p != nullptr) { *p = 10; }       // correct: null check first\n}\n```\n\n### 5.3 Passing nullable to nonnull parameter\n```c\n_Safe void bar(int *_Borrow p) {}     // nonnull param\n_Safe void f(int *_Borrow _Nullable p) {\n    // bar(p);                          // error: nullable to nonnull\n    if (p != nullptr) { bar(p); }      // correct: checked\n}\n```\n\n## 6. Initialization Mistakes\n\n### 6.1 Using variable before initializing\n```c\n_Safe void f(void) {\n    int x;\n    // int y = x;                       // error: uninitialized\n    x = 42;\n    int y = x;                          // correct\n}\n```\n\n### 6.2 Array element-by-element assignment not counted\n```c\n_Safe void f(void) {\n    int arr[3];\n    arr[0] = 1; arr[1] = 2; arr[2] = 3;\n    // int x = arr[0];                  // error: arr not considered initialized\n    // FIX: use init list or __assume_initialized\n    int arr2[3] = {1, 2, 3};\n    int x = arr2[0];                    // correct\n}\n```\n\n### 6.3 Taking address of uninitialized variable\n```c\n_Safe void f(void) {\n    int x;\n    // int *_Borrow p = &_Mut x;       // error: x uninitialized\n    int x2 = 0;\n    int *_Borrow p = &_Mut x2;         // correct\n}\n```\n\n## 7. Async Mistakes\n\n### 7.1 `_Await` in binary expression\n```c\n// int result = _Await compute(1) + _Await compute(2);  // error\nint a = _Await compute(1);\nint b = _Await compute(2);\nint result = a + b;\n```\n\n### 7.2 Multiple `_Await` in same argument list\n```c\n// f(_Await g(), _Await h());          // error: multiple _Await at same level\nint a = _Await g();\nf(a, _Await h());                      // correct: pre-evaluate one\n```\n\n## 8. Debugging Runtime Memory Bugs\n\nWhen BSC code compiles cleanly but **double-frees** or **uses freed memory**\nat runtime, follow this triage flow before suspecting the compiler.\n\n### 8.1 Use valgrind, not gdb, to localize double-free\n\n`free(): double free detected in tcache 2` from glibc gives you only the second\nfree's stack trace under gdb. Valgrind shows BOTH frees and the original `malloc`,\nwhich is what you need to find the aliasing root cause.\n\n```bash\nvalgrind --error-exitcode=1 --leak-check=no ./binary\n```\n\nLook for the \"Invalid read\" / \"Invalid free\" report. The \"Address X is N bytes inside\na block of size M free'd\" line tells you where the same address was freed earlier,\nplus the stack at that earlier free.\n\n### 8.2 Rule out test-order pollution before blaming the compiler\n\nIf a function works in isolation (standalone repro binary) but fails when called\nafter other tests in a larger suite, the bug is **state pollution**, not codegen:\n\n- **Mutable globals** (e.g., parser cursors, allocation counters) that earlier\n  tests left in a non-zero state\n- **Static caches** in your library that don't reset between calls\n- **Heap layout sensitivity** — a leak in test N only manifests as a double-free\n  in test N+M when allocation sizes happen to alias\n\nReproduce with: build a minimal `main` that calls **only the failing function**\nin a fresh process. If it passes, the bug is contextual.\n\n### 8.3 Inspect the desugared AST (driver mode) before claiming compiler bug\n\nMost \"compiler bug\" hypotheses for destructor double-frees turn out to be wrong.\nVerify with:\n\n```bash\nclang -Xclang -ast-dump -fsyntax-only file.cbs -I./include\n```\n\nLook for the `varname_is_moved` flag and the `if (!varname_is_moved) ~Type(varname)`\nIfStmt for the variable you suspect. If the compiler's machinery is intact, the\n\
    bug is in your library's heap-pointer aliasing.\n\n**Do NOT use `clang -cc1 -fsyntax-only` for this** — it lacks system includes,\nwhich makes every `_Owned struct` spuriously \"invalid\" in the AST. See the\n`/bsc-compile` skill §6 for details.\n\n### 8.4 Common library-level causes of double-free\n\nWhen the compiler is doing the right thing, the real cause is usually one of:\n\n- **Tagged-struct-as-union**: every instance carries a heap pointer for every\n  variant, so two instances can alias if construction shares pointers\n  unintentionally. See `/bsc-design` Rule 7 and §2 \"Replacing C unions.\"\n- **`safe_swap` between aliased pointers**: a swap that leaves both sides\n  pointing at overlapping ownership.\n- **Returning a borrow whose underlying owned value is moved by the caller**:\n  the borrow becomes dangling.\n- **Manual `_Unsafe` byte-assignment overwriting an `_Owned` slot without\n  destructing the previous contents**: the old heap pointers leak (single\n  copy) or alias (if they were just shifted in by `memmove`).\n\n### 8.5 Triage flow summary\n\n1. Reproduce under valgrind → get both free sites + malloc origin.\n2. Test in isolation → confirm/deny test-order pollution.\n3. Driver-mode AST dump → confirm compiler destructor insertion is correct.\n4. Only THEN consider compiler-level bug. In practice, >90% of double-frees in\n   BSC projects trace to library-level aliasing, not codegen.\n\n### 8.6 Known compiler bug: `_Owned` arg in `if`/`while`/`for` condition is not move-tracked\n\nThe BSC destructor desugar pass (`SemaBSCDestructor.cpp::VisitCompoundStmt`) only\nruns move-tracking for statements whose **outer** type is `BinaryOperator`,\n`DeclStmt`, or `CallExpr`. When a function call consuming an `_Owned` argument\nappears **inside an `if`/`while`/`for`/`switch` condition**, the outer statement\nis `IfStmt` (etc.), so the move-tracking is skipped entirely. The `is_moved`\nflag never gets set to 1, and the destructor fires at scope exit on already-freed\nmemory → double free.\n\n**Symptom:** `free(): double free detected in tcache 2` immediately after a\nfunction call that takes `_Owned` argument(s) and is wrapped in an `if` condition.\n\n**Minimal reproducer (29 lines):**\n\n```c\n#include \"bishengc_safety.hbs\"\n#include <stdlib.h>\n\n_Owned struct Box {\n_Public:\n    int *_Owned data;\n    ~Box(Box this) {\n        _Unsafe { free((void*)__move_to_raw(this.data)); }\n    }\n};\n\n_Safe Box Box::new(void) {\n    Box b = { .data = safe_malloc(0) };\n    return b;\n}\n\n_Safe int consume(Box b) { return 1; }   /* takes ownership */\n\nint main(void) {\n    Box b = Box::new();\n    if (consume(b) == 1) { }  /* BUG: b not marked moved → double free at } */\n    return 0;\n}\n```\n\n**AST evidence** — dump with `clang -Xclang -ast-dump -fsyntax-only`:\n- Working pattern (`int r = consume(b); if (r == 1) {}`): AST shows\n  `BinaryOperator '=' b_is_moved = 1` after the call.\n- Buggy pattern (`if (consume(b) == 1) {}`): NO `b_is_moved = 1` assignment,\n  only the initial `b_is_moved = 0` and the destructor `if (!b_is_moved)` check.\n\n**Workaround** — store the call result in a local before testing:\n\n```c\n// BAD — double free\nif (consume(owned_value) == 1) { ... }\n\n// GOOD — extract the call\nint result = consume(owned_value);\nif (result == 1) { ... }\n\n// ALSO GOOD — call as standalone statement\nconsume(owned_value);\nif (some_other_check) { ... }\n```\n\n**This bug applies to**:\n- `if (call(owned) ...)` and `if (... call(owned) ...)`\n- `while (call(owned) ...)`, `for (...; call(owned); ...)`\n- `switch (call(owned))`\n- Any condition expression containing a `CallExpr` that consumes `_Owned` args\n\n**This bug does NOT apply to**:\n- `T result = call(owned);` followed by `if (result ...)` — DeclStmt is checked\n- `call(owned);` as a standalone statement — CallExpr is checked\n- `lhs = call(owned);` as a top-level assignment — BinaryOperator is checked\n\n**When you suspect this bug:** convert one suspected call site to the workaround\nform. If the double-free goes away, you've confirmed it. Apply the same workaround\nto all sibling sites in the same scope.\n\n### 8.7 Known compiler bug: destructor of `_Owned` local fires BEFORE a return expression that borrows it\n\nThe destructor desugar pass emits the destructor `IfStmt` for each `_Owned` local\nas a sibling statement **before** the `ReturnStmt` at scope end. If the return\nexpression is a call that reads through a borrow of that local\n(`return f(&_Const b, ...)`), the call runs **on already-destructed memory** and\nreturns a wrong value. No crash, no warning — just a silently-corrupt return.\n\nThis is distinct from §8.6: that one is a missing move-flag assignment in an\n`if`/`while` condition. This one is misordering between destructor insertion\nand the `ReturnStmt`'s operand evaluation, even when no move is involved.\n\n**Symptom:** a `_Safe` function returning `_Bool` or `int` that contains an\n`_Owned` local and a `return f(...borrow of that local...);` returns the wrong\nvalue. Adding any `_Unsafe { printf(...); }` between the call and the return\nmakes it \"start working\" — because the print forces the value into a named\ntemporary whose lifetime spans the destructor.\n\n**Minimal reproducer (30 lines):**\n\n```c\n#include \"string.hbs\"\n#include <stdio.h>\n\n_Safe static String make(void) { _Unsafe { return String::from(\"x\"); } }\n\n_Safe static _Bool buggy(const String* _Borrow a) {\n    String b = make();\n    return a->equals(&_Const b);   /* BUG: returns 0 even though a == b */\n}\n\n_Safe static _Bool stashed(const String* _Borrow a) {\n    String b = make();\n    _Bool r = a->equals(&_Const b);\n    return r;                       /* OK: returns 1 */\n}\n\nint main(void) {\n    String a = make();\n    _Unsafe {\n        printf(\"buggy   = %d\\n\", (int)buggy  (&_Const a));  /* prints 0 */\n        printf(\"stashed = %d\\n\", (int)stashed(&_Const a));  /* prints 1 */\n    }\n    return 0;\n}\n```\n\n**AST evidence** — dump with `clang -Xclang -ast-dump -fsyntax-only`.\n\nBuggy pattern's `CompoundStmt`:\n```\n├── DeclStmt: b = make()\n├── DeclStmt: b_is_moved = 0\n├── IfStmt: if (!b_is_moved) ~String(b)     ← destructor fires HERE\n└── ReturnStmt\n    └── CallExpr: a->equals(&_Const b)      ← b read AFTER destructor\n```\n\nStashed pattern's `CompoundStmt`:\n```\n├── DeclStmt: b = make()\n├── DeclStmt: b_is_moved = 0\n├── DeclStmt: r = a->equals(&_Const b)      ← b read BEFORE destructor\n├── IfStmt:  if (!b_is_moved) ~String(b)\n└── ReturnStmt: return r\n```\n\nSame set of nodes, different order. The pass inserts the destructor `IfStmt` at\nthe end of the statement list regardless of whether the trailing `ReturnStmt`'s\noperand still borrows the owned local.\n\n**Triggering conditions** — all three must hold:\n1. The function has an `_Owned` local (`String`, any `_Owned struct`) still in scope at return.\n2. The return expression is a `CallExpr` that takes a `*_Borrow` to that local (directly or transitively through another arg).\n3. The callee actually **dereferences** that borrow to compute the return value. Callees that ignore the borrow argument don't trigger the bug.\n\n**Workaround** — stash the call result in a named local first:\n\n```c\n// BAD — wrong return value\n_Safe _Bool check(const String* _Borrow a) {\n    String b = make();\n    return a->equals(&_Const b);\n}\n\n// GOOD — same code, result stashed in a local\n_Safe _Bool check(const String* _Borrow a) {\n    String b = make();\n    _Bool r = a->equals(&_Const b);\n    return r;\n}\n```\n\nThe stashing forces the use of `b` into an earlier `DeclStmt`, which completes\nbefore the destructor slot. The `ReturnStmt` then only reads `r` (a plain\n`_Bool`, no borrow), so the destructor ordering no longer matters.\n\n**How to notice this bug in the wild:** the values coming back from a helper\nfunction look inverted or nonsensical, but the helper's own logic is correct.\nInsert a `printf` between the last borrow-use and the return — if the bug\ndisappears, you're hitting §8.7. Apply the stash workaround.\n\n**This bug applies to any return-expression shape where the return value depends\non a callee reading through a borrow of an in-scope `_Owned` local**, including:\n- `return owned_local.method(...);` where the method reads `this`\n- `return helper(&_Const owned_local);`\n- `return outer(inner(&_Const owned_local));`\n\n**This bug does NOT apply when:**\n- The return expression doesn't reference the `_Owned` local at all\n- The return value is already a plain copy computed before the return statement\n- The `_Owned` local has been moved out before the return (then the destructor\n  is skipped by `b_is_moved=1`, and there's no freed-memory read)\n\n## 9. Quick Reference\n\n| Mistake | Fix |\n|---------|-----|\n| `_Owned char*` | `char *_Owned` — qualifier after `*` |\n| `_Borrow int*` | `int *_Borrow` — qualifier after `*` |\n| `&` in `_Safe` | Use `&_Const` or `&_Mut` |\n| `int x = i++` in `_Safe` | `i++` ok as statement; result is `void` |\n| `_Safe int f()` | `_Safe int f(void)` |\n| Partial init in safe | Required only for structs **with pointer fields** |\n| Union `.member` in safe | Forbidden — use `_Unsafe {}` escape |\n| Cast categories in safe | No cross-casts (except `T *_Owned` to `void *_Owned`) |\n| `&_Mut` global in safe | Forbidden — only `&_Const` of globals |\n| `_Trait T var` | `_Trait T* ptr` |\n| Missing `struct` | `struct S` unless typedef-ed |\n| Use after move | Use before transferring ownership |\n| Owned not freed | `safe_free`, pass, or return before scope ends |\n| `_Await` in expr | Assign to variable first |\n| Multiple `_Await` in args | Pre-evaluate one: `int a = _Await g(); f(a, _Await h());` |\n| `_Owned _Borrow` | Illegal — pick one |\n| Borrow of borrow | `T *_Borrow *_Borrow` — restriction (pick single level) |\n| `_Owned` without `_Nullable` | Add `_Nullable` if pointer can be null |\n| Deref nullable | Null-check\
    \ first: `if (p != nullptr) { *p = ... }` |\n| Array init by element | Use init list `{1,2,3}` or `__assume_initialized` |\n| Uninitialized local | Initialize before use; field-level tracking applies |\n| Wrong return value from borrow of owned local | Stash into a local first; see §8.7 |\n\n> For detailed error codes, see `bsc-errors` Skill\n> For safe zone rules, see `bsc-safe-zone` Skill\n> For ownership rules, see `bsc-ownership` Skill\n> For nullability rules, see `bsc-nullability` Skill\n> For initialization analysis, see `bsc-initialization` Skill\n\n---\n\n\n# BiSheng C Compilation Skill\n\n## 1. Compiler Path Setup\n\nThe BSC compiler is a custom clang build — it is NOT the system `clang`. Before compiling, you need the path to the BSC clang binary.\n\n**Where to find the path:** Check the project's `CLAUDE.md` (or `.cursorrules` / `AGENTS.md`) for a line like:\n\n```\nBSC compiler path: /path/to/bsc/bin/clang\n```\n\nIf no path is configured, ask the user. Then use the full path in all compile commands:\n\n```bash\n/path/to/bsc/bin/clang file.cbs -o output\n```\n\n**Recommended project setup:** Add the compiler path to `CLAUDE.md` so the AI always knows where to find it:\n\n```markdown\n## BSC Compiler\n- Path: /home/user/bsc/build/bin/clang\n- libcbs include: /home/user/bsc/libcbs/src\n```\n\n## 2. Basic Usage\n\n```bash\n# Compile to executable\n/path/to/bsc/bin/clang file.cbs -o output\n\n# With optimization\n/path/to/bsc/bin/clang file.cbs -O2 -o output\n\n# Syntax check only (no binary output)\n/path/to/bsc/bin/clang -fsyntax-only file.cbs\n\n# With warnings\n/path/to/bsc/bin/clang -Wall -Wextra file.cbs -o output\n\n# With debug info\n/path/to/bsc/bin/clang -g file.cbs -o output\n/path/to/bsc/bin/clang -g -gdwarf-4 file.cbs -o output  # better gdb compat\n\n# Compile .c / .h files AS BSC (overrides extension-based detection)\n/path/to/bsc/bin/clang -x bsc file.c -o output       # driver form, space-separated\n/path/to/bsc/bin/clang -cc1 -xbsc file.c             # cc1 form, no space\n```\n\n**`-x bsc` use cases**: incremental C→BSC migration without renaming every file; keeping the original `.c`/`.h` extensions for compatibility with external tooling. Only `.cbs`/`.hbs` are auto-detected as BSC — everything else needs the flag. Most editor/LSP tooling keys off `.cbs`/`.hbs`, so keeping `.c`/`.h` means you lose BSC-aware editor features.\n\n## 3. Include Paths\n\nBSC has two include directories that may need `-I` flags:\n\n| Path | Contains |\n|------|----------|\n| `libcbs/src/` | Standard library headers (`vec.hbs`, `string.hbs`, etc.) |\n| `clang/lib/Headers/bsc_include/` | Built-in headers (`bsc_type_traits.hbs`, `future.hbs`, etc.) |\n\n```bash\n/path/to/bsc/bin/clang -I/path/to/libcbs/src -I/path/to/bsc_include file.cbs -o output\n```\n\n### Linking libcbs (`String`, `Vec`, etc. are NOT header-only)\n\n`String`, `Vec`, `LinkedList`, `Option`, `Result`, and all other libcbs types have\ncompiled implementations in `libstdcbs.a`. Including their `.hbs` headers without linking\nthe library produces \"undefined reference to `struct_String_new`\" (and similar) at link\ntime. Always add `-L<install>/lib -lstdcbs` when using any libcbs type:\n\n```bash\n/path/to/bsc/bin/clang file.cbs \\\n    -I/path/to/install/include/libcbs \\\n    -L/path/to/install/lib -lstdcbs \\\n    -o output\n```\n\nIf the program also uses pthreads (e.g. a thread pool), add `-lpthread` as well. The\n`bishengc_safety.hbs` primitives (`safe_malloc`, `safe_free`, `safe_swap`) are also\nimplemented in `libstdcbs` — they are not macros.\n\n## 4. Special Modes\n\n```bash\n# Source-to-source rewrite (BSC → C)\n/path/to/bsc/bin/clang -rewrite-bsc file.cbs\n# Produces file.c with BSC features lowered to plain C\n\n# Rewrite with include path (needed for stdlib types)\n/path/to/bsc/bin/clang -rewrite-bsc file.cbs -I/path/to/libcbs/src\n\n# Rewrite with explicit output\n/path/to/bsc/bin/clang -rewrite-bsc file.cbs -o output.c\n\n# Rewrite multiple files\n/path/to/bsc/bin/clang -rewrite-bsc foo.cbs bar.cbs\n\n# Rewrite with line-number mapping (for debugging)\n/path/to/bsc/bin/clang -rewrite-bsc -line file.cbs -o file.c\n\n# AST dump\n/path/to/bsc/bin/clang -Xclang -ast-dump -fsyntax-only file.cbs\n```\n\n## 5. Reading BSC Compiler Diagnostics\n\n### Always read `note:` lines alongside `error:`\n\nThe BSC compiler emits `note:` source locations alongside borrow-checker\nerrors to tell you **where the conflicting prior borrow started**:\n\n```\nfile.cbs:22:29: error: cannot borrow `b` as mutable more than once at a time\nfile.cbs:21:29: note: first mut borrow occurs here\n```\n\nWithout reading the `note:`, the error looks opaque. Reading it, the fix\nbecomes obvious — scope the borrow on line 21 to end before line 22.\n\n**Known gaps** (as of current compiler):\n- `error: use of moved value: X` has NO accompanying `note:` pointing to\n  the move site. Use LSP `hover` on `X` to see the move location.\n- No `help:` suggestions for fix patterns — you have to know the idioms\n  (see `/bsc-common-mistakes` §3.3 for the \"local-borrow-outlives\" recipes).\n\n### LSP is the canonical source for live-range info\n\n`hover` on any `_Owned` or `_Borrow` variable returns the full ownership\ntimeline AND an explicit live range:\n\n```\nOwnership Flow:\nline 21: Declared\nline 21: Mut borrow of b\nLive range: lines 21-21\n```\n\nFor owned values: hover shows `Moved into foo()` / `Freed` / `Dropped`\nevents with exact line numbers.\n\nWhen the compiler diagnostic is terse, **always check LSP hover** on the\nvariable the error names — it has more detail than the diagnostic prints.\nSee §6 below for destructor-bug debugging via LSP + AST dump.\n\n## 6. Inspecting Destructor Insertion (Debugging Memory Bugs)\n\nWhen you hit a runtime `double free` or `use after free` and suspect the\ncompiler's destructor insertion is wrong, the source of truth is the\n**post-desugar AST** in driver mode.\n\n### CRITICAL: Use the driver, not `-cc1` directly\n\n```bash\n# WRONG — missing system includes, makes every _Owned struct spuriously\n# \"invalid\", producing misleading RecoveryExpr / <dependent type> AST nodes\nclang -cc1 -fsyntax-only -ast-dump file.cbs -I./include\n\n# RIGHT — driver picks up system includes (stdlib.h, string.h, etc.)\nclang -Xclang -ast-dump -fsyntax-only file.cbs -I./include\n```\n\nIn `-cc1` mode without system includes, `stdlib.h` is not found → `bishengc_safety.hbs`\nfails to parse → every `_Owned struct` using `String`/`Vec` gets marked\n`referenced invalid struct ... definition` → every member access through them\nbecomes `RecoveryExpr` / `CXXDependentScopeMemberExpr`. This AST looks broken\nbut does not reflect what actual codegen produces. **Always use driver mode\n(`-Xclang -ast-dump`) for destructor-related debugging.**\n\n### What correct destructor insertion looks like\n\nFor every `_Owned struct` local or parameter, the desugared AST should show:\n\n```\n# At function/parameter entry:\nDeclStmt\n  VarDecl 'varname_is_moved' 'bool' cinit\n    IntegerLiteral 'int' 0\n\n# After a CallExpr or BinaryOperator that uses the var:\nBinaryOperator 'bool' '='\n  DeclRefExpr 'varname_is_moved' 'bool'\n  IntegerLiteral 'int' 1\n\n# At scope exit (or ReturnStmt):\nIfStmt\n  UnaryOperator '!' → DeclRefExpr 'varname_is_moved'\n  CallExpr → BSCMethod '~TypeName' → DeclRefExpr 'varname'\n```\n\nIf all three pieces are present and well-formed for the variable you suspect,\n**the compiler's insertion is correct** and the bug is elsewhere (usually\naliasing between heap-pointer fields in your struct layout).\n\n### Generic templates dump differently\n\n`Vec<T>::insert_at` in its **template form** shows `<dependent type>` on every\nmember access through `T` — this is normal. Destructor desugaring runs\n**per-instantiation**, so check `Vec<ConcreteType>::insert_at` (search the AST\ndump for the mangled/instantiated form) to see real codegen.\n\nDon't let template-form `<dependent type>` markers spook you into a false\n\"compiler bug\" diagnosis.\n\n### Triage flow when debugging a destructor-related double-free\n\n1. **Reproduce under valgrind first** — `valgrind --leak-check=no ./binary`.\n   The \"Invalid read\" stack traces show both the failing free AND the prior\n   free site, plus the `malloc` origin. This localizes the bug far better\n   than gdb on the abort.\n2. **Check for test-order pollution** — does the failing function work in a\n   fresh binary with just that code? If yes, a prior test is leaving global\n   state (parser globals, allocation counters) that triggers the bug later.\n3. **Dump the driver-mode AST** and verify the `_is_moved` flag machinery\n   for the suspected variable.\n4. **Only after 1-3** consider compiler-level bug hypotheses. Confirmed\n   compiler bugs exist (see common-mistakes §8.6 for the `if`-condition\n   move-tracking bug), but library-level aliasing is the more common cause.\n\n### Useful grep patterns on AST dumps\n\n```bash\n# Save the full AST for grepping (driver mode!)\nclang -Xclang -ast-dump -fsyntax-only file.cbs -I./include 2>/dev/null > ast.txt\n\n# Find the move-flag VarDecl + every assignment + the destructor IfStmt for `varname`\ngrep -B1 -A2 \"varname_is_moved\" ast.txt\n\n# Find all RecoveryExpr / dependent-type markers on non-template code (real bug indicator)\ngrep -B2 \"RecoveryExpr\\|<dependent type> contains-errors\" ast.txt | grep -v \"<T>\"\n\n# Show only the body of a specific function\nsed -n '/FunctionDecl.*funcname/,/^|-/p' ast.txt\n\n# Look for missing move tracking (declaration without any assignment to 1)\n# If you see VarDecl '...is_moved' but no BinaryOperator '=' setting it,\n# the compiler missed a move event — likely the if-condition bug.\n```\n\n### Spotting the if-condition compiler bug from the AST\n\nIf the AST shows for variable `b`:\n- A `VarDecl 'b_is_moved'` (declared, init 0)\n- A destructor `IfStmt` checking `!b_is_moved`\n- BUT no `BinaryOperator '=' b_is_moved =\
    \ 1` between them\n\n…and there's a function call consuming `b` in the source — check whether that\ncall appears inside an `if`/`while`/`for`/`switch` condition. If yes, you've hit\nthe documented compiler bug. See common-mistakes §8.6 for workaround.\n\n## 7. Diagnostic Suppression\n\nBSC safety checks are errors by default. To suppress specific diagnostics, use `-Eno-<identifier>` on the command line or `#pragma` in source.\n\n### Command-line suppression: `-Eno-<identifier>`\n\n```bash\n# Suppress repeated-borrow errors\n/path/to/bsc/bin/clang -Eno-repeated-borrow file.cbs\n\n# Suppress all borrow checks\n/path/to/bsc/bin/clang -Eno-bsc-borrow file.cbs\n\n# Suppress all BSC safety checks\n/path/to/bsc/bin/clang -Eno-bsc-safety-check file.cbs\n```\n\n### In-source suppression: `#pragma`\n\n```c\n#pragma GCC diagnostic push\n#pragma GCC diagnostic ignored \"-Eassign-borrowed\"\n*p1 = 2;  // this error is now suppressed\n#pragma GCC diagnostic pop\n```\n\n### Diagnostic identifier hierarchy\n\n```\nbsc-safety-check                    # All BSC safety checks\n├── bsc-nullability                 # All nullability checks\n│   ├── deref-nullable              #   Dereference nullable pointer\n│   ├── pass-nullable               #   Pass nullable as argument\n│   ├── return-nullable             #   Return nullable pointer\n│   ├── cast-nullable               #   Cast nullable to nonnull\n│   ├── assign-nullable             #   Access member through nullable\n│   └── assign-nonnull              #   Assign nullable to nonnull\n├── bsc-ownership                   # All ownership checks\n│   ├── use-owned                   #   Use-after-move/uninit group\n│   │   ├── use-moved-owned         #     Use after move\n│   │   └── use-uninit-owned        #     Use uninitialized\n│   ├── assign-owned                #   Assign to owned group\n│   │   ├── assign-moved-owned      #     Assign to moved value\n│   │   └── assign-uninit-owned     #     Assign to part of uninit\n│   ├── cast-owned                  #   Invalid cast to void *_Owned\n│   │   └── cast-moved-owned        #     Cast moved value\n│   ├── check-memory-leak           #   Memory leak detection\n│   ├── init-nonnull                #   _Nonnull pointer not initialized\n│   ├── destruct-owned-struct       #   Destructor incorrect\n│   └── partially-moved-struct      #   Partially moved at scope end\n└── bsc-borrow                      # All borrow checks\n    ├── assign-borrowed             #   Assign to borrowed value\n    ├── move-borrowed               #   Move borrowed value\n    ├── use-mutably-borrowed        #   Use while mutably borrowed\n    ├── repeated-borrow             #   Multiple mutable borrows\n    ├── return-local-borrow         #   Return reference to local\n    └── short-life-borrow           #   Lifetime too short\n```\n\n> For error messages and codes, see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C constexpr Skill\n\n## 1. constexpr Variables\n\n```c\nconstexpr int SIZE = 1024;\nconstexpr int DOUBLED = SIZE * 2;\nint arr[SIZE];  // OK: constexpr as array size\n_Static_assert(SIZE == 1024, \"wrong\");\n```\n\n- Must be initialized at definition\n- **Compile-time computable types**: `bool`, `char` (signed/unsigned char), integer types (`int` and variants with `short`/`signed`/`unsigned`/`long`/`long long`), and aliases of these. Excludes enum types, float/double\n- Cannot be modified after definition\n- Initializer must be a constant expression (literal, other constexpr, constexpr function call)\n- constexpr pointers can only point to global or static variables\n\n### Contexts where constexpr values can be used\n1. `_Static_assert` first parameter\n2. Fixed-length array size: `int arr[CONSTEXPR_VAL]`\n3. Initialize other constexpr constants\n4. Constant generic parameters: `Array<int, CONSTEXPR_VAL>`\n\n## 2. constexpr Functions\n\n```c\nconstexpr int factorial(int n) {\n    if (n <= 1) return 1;\n    return n * factorial(n - 1);\n}\n\nconstexpr int result = factorial(5);  // evaluated at compile time\nint runtime_result = factorial(x);    // also works at runtime\n```\n\n**Rules:**\n- Params and return: compile-time computable types only (no void return)\n- Body: no static vars, no non-constexpr calls, no external non-constexpr vars, no asm\n- **Declaration and definition must both have `constexpr`, or neither** — mismatch is an error\n- Function parameters cannot use constexpr: `int foo(constexpr int a)` is an error\n- Cannot be `_Async` functions\n- Cannot be variadic functions\n- Can modify constexpr generic functions: `constexpr int f<T>() { ... }`\n- Can modify static member functions: `constexpr int int::foo() { ... }`\n- Cannot modify instance member functions (`this` pointer is not a compile-time computable type)\n\n## 3. constexpr if\n\nRequires `#include <bsc_type_traits.hbs>`.\n\n```c\n#include <bsc_type_traits.hbs>\n\nvoid process<T>(T value) {\n    if constexpr (is_pointer<T>()) {\n        void* p = (void*)value;        // only compiled when T is pointer\n    } else if constexpr (is_integral<T>()) {\n        int n = value;                 // only compiled when T is integer\n    } else {\n        // generic fallback\n    }\n}\n```\n\n**Condition rules:**\n- Must be a compile-time constant expression\n- Type must be implicitly convertible to bool: bool, integer, or char are valid\n- float/double conditions are **not allowed**: `if constexpr(5.0)` is an error\n\n**Discarded (false) branch rules:**\n- In **generic context**: discarded branch is not instantiated — no post-instantiation semantic checking occurs (allows type-dependent code that would be invalid for some T)\n- In **non-generic context**: discarded branch **is** fully type-checked — it is only dead-code-eliminated, not skipped for semantic analysis\n\n## 4. Type Traits\n\nRequire `#include <bsc_type_traits.hbs>`.\n\n### 4.1 Type Classification\n\n```c\nconstexpr bool is_integral<T>();         // int, char, bool, etc.\nconstexpr bool is_floating_point<T>();   // float, double\nconstexpr bool is_pointer<T>();\nconstexpr bool is_function<T>();\nconstexpr bool is_array<T>();\nconstexpr bool is_struct<T>();\nconstexpr bool is_union<T>();\nconstexpr bool is_enum<T>();\nconstexpr bool is_void<T>();\n```\n\n### 4.2 Type Properties\n\n```c\nconstexpr bool is_signed<T>();\nconstexpr bool is_unsigned<T>();\nconstexpr bool is_const<T>();\nconstexpr bool is_volatile<T>();\nconstexpr bool is_owned_pointer<T>();    // T is an _Owned pointer\nconstexpr bool is_owned_struct<T>();     // T is an _Owned struct\nconstexpr bool is_borrow<T>();           // T is any _Borrow pointer\nconstexpr bool is_immut_borrow<T>();     // T is const _Borrow (immutable)\nconstexpr bool is_mut_borrow<T>();       // T is non-const _Borrow (mutable)\nconstexpr bool is_move_semantic<T>();    // _Owned pointer, _Owned struct, or struct with _Owned members\nconstexpr bool is_trivial_data<T>();     // no raw pointers, _Owned pointers, _Borrow pointers, or _Owned structs\nconstexpr size_t rank<T>();              // array dimension count\nconstexpr size_t extent<T, size_t N>();  // size of Nth dimension\n```\n\n**`is_trivial_data<T>()`** — true when T contains no raw pointers, `_Owned` pointers, `_Borrow` pointers, or `_Owned struct` types. Useful for determining if a type can be safely memcpy'd:\n\n```c\nstruct Simple { int a; float b; };           // is_trivial_data → true\nstruct HasPtr { int *p; };                   // is_trivial_data → false (raw pointer)\nstruct HasOwned { int *_Owned p; };          // is_trivial_data → false (_Owned pointer)\n```\n\n**`is_move_semantic<T>()`** — true for three categories:\n1. `_Owned` pointer types\n2. `_Owned struct` types\n3. Struct types containing `_Owned` pointer members\n\n### 4.3 Type Relationships\n\n```c\nconstexpr bool is_same<T1, T2>();\nconstexpr bool is_convertible<From, To>();\n```\n\n### 4.4 Conditional Type Alias\n\nRequires `#include <bsc_conditional.hbs>`.\n\n```c\n#include <bsc_conditional.hbs>\ntypedef conditional<int C, T, F> = __conditional(int C, T, F);\n\n// When C is non-zero → resolves to type T; when C is zero → resolves to type F\nconditional<1, int, float> x = 42;     // x is int\nconditional<0, int, float> y = 3.14;   // y is float\n```\n\nC must be a compile-time evaluable constant expression.\n\n## 5. Complete Example\n\n```c\n#include <stdio.h>\n#include <bsc_type_traits.hbs>\n\nconstexpr int fib(int n) {\n    if (n <= 1) return n;\n    return fib(n - 1) + fib(n - 2);\n}\n\n_Static_assert(fib(10) == 55, \"fib(10) should be 55\");\n\nconstexpr int FIB10 = fib(10);\nint arr[FIB10];  // array of 55 elements\n\nvoid printTyped<T>(T value) {\n    if constexpr (is_integral<T>()) {\n        printf(\"int: %d\\n\", (int)value);\n    } else if constexpr (is_floating_point<T>()) {\n        printf(\"float: %f\\n\", (double)value);\n    } else if constexpr (is_pointer<T>()) {\n        printf(\"pointer: %p\\n\", (void*)value);\n    }\n}\n\nint main() {\n    printf(\"fib(10) = %d\\n\", FIB10);\n    printTyped<int>(42);\n    printTyped<float>(3.14f);\n    int x = 10;\n    printTyped<int*>(&x);\n    return 0;\n}\n```\n\n> For generic functions, see `bsc-generic` Skill\n> For conditional type aliases in generics, see `bsc-generic` Skill\n> For generics/constexpr errors (BSC-E09xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Coroutines Skill\n\n## 1. Overview\n\nStackless coroutines. Requires `#include \"future.hbs\"`.\n\n## 2. PollResult<T> and Future<T>\n\n`poll()` returns `struct PollResult<T>`, not void. This is critical for checking completion.\n\n```c\nstruct PollResult<T> {\n    _Bool isPending;  // true if not yet complete\n    T res;            // result value (valid when isPending == false)\n};\n\n// PollResult methods:\n_Bool struct PollResult<T>::is_pending(struct PollResult<T>* this);\nstruct PollResult<T> struct PollResult<T>::pending();\n_Bool struct PollResult<T>::is_completed(struct PollResult<T>* this, T* out);\nstruct PollResult<T> struct\
    \ PollResult<T>::completed(T result);\n\n_Trait Future<T> {\n    struct PollResult<T> poll(This* this);\n    void free(This* this);\n};\n```\n\n## 3. Basic Syntax\n\n```c\n#include \"future.hbs\"\n\n_Async int fetchData(int id) {\n    return id * 2;\n}\n\n_Async int processAll() {\n    int a = _Await fetchData(1);\n    int b = _Await fetchData(2);\n    return a + b;\n}\n\nint main() {\n    _Trait Future<int>* task = processAll();  // returns Future, does not execute\n    struct PollResult<int> pr = task->poll(); // drives the coroutine, returns PollResult\n    // pr.isPending == false when done; pr.res holds the result\n    task->free();                             // free coroutine resources\n    return 0;\n}\n```\n\n## 4. Rules\n\n- `_Async` functions return `_Trait Future<ReturnType>*` when called\n- For `void` return: use `_Trait Future<struct Void>*` (compiler auto-creates `struct Void`)\n- `_Await` can only appear inside `_Async` functions\n- `_Async` supports recursion\n- `_Async` can modify member functions: `_Async void int::g(int* this);`\n- `constexpr` cannot modify `_Async` functions\n- No variable-length arrays in `_Async` functions\n\n### 4.1 Where `_Await` CAN appear\n\n- Assignments: `int x = _Await f();`\n- Return statements: `return _Await f();`\n- Nested `_Await` calls: `_Await f(_Await g())` — allowed in nested args\n- Multi-level nesting: `_Await test1(_Await test2(start))` — OK\n- Function args with no other side-effect expressions: `f(3, _Await g())`\n- Directly awaiting a Future variable: `_Await futurePtr;`\n\n### 4.2 Where `_Await` CANNOT appear\n\n- if/while/for/do-while **conditions**: `if (_Await f()) { ... }`\n- Binary expressions: `_Await f() + 1`\n- Function args alongside other function calls (side-effects): `f(t(), _Await g())`\n- **Multiple `_Await` in same call argument list**: `f(_Await g(), _Await h())`\n\nThe distinction: nested `_Await` as an argument (`_Await f(_Await g())`) is allowed, but multiple `_Await` at the **same argument level** (`f(_Await g(), _Await h())`) is forbidden.\n\n### 4.3 Workarounds\n\n```c\n// Wrong: binary expression\nint result = _Await compute(1) + _Await compute(2);\n\n// Correct: split into assignments\nint a = _Await compute(1);\nint b = _Await compute(2);\nint result = a + b;\n\n// Wrong: side-effect expression alongside _Await\ntest(t(), _Await read(2));\n\n// Correct: pre-evaluate the side-effect call\nint tmp = t();\ntest(tmp, _Await read(2));\n```\n\n## 5. Scheduler (Concurrent Task Execution)\n\nRequires `#include \"scheduler.hbs\"`.\n\nThe `Scheduler` manages a thread pool and task queue for concurrent async execution. Only one Scheduler per process.\n\n### API\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `init` | `struct Scheduler::init(unsigned int threadCount)` | Initialize scheduler with N threads |\n| `spawn` | `struct Scheduler::spawn(_Trait Future<struct Void>* future)` → `struct Task*` | Queue an async task (void return only) |\n| `run` | `struct Scheduler::run()` | Execute all queued tasks |\n| `destroy` | `struct Scheduler::destroy()` | Destroy scheduler, free resources |\n\n### Lifecycle\n1. `init` — must be called once before `spawn`/`run`; cannot re-initialize\n2. `spawn` — queues tasks but does NOT execute them\n3. `run` — starts executing queued tasks on the thread pool\n4. `destroy` — cleanup; process cannot terminate without this\n\n### Example\n\n```c\n#include \"scheduler.hbs\"\n\natomic_int g_count = 10;\n\n_Async void doWork(int i) {\n    printf(\"Task %d\\n\", i);\n    atomic_fetch_sub(&g_count, 1);\n    if (atomic_load(&g_count) == 0) {\n        struct Scheduler::destroy();\n    }\n}\n\nint main() {\n    struct Scheduler::init(4);           // 4 threads\n    for (int i = 0; i < 10; i++) {\n        struct Scheduler::spawn(doWork(i));  // queue tasks\n    }\n    struct Scheduler::run();             // execute\n    return 0;\n}\n```\n\nNote: task execution order is non-deterministic — suitable for tasks that don't require strict ordering.\n\n`spawn` also accepts explicitly constructed `_Trait Future<struct Void>*` (not just `_Async` function calls).\n\n## 6. Complete Example\n\n```c\n#include \"future.hbs\"\n#include <stdio.h>\n\n_Async int computeValue(int x) {\n    return x * 2;\n}\n\n// Recursion supported\n_Async int factorial(int n) {\n    if (n <= 1) return 1;\n    int sub = _Await factorial(n - 1);\n    return n * sub;\n}\n\n// _Await on a Future variable directly\n_Async int awaitVariable() {\n    _Trait Future<int>* fut = computeValue(5);\n    return _Await fut;\n}\n\n_Async void logMessage(int id) {\n    int val = _Await computeValue(id);\n}\n\nint main() {\n    _Trait Future<int>* task1 = factorial(5);\n    struct PollResult<int> pr1 = task1->poll();\n    // pr1.res contains the result when pr1.isPending == false\n    task1->free();\n\n    _Trait Future<struct Void>* task2 = logMessage(42);\n    task2->poll();\n    task2->free();\n\n    return 0;\n}\n```\n\n> For trait pointers (Future<T> uses them), see `bsc-trait` Skill\n> For async errors (BSC-E08xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Design Skill\n\nBSC is not just \"C with annotations\" — the ownership system changes how APIs are shaped.\nThis skill covers design decisions you face when **starting from a blank file**, not when\nporting existing C.\n\n## 1. Rules of Thumb (read this first)\n\nEight rules to consult when designing any BSC API. If you only remember one thing,\nremember **Rule 2**.\n\n### Rule 1 — Return values, borrow arguments\nReturn `_Owned` by value; take `_Borrow` as arguments. Only take `_Owned` arguments when\nthe function truly **consumes** (moves) the value (e.g. `Vec::push`, `set_string`).\n\n```c\n// GOOD: caller keeps ownership, function borrows\n_Safe String format_greeting(const String* _Borrow name);\n\n// BAD: caller must move a value it probably still wants\n_Safe String format_greeting(String name);\n```\n\n### Rule 2 — Make the `_Unsafe` surface as small as possible\nDon't mark whole functions `_Unsafe` just because one line needs it. Wrap the minimum\nwith `_Unsafe { ... }` and keep the function's interface `_Safe`. An `_Unsafe` interface\nis **contagious** — every caller pays the cost.\n\n```c\n// GOOD: interface _Safe, only the cast is unsafe\n_Safe String from_cstr(const char* s) {\n    _Unsafe { return String::from(s); }\n}\n\n// BAD: whole function is _Unsafe for one line's sake\n_Unsafe String from_cstr(const char* s) {\n    return String::from(s);\n}\n```\n\n### Rule 3 — Choose `T` vs `T *_Owned` deliberately\n\nThis is a real design decision, not a default. Both are valid; pick based on the type's\nsize, lifetime, and use sites.\n\n**Return `T` (by value) when:**\n- The type is **small to medium** (~< few hundred bytes) — moves are cheap.\n- The caller will use it locally and let it drop at scope exit.\n- Nullability isn't needed (no \"no result\" case to represent).\n- You want zero-allocation construction.\n\n```c\n_Safe String String::new(void);                       // small, local use\n_Safe JSON_Value json_parse_file(String filename);    // medium, owned by caller\n```\n\n**Return `T *_Owned` when:**\n- The type is **large** — pointer-move is `O(1)`, value-move copies bytes.\n- The result may be **null** (`T *_Owned _Nullable`) — value types can't naturally\n  represent absence without `Option<T>` overhead.\n- The result will be **stored in a container** that holds pointers (`Vec<Node *_Owned>`\n  for graph/tree nodes — recursive types can't be value-stored).\n- The caller's lifetime model needs **explicit `safe_free`** (e.g., handing off to\n  C code, custom allocators).\n\n```c\n_Safe Buffer *_Owned Buffer::with_capacity(size_t mb);   // large\n_Safe Node *_Owned _Nullable find(Tree* _Borrow t, Key k);  // may be absent\n```\n\n**Reality check:** parson uses both. `json_parse_file` returns `JSON_Value` by value (the\nstruct is ~100 bytes), but internally `JSON_Value_Value` holds `JSON_Object *_Owned`\nand `JSON_Array *_Owned` because those subtypes are heap-allocated and need to be\nnullable. Don't assume value-return is always right; assume **the right choice depends\non size and nullability**.\n\n### Rule 4 — Many `_Const` readers OR one `_Mut` writer (never both)\n\n`_Const` borrows compose: any number of immutable borrows can coexist on the same value.\nWhat the checker forbids is **overlapping a `_Mut` with anything else** — another `_Mut`,\nor any `_Const`.\n\n```c\n// FINE: many readers, no writer\nconst T* _Borrow r1 = &_Const x;\nconst T* _Borrow r2 = &_Const x;\nconst T* _Borrow r3 = &_Const x;\nread(r1); read(r2); read(r3);   // all OK\n\n// BAD: writer overlaps reader\nconst T* _Borrow r = &_Const x;\nT* _Borrow w = &_Mut x;          // error: r is still live\nmodify(w);\n\n// BAD: two writers overlap\nT* _Borrow w1 = &_Mut x;\nT* _Borrow w2 = &_Mut x;          // error: w1 is still live\n```\n\n**Design implication:** if your API needs multiple readers, take `const T* _Borrow` and\npass freely. If it needs to mutate, take `T* _Borrow` (mut) and ensure no other borrow is\nlive during the call. If you find yourself wanting overlapping `_Mut` borrows, the design\nis wrong — restructure.\n\n```c\n// COMMON DESIGN ERROR: tries to mut-borrow `val` twice\nJSON_Object* _Borrow obj = val.get_object();   // mut borrow #1\nval.validate(&_Mut schema);                     // mut borrow #2 — conflicts\n\n// FIX: scope the first borrow tightly\n{\n    JSON_Object* _Borrow obj = val.get_object();\n    obj->set_string(...);\n}   // borrow #1 ends here\nval.validate(&_Mut schema);   // now OK\n```\n\n### Rule 5 — Destructors own, functions move\n`_Owned struct` destructors fire **automatically** on scope exit. Don't write explicit\n`free_*(ptr)` functions unless the type is heap-allocated and held by a raw pointer\n(i.e. the destructor can't reach it).\n\n```c\n_Owned struct Config {\n    String name;     // ~String fires automatically\n    Vec<int> values;\
    \ // ~Vec fires automatically\n\n    ~Config(Config this) {\n        // usually EMPTY — sub-field destructors run on their own\n    }\n};\n```\n\n### Rule 6 — Members for dispatch, free functions for everything else\nUse `Type::method(...)` when (a) the function logically belongs to the type, (b) you\nwant `this->method()` dot-syntax at call sites, or (c) you need trait dispatch.\nOtherwise, free functions are simpler and compose better.\n\n```c\n// Member: belongs to the type, reads naturally\n_Safe size_t String::length(const String* _Borrow this);\n\n// Free: utility, no natural \"owner\"\n_Safe String json_parse_file(String filename);\n```\n\n### Rule 7 — Pick the unsafe seam deliberately\nEvery BSC library has at least one `_Unsafe` seam. Place it at the **boundary** where\nBSC's model doesn't match reality:\n\n- **FFI / system calls** (`fopen`, `read`, pointer arithmetic on buffers)\n- **Interior mutability / shared references** (reference-counted containers like\n  `Rc<T>` expose `_Unsafe` peek methods)\n- **Performance-critical hot paths** (where the checker would force unnecessary clones)\n\nLookups that may miss are **not** a seam — return `T *_Borrow _Nullable` (compile-time\nnullability tracking keeps the call site `_Safe`). See Rule 8.\n\nNever put the seam in the middle of business logic.\n\n### Rule 8 — Prefer `_Nonnull`; reach for `_Nullable` only when \"absent\" is real\n\n`_Owned` and `_Borrow` default to `_Nonnull`. Keep them that way unless the API genuinely\nhas a no-result/optional/absent case to represent. `_Nullable` forces every use site to\nnull-check before deref — choosing it when the pointer is never actually null just adds\ncaller burden for no benefit.\n\n**Keep default `_Nonnull`** when:\n- The parameter is required (no \"absent input\" case)\n- The return is always produced when the function returns successfully\n- The struct field is always populated after construction\n\n**Reach for `_Nullable`** when:\n- Allocation may fail and you surface that: `T *_Owned _Nullable try_alloc(size_t)`\n- Cleanup paths hold a pointer that may not have been set: `Node *_Owned _Nullable item = nullptr;`\n- A struct field is legitimately optional\n- A setter accepts \"clear\" as a valid input: `void set_cache(Cache *_Owned _Nullable c)`\n\n```c\n// GOOD — Nonnull by default; caller doesn't null-check\n_Safe void render(const Canvas *_Borrow c, const Frame *_Borrow f);\n\n// GOOD — allocation may fail, nullable surfaces it\n_Safe Buffer *_Owned _Nullable try_create_buffer(size_t n);\n\n// BAD — declared _Nullable out of caution; callers null-check for no reason\n_Safe void render(const Canvas *_Borrow _Nullable c, const Frame *_Borrow _Nullable f);\n```\n\nChanging a pointer's nullability (Nonnull ↔ Nullable) on an existing API is a **breaking\nchange** — every caller's null-check assumption shifts. Decide at design time, not patch time.\n\n> For compile-time nullability tracking mechanics and null-check patterns, see `bsc-nullability` Skill.\n\n---\n\n## 2. Designing Types\n\n### Value type, `_Owned struct`, or trait?\n\n| Your type has... | Use |\n|---|---|\n| Plain data (no heap pointers, no cleanup) | Plain `struct` (not `_Owned`) |\n| Fields that own heap memory (`String`, `Vec`, `*_Owned`) | `_Owned struct` |\n| Needs dynamic dispatch (multiple \"kinds\" behind one interface) | `_Trait` + `_Impl` |\n| A closed set of variants (like a union) | `_Owned struct` with a tag field + inner union replacement |\n\n**Don't reach for `_Trait` unless you actually need dynamic dispatch.** If you know the\nconcrete type at compile time, a plain `_Owned struct` or generic `<T>` is faster and\nclearer.\n\n### Replacing C unions\n\nC unions let you put a `double`, `char*`, and a pointer all in the same storage slot.\nIn BSC that's unsound: the destructor can't know which variant is active, so it can't\nrun the right field's destructor.\n\n**Two options:**\n\n1. **Tagged struct** — all fields coexist; destructor runs over all of them (even\n   inactive ones). Simple but wastes memory. Parson's `JSON_Value_Value` does this,\n   with a FIXME comment acknowledging the cost.\n\n2. **Trait-based sum type** — one trait with one `_Impl` per variant. Dynamic dispatch\n   overhead, but memory-efficient and type-safe. Use when variants have very different\n   sizes.\n\n**Rule of thumb:** if the largest variant is <3× the smallest, use tagged struct. If\nthey're wildly different sizes (e.g., a variant holds a 1KB buffer), use traits.\n\n### Destructor design\n\nThe destructor body is usually **empty**. BSC auto-inserts destructor calls for every\n`_Owned` field. Only write explicit cleanup when:\n\n- The struct holds a **raw pointer** to heap memory (not `*_Owned`). You must\n  `safe_free` it manually.\n- There's a **resource** other than memory (file handle, socket, lock) that needs\n  release.\n- You need to run **logic** before cleanup (logging, notifying observers).\n\n```c\n_Owned struct FileHandle {\n    FILE *_Owned fp;   // destructor fires automatically? NO — FILE* has no destructor\n\n    ~FileHandle(FileHandle this) {\n        _Unsafe { fclose(__move_to_raw(this.fp)); }\n    }\n};\n```\n\n---\n\n## 3. Designing APIs\n\n### Value-in, value-out vs. borrow-in, borrow-out\n\n```c\n// Pattern A: ownership transfer\n_Safe JSON_Object JSON_Object::new(void);            // produces owned value\n_Safe void Obj::set_value(Obj* _Borrow this, JSON_Value v);  // consumes `v`\n\n// Pattern B: read-only access\n_Safe const String* _Borrow Obj::get_name(const Obj* _Borrow this, size_t i);\n_Safe size_t Obj::get_count(const Obj* _Borrow this);\n\n// Pattern C: mutation via borrow\n_Safe void Obj::clear(Obj* _Borrow this);\n```\n\n**Rule:** read → `_Borrow this` + `_Borrow` returns. Mutate → `_Borrow this` (mut)\n+ `void` return or status code. Construct → `_Owned` return, no `this`.\n\n### Returning `_Borrow` that depends on a local\n\nThis bites everyone eventually. If you compute a local `String` and want to return a\n`_Borrow` to something looked up through it, the checker rejects it because the local\ndies at scope exit.\n\n**Three legitimate fixes:**\n\n1. **Restructure** — take the key by borrow from the caller:\n   ```c\n   _Safe T* _Borrow lookup(Table* _Borrow t, const String* _Borrow key);\n   ```\n\n2. **Recursion** — if the local is a transformation of an input, pass the transformed\n   value into a recursive call where its lifetime is self-contained.\n\n3. **Minimal `_Unsafe` seam** — for lookups that the checker can't model (hash-map hits),\n   cast through a raw pointer inside a tight `_Unsafe` block. Document why. (Parson's\n   `dotget_value` does this.)\n\n### Member function layout\n\n```c\n// Declare in .hbs\n_Safe RetType TypeName::method(TypeName* _Borrow this, ArgT arg);\n\n// Define in .cbs — same signature\n_Safe RetType TypeName::method(TypeName* _Borrow this, ArgT arg) {\n    ...\n}\n\n// Call\nobj->method(arg);     // sugar for TypeName::method(obj, arg)\n```\n\nFor `_Safe` member functions, `this` is **always** a `_Borrow` (const or mut) or the\nvalue type (for constructors). Never raw `T*`.\n\n### Constructor pattern\n\nBSC has no special constructor syntax. Use `Type::new` (and variants `with_capacity`,\n`from`, `default`) as a convention:\n\n```c\n_Safe String String::new(void);\n_Safe String String::with_capacity(size_t cap);\n_Unsafe String String::from(const char* cstr);\n\n_Safe Config Config::new(void);\n_Safe Config Config::from_file(String path);\n```\n\n---\n\n## 4. Designing Ownership Flow\n\n### Where ownership lives\n\nFor every heap allocation, decide: **who owns it, for how long, and how does it get\nfreed?** Then make the types reflect the answer.\n\n```c\n// Owner: the struct. Lifetime: with the struct. Freed: by destructor.\n_Owned struct Cache { Vec<Entry> entries; };\n\n// Owner: the caller of add(). Lifetime: until it's moved into the vec.\n_Safe void Cache::add(Cache* _Borrow this, Entry e);  // consumes `e`\n\n// Owner: the cache. Returned as a borrow for read-only use.\n_Safe const Entry* _Borrow Cache::get(const Cache* _Borrow this, size_t i);\n```\n\n### Move semantics at API edges\n\nWhen a function takes `_Owned T` (or `T` by value for an owned type), the caller loses\naccess to the variable after the call. Design your API so the caller either:\n\n- **Moves it in deliberately** (e.g. `vec.push(item)` — item is consumed, caller expects that)\n- **Passes a clone** if they need to keep using the value (`vec.push(item.clone())`)\n\nDon't have \"sometimes consumes, sometimes doesn't\" functions — pick one and stick to it.\n\n### Sharing: avoid, or use `Rc<T>`\n\nBSC is single-owner by default. If two places need to own the same value, use\n`Rc<T>` (reference-counted) from stdlib-advanced. Don't invent your own sharing scheme —\nyou'll break the ownership invariants.\n\n### Sharing long-lived read-only state with worker threads\n\n`Rc<T>` is single-threaded. For immutable data that must be readable from worker threads\nfor the lifetime of the process (config, router, lookup tables), the correct pattern is:\n\n1. Heap-allocate with `safe_malloc` to get a stable address.\n2. Call `__move_to_raw` inside an `_Unsafe` block to transfer ownership to a raw pointer.\n   No destructor will run on it — this is an intentional process-lifetime allocation.\n   Document it.\n3. Store the raw pointer as `const T* _Nonnull` in a plain (non-`_Owned`) shared context\n   struct passed to each thread.\n4. Cross the thread boundary only with plain copy types (`int` fds, indices). Never pass\n   `_Borrow` or `_Owned` pointers across threads. `_Borrow → raw` is **forbidden in both\n   `_Safe` and `_Unsafe`** — there is no cast from a `_Borrow` pointer to a raw pointer,\n   anywhere.\n\n```c\n// In _Unsafe block inside the thread-pool setup function:\nConfig *_Owned cfgp = safe_malloc(config);   // stable heap address; takes ownership\nRouter *_Owned rtp  = safe_malloc(router);\n\n// Intentional\
    \ process-lifetime allocation — no paired free.\nstatic struct ServerCtx ctx;\nctx.config = (const Config* _Nonnull)__move_to_raw(cfgp);\nctx.router = (const Router* _Nonnull)__move_to_raw(rtp);\n\n// Worker threads reconstruct a _Borrow from the raw pointer:\n_Safe void worker(int fd, void* _Nonnull ctx_raw) {\n    struct ServerCtx* ctx = _Unsafe((struct ServerCtx*)ctx_raw);\n    const Config* _Borrow cfg = _Unsafe(&_Const *(ctx->config));\n    ...\n}\n```\n\nThe explicit `(const T* _Nonnull)` cast is required when assigning into a `_Nonnull`-typed\nfield, because `__move_to_raw` returns a nullable raw pointer and the field's declared type\nenforces nonnull. The `ServerCtx` struct itself must be `static` (or heap-allocated) so its\naddress remains valid after the setup function returns.\n\n---\n\n## 5. Designing the `_Safe` / `_Unsafe` boundary\n\n### Pick the boundary at design time, not during debugging\n\nBefore writing code, list which functions will be `_Safe` and which `_Unsafe`. Common\nlibrary structure:\n\n```\nPublic API (.hbs)\n  ├── _Safe for 90% of the surface\n  └── _Unsafe for:\n        - Constructors that take raw C strings (const char*)\n        - Functions that interop with existing C libraries\n        - Destructors that close system resources\n\nInternal impl (.cbs)\n  ├── _Safe where the model permits\n  └── _Unsafe blocks (NOT whole functions) for:\n        - pointer arithmetic\n        - aliasing that the checker over-rejects\n```\n\n### When to use `_Unsafe` blocks inside `_Safe` functions\n\nTotally legitimate when:\n\n- You need `printf`/`puts` (formatted output is considered unsafe in BSC)\n- You're doing pointer arithmetic over a known-safe buffer (`string->get(i)` returning a raw char pointer)\n- You're casting between `_Owned` and raw for `__take_from_raw` / `__move_to_raw` (C FFI)\n\nNot legitimate for:\n\n- Skipping the borrow checker because it's \"annoying\"\n- Bypassing a diagnostic you don't understand — figure out why it fires first\n\n---\n\n## 6. Anti-Patterns\n\n### Anti-pattern: `_Unsafe` all the way down\nSymptom: every function is `_Unsafe`. You're writing C with a .cbs extension.\nFix: mark the public API `_Safe` and push the `_Unsafe` parts into blocks inside each\nfunction. The checker still helps you at the boundaries.\n\n### Anti-pattern: God struct\nSymptom: one `_Owned struct` with 15 fields, most unused in most code paths.\nFix: split into smaller structs composed via `_Owned` fields. Destructors compose;\nborrows compose; design stays modular.\n\n### Anti-pattern: returning raw `T*` instead of `T *_Borrow`\nSymptom: a lookup returns `T*` (raw) instead of `T *_Borrow`, forcing callers into\n`_Unsafe` just to use it.\nFix: if the function always succeeds, return `T *_Borrow`. If it can fail, return\n`T *_Borrow _Nullable` — compile-time nullability tracking keeps callers `_Safe` while\nrepresenting the miss case.\n\n### Anti-pattern: destructor that does too much\nSymptom: destructor reaches into unrelated subsystems, calls logging, modifies global state.\nFix: destructors should only release resources owned by `this`. Side effects belong\nin explicit methods the caller invokes.\n\n### Anti-pattern: designing for C first, then \"porting\"\nSymptom: you wrote a C-style API (`JSON_Value* parse(const char*)`) and are now\nfighting the borrow checker.\nFix: start from the BSC types (`_Owned JSON_Value parse(String)`) and let the\nsignatures drive the implementation.\n\n---\n\n## 7. A Worked Example\n\nA simple key-value store, designed BSC-first:\n\n```c\n// In kvstore.hbs\n#include \"string.hbs\"\n#include \"vec.hbs\"\n\n_Owned struct KVEntry {\n    String key;\n    String value;\n};\n\n_Owned struct KVStore {\n_Public:\n    Vec<KVEntry> entries;\n\n    ~KVStore(KVStore this) {\n        // empty — Vec<KVEntry> auto-destructs, which auto-destructs each KVEntry,\n        // which auto-destructs each String.\n    }\n};\n\n_Safe KVStore KVStore::new(void);\n_Safe void KVStore::set(KVStore* _Borrow this, String key, String value);\n_Safe const String* _Borrow KVStore::get(const KVStore* _Borrow this, const String* _Borrow key);\n_Safe size_t KVStore::len(const KVStore* _Borrow this);\n```\n\nDesign notes:\n- **Rule 1:** `new()` returns by value, mutating methods take `_Borrow this`, read methods take `const _Borrow this`.\n- **Rule 3:** `KVStore` is a value type — no `*_Owned` needed at the API.\n- **Rule 5:** Destructor is empty; field destructors handle everything.\n- **Rule 7:** The `_Unsafe` seam is only needed inside `set` if we want to dedupe\n  (lookup-then-insert on a linear scan is fine `_Safe`; a hash probe would need it).\n\n---\n\n## 8. Quick Reference\n\n| Question | Answer |\n|---|---|\n| Should I return `T` or `T *_Owned`? | `T` for small + non-null + local use; `*_Owned` for large, nullable, or container-stored |\n| Should I take `T`, `T *_Owned`, or `T *_Borrow`? | `_Borrow` for read, mut-`_Borrow` for modify, value/`_Owned` for consume |\n| Should this be `_Safe` or `_Unsafe`? | `_Safe` unless you can't — then wrap `_Unsafe` blocks inside |\n| Do I need a destructor body? | Only if there's a raw pointer, a non-memory resource, or custom cleanup logic |\n| Should this be a member or a free function? | Member if it logically belongs to the type or you want dot-syntax; free otherwise |\n| Union or trait sum type? | Tagged struct for small variants; trait for wildly-sized variants |\n| Can I share ownership? | Use `Rc<T>` from stdlib-advanced; don't invent sharing schemes |\n\nBefore you write a single line of BSC: sketch the types first, annotate who owns\nwhat, decide where the `_Unsafe` seams go. The code almost writes itself after that.\n\n---\n\n\n# BiSheng C Error Codes Skill\n\n## 1. Error Code Scheme\n\nBSC errors use the format `BSC-Exxxx` (errors) and `BSC-Wxxxx` (warnings), grouped by category:\n\n| Range | Category | Description |\n|-------|----------|-------------|\n| BSC-E01xx | Ownership | Use-after-move, uninitialized, assign, cast, memory leak |\n| BSC-E02xx | Borrow Checking | Lifetime, multiple borrows, assign-while-borrowed |\n| BSC-E03xx | Safe Zone | Forbidden operations in `_Safe` functions/blocks |\n| BSC-E04xx | Nullability | Deref/pass/return/cast nullable pointers |\n| BSC-E05xx | Traits | Undefined traits, unimplemented functions, type conflicts |\n| BSC-E06xx | Owned Struct / Destructor | Struct tags, destructors, member issues |\n| BSC-E07xx | Type System | `_Owned`/`_Borrow` qualifier conflicts, incompatible casts |\n| BSC-E08xx | Async | `_Async`/`_Await` usage |\n| BSC-E09xx | Generics / Constexpr | Generic function issues, constexpr limitations |\n| BSC-E10xx | Parse-level | BSC-specific syntax errors |\n| BSC-E11xx | Member Functions | Instance members, attributes |\n| BSC-E12xx | Operator Overload | Overload restrictions |\n\n## 2. Diagnostic Suppression Flags\n\nSuppress with `-Eno-<identifier>` on command line or `#pragma GCC diagnostic ignored \"-E<identifier>\"` in source:\n\n```\nbsc-safety-check              # All BSC safety checks\n├── bsc-ownership             # All ownership checks\n│   ├── use-moved-owned       #   Use after move\n│   ├── use-uninit-owned      #   Use uninitialized\n│   ├── assign-owned          #   Assign to owned\n│   ├── cast-owned            #   Cast owned\n│   └── check-memory-leak     #   Memory leaks\n├── bsc-borrow                # All borrow checks\n│   ├── assign-borrowed       #   Assign while borrowed\n│   ├── move-borrowed         #   Move while borrowed\n│   ├── use-mutably-borrowed  #   Use while mutably borrowed\n│   ├── repeated-borrow       #   Multiple mutable borrows\n│   ├── return-local-borrow   #   Return local reference\n│   └── short-life-borrow     #   Lifetime too short\n└── bsc-nullability           # All nullability checks\n    ├── deref-nullable        #   Deref nullable\n    ├── pass-nullable         #   Pass nullable\n    └── return-nullable       #   Return nullable\n```\n\n> For full hierarchy and usage examples, see `bsc-compile` Skill.\n\n## 3. AI-Friendly Database\n\nFor LLM/IDE integration, the `errors/ai/` directory contains:\n\n- `bsc-errors.json` — Structured JSON database of all errors with cause, fix strategies, code examples, and keywords\n- `bsc-errors.schema.json` — JSON schema\n- `error-code-mapping.json` — Maps diagnostic names to error codes\n\n## 4. Common Errors Quick Reference\n\n### Ownership (BSC-E01xx)\n\n| Code | Message | Fix |\n|------|---------|-----|\n| E0101 | Use of moved value | Use variable before transferring ownership |\n| E0104 | Use of uninitialized value | Initialize before use |\n| E0106 | Assign to _Owned value | Release old value first, or use a new variable |\n| E0115 | Invalid cast of _Owned value | Don't cast an _Owned pointer that still holds ownership |\n| E0118 | Memory leak (owned not freed) | Free, return, or transfer before scope ends |\n| E0119 | Field memory leak | Free _Owned struct fields before scope ends |\n| E0126 | Temporary variable memory leak | Capture return value of _Owned-returning function |\n\n### Borrow (BSC-E02xx)\n\n| Code | Message | Fix |\n|------|---------|-----|\n| E0201 | Cannot assign to borrowed variable | End borrow before modifying |\n| E0202 | Cannot move out of borrowed variable | End borrow before moving |\n| E0203 | Cannot use mutably borrowed variable | Read through the borrow pointer instead |\n| E0204 | Cannot borrow as mutable more than once | Only one `&_Mut` at a time |\n| E0207 | Cannot return reference to local variable | Return by value or use `_Owned` heap allocation |\n| E0208 | Value does not live long enough | Ensure borrowed value outlives the borrow |\n\n### Safe Zone (BSC-E03xx)\n\n| Code | Message | Fix |\n|------|---------|-----|\n| E0301 | Unsafe action forbidden in safe zone | Wrap in `_Unsafe { }` block or use safe alternative |\n| E0302 | Invalid _Safe/_Unsafe declaration position | Place qualifier on function decl or block statement |\n| E0303 | Union member\
    \ access in safe zone | Wrap union access in `_Unsafe { }` block |\n| E0304 | Forbidden cast in safe zone | Wrap cast in `_Unsafe { }` or pass correct type |\n| E0307 | Forbidden operation in _Safe function | Move operation to `_Unsafe` block |\n| E0308 | Mutable global variable in safe zone | Make global `const` or define outside safe zone |\n\n### Nullability (BSC-E04xx)\n\n| Code | Message | Fix |\n|------|---------|-----|\n| E0401 | Nullable pointer cannot be dereferenced | Add null check before dereference |\n| E0402 | Cannot pass nullable pointer argument | Guard with null check before call |\n| E0403 | Cannot return nullable pointer type | Add null check or change return type to `_Nullable` |\n| E0406 | Nonnull assigned by nullable | Guard with null check before assignment |\n| E0407 | _Nonnull pointer must be initialized | Initialize at declaration |\n\n> For detailed per-category documentation, see the `errors/` directory.\n> For common fixes, see `bsc-common-mistakes` Skill.\n\n---\n\n\n# BiSheng C Generics Skill\n\n## 1. Overview\n\nCompile-time monomorphization — no runtime overhead. The compiler generates specialized code for each type used.\n\n## 2. Generic Functions\n\n```c\nT max<T>(T a, T b) {\n    return a > b ? a : b;\n}\n\nvoid swap<T>(T* a, T* b) {\n    T tmp = *a;\n    *a = *b;\n    *b = tmp;\n}\n\nint main() {\n    int m1 = max<int>(3, 5);       // explicit instantiation\n    int m2 = max(3, 5);            // implicit type deduction\n    float m3 = max<float>(1.2, 2.5);\n    return 0;\n}\n```\n\n## 3. Generic Structs and Unions\n\nGeneric unions follow the same syntax as generic structs.\n\n```c\nstruct Pair<T1, T2> {\n    T1 first;\n    T2 second;\n};\n\nunion Value<T1, T2> {\n    T1 as_first;\n    T2 as_second;\n};\n\nT1 struct Pair<T1, T2>::getFirst(This* this) {\n    return this->first;\n}\n\nT1 union Value<T1, T2>::getFirst(This* this) {\n    return this->as_first;\n}\n\nint main() {\n    struct Pair<int, float> p = {.first = 1, .second = 2.0};\n    int f = p.getFirst();\n    Pair<int, float> p2 = p;  // `struct` can be omitted when using generic struct types\n\n    union Value<int, float> v;\n    v.as_first = 42;\n    return 0;\n}\n```\n\n- Generic struct/union instantiation is **explicit-only** — no implicit type deduction (unlike generic functions)\n\n## 4. Constant Generics\n\n```c\nstruct Array<T, int N> {\n    T data[N];\n};\n\nint sumN<int N>(int arr[N]) {\n    int s = 0;\n    for (int i = 0; i < N; i++) s += arr[i];\n    return s;\n}\n\nint main() {\n    struct Array<int, 5> a;\n    constexpr int sz = 10;\n    struct Array<float, sz> b;  // constexpr OK as arg\n    struct Array<int, (sz + 1)> c;  // non-trivial expr needs parens\n    return 0;\n}\n```\n\n### Constant generic parameter types\n- Declaration: `int` and its modifiers (`long`, `short`, `unsigned`, `signed`) and their combinations\n- Also supports typedef aliases of the above: `typedef unsigned long ulong;` then `struct S<ulong N> {...}`\n\n### Constant generic argument types\n- Integer literals (`1`, `2`, etc.) — no parens needed\n- `constexpr` variables — no parens needed\n- `constexpr` function calls and other constant expressions — **must be parenthesized**\n\n**Parenthesization rule**: plain integer literals and constexpr constants need no parens; all other constant expressions must be parenthesized — e.g. `Array<int, 5>` and `Array<int, sz>` are fine, but `Array<int, (sz + 1)>` requires parens.\n\n## 5. Generic Type Aliases\n\n```c\n// New-style typedef required for generic aliases:\ntypedef Alias<T> = T*;\ntypedef IntArray<int N> = int[N];\ntypedef MyPair<T> = struct Pair<T, T>;\n\n// Non-generic new-style also works:\ntypedef Int64 = long int;\n```\n\n**Restrictions:**\n- Cannot define generic type aliases inside function bodies\n- Cannot define type aliases inside struct bodies\n- Cannot extend member functions on a generic type alias\n\n## 6. Conditional Type Alias\n\nRequires `#include <bsc_conditional.hbs>`.\n\n```c\n#include <bsc_conditional.hbs>\n\n// conditional<C, T, F>: when C is non-zero → type T; when C is zero → type F\ntypedef conditional<int C, T, F> = __conditional(int C, T, F);\n\nconditional<1, int, float> x = 42;     // x is int\nconditional<0, int, float> y = 3.14;   // y is float\n```\n\nUse case — selecting types based on generic parameters:\n\n```c\ntypedef RetType<int C> = conditional<C, int*, float*>;\n\nRetType<1> foo<int C>() {\n    // When C is non-zero, RetType<C> is int*; otherwise float*\n}\n```\n\n## 7. Generic Member Functions\n\n```c\nstruct MyStruct<T> { T val; };\nunion MyUnion<T> { T val; };\n\nT struct MyStruct<T>::get(This* this) { return this->val; }\n\nT union MyUnion<T>::get(This* this) { return this->val; }\n\n// Static generic member function\nT static struct MyStruct<T>::zero() { T z = 0; return z; }\n\n// Return type can be the generic struct/union type itself\nstruct MyStruct<T> struct MyStruct<T>::make(T x) {\n    struct MyStruct<T> result = { .val = x };\n    return result;\n}\n\nint main() {\n    struct MyStruct<int> s = {.val = 42};\n    int v = s.get();\n    int z = MyStruct<int>::zero();\n    struct MyStruct<int> s2 = MyStruct<int>::make(7);\n\n    union MyUnion<int> u = {.val = 7};\n    int w = u.get();\n    return 0;\n}\n```\n\n- No overloading of generic member functions (same rule as non-generic member functions)\n- Generic member functions can be static (first parameter not necessarily `this`)\n- Return type can be the generic struct/union type\n\n## 8. Rules\n\n- **No spaces** between the function/struct/union name and the angle brackets: `max<int>(a, b)` is correct; `max <int>(a, b)` is not\n- Generic functions support both explicit (`max<int>(a, b)`) and implicit (`max(a, b)`) type deduction\n- Generic structs and unions support **explicit instantiation only** — no implicit deduction\n- Generic unions use identical syntax to generic structs: `union MyUnion<T> { ... };`\n- `struct`/`union` keyword can be omitted when *using* a generic struct/union type, but not when *declaring* it\n- No overloading of generic member functions\n- Constant generic expressions (other than plain literals / constexpr constants) must be parenthesized\n\n## 9. Complete Example\n\n```c\n#include <stdio.h>\n\nT max<T>(T a, T b) { return a > b ? a : b; }\n\nvoid swap<T>(T* a, T* b) { T tmp = *a; *a = *b; *b = tmp; }\n\nint main() {\n    printf(\"max<int> = %d\\n\", max<int>(3, 7));\n    printf(\"max deduced = %d\\n\", max(10, 20));\n\n    int a = 1, b = 2;\n    swap<int>(&a, &b);\n    printf(\"After swap: a=%d, b=%d\\n\", a, b);\n    return 0;\n}\n```\n\n> For member function basics, see `bsc-member-function` Skill\n> For generic traits, see `bsc-trait` Skill\n> For constexpr generic functions, see `bsc-constexpr` Skill\n> For conditional type alias, see `bsc-constexpr` Skill\n> For generics/constexpr errors (BSC-E09xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Initialization Analysis Skill\n\n## 1. Overview\n\nBSC performs compile-time data-flow analysis to ensure variables are initialized before use. Analysis tracks initialization at the **struct field level**. By default active in `_Safe` zones; configurable via `-uninit-check`.\n\n## 2. Rules\n\n### Rule 1: All locals must be initialized before use\n\n```c\n_Safe void example(void) {\n    int x;\n    int y = x;  // error: use of uninitialized value: `x`\n}\n```\n\n### Rule 2: Field-level tracking for structs\n\nPartial field initialization is detected. When all fields are initialized, the struct auto-promotes to fully initialized.\n\n```c\nstruct Pair { int a; int b; };\n\n_Safe void partial(void) {\n    struct Pair p;\n    p.a = 1;\n    struct Pair q = p;  // error: p.b uninitialized\n}\n\n_Safe void full(void) {\n    struct Pair p;\n    p.a = 1;\n    p.b = 2;           // all fields done → p auto-promotes\n    struct Pair q = p;  // ok\n}\n```\n\n### Rule 3: All control-flow paths must initialize\n\n```c\n_Safe void example(int cond) {\n    int x;\n    if (cond) { x = 1; }\n    // else path: x uninitialized\n    int y = x;  // error: use of possibly uninitialized value: `x`\n}\n```\n\n### Rule 4: Address-of is a use\n\nTaking `&`, `&_Mut`, or `&_Const` of an uninitialized variable is an error. Exception: `ensure_init` parameters and `__assume_initialized` arguments.\n\n```c\n_Safe void example(void) {\n    int x;\n    int *_Borrow p = &_Mut x;  // error: use of uninitialized value: `x`\n}\n```\n\n### Rule 5: Functions must initialize return values on all paths\n\n```c\n_Safe int example(int cond) {\n    if (cond) { return 1; }\n}  // error: return value may not be initialized on all paths\n```\n\n### Rule 6: Array element assignment does NOT initialize\n\nElement-by-element assignment does not mark an array as initialized. Arrays must use init lists or `__assume_initialized`.\n\n```c\n_Safe void bad(void) {\n    int arr[3];\n    arr[0] = 1; arr[1] = 2; arr[2] = 3;\n    int x = arr[0];  // error: arr still uninitialized\n}\n\n_Safe void good(void) {\n    int arr[3] = {1, 2, 3};  // ok: init list\n    int x = arr[0];\n}\n\n_Safe void assume(void) {\n    int arr[3];\n    arr[0] = 1; arr[1] = 2; arr[2] = 3;\n    _Unsafe { __assume_initialized(&arr); }\n    int x = arr[0];  // ok\n}\n```\n\nThis also applies to array fields inside structs:\n\n```c\ntypedef struct { int a[2]; int b; } ArrStruct;\n\n_Safe void bad(void) {\n    ArrStruct s;\n    s.a[0] = 1; s.a[1] = 2; s.b = 3;\n    ArrStruct t = s;  // error: s.a uninitialized\n}\n\n_Safe void good(void) {\n    ArrStruct s = {{1, 2}, 3};\n    ArrStruct t = s;  // ok\n}\n```\n\n### Rule 7: Union — writing any member initializes the whole union\n\n```c\n// Compile with -uninit-check=all (union access forbidden in safe zones)\nunion U { int a; float f; };\n\nvoid example(void) {\n    union U u;\n    u.a = 42;\n    float f = u.f;  // ok: entire union initialized via u.a\n}\n```\n\nWriting a struct member within a union variant also initializes the whole union. Known limitation:\
    \ cross-variant reads of unwritten bytes pass without error.\n\n### Rule 8: Nested structs — arbitrary depth tracking\n\n```c\nstruct Inner { int x; int y; };\nstruct Outer { struct Inner inner; int z; };\n\n_Safe void example(void) {\n    struct Outer o;\n    o.inner.x = 1;\n    o.inner.y = 2;  // inner auto-promotes\n    o.z = 3;        // o auto-promotes\n    struct Outer p = o;  // ok\n}\n```\n\n### Rule 9: Global and static variables are implicitly initialized\n\n```c\nstatic int global_count;\n\n_Safe void example(void) {\n    int x = global_count;  // ok: guaranteed zero-initialized by C spec\n}\n```\n\n## 3. `__attribute__((ensure_init))`\n\nA parameter attribute that establishes an initialization contract:\n- **Caller side**: after the call, `*param` is marked as initialized\n- **Callee side**: compiler verifies `*param` is initialized on all return paths\n\n```c\nvoid init_int(int *__attribute__((ensure_init)) out);\n\n_Safe void caller(void) {\n    int x;\n    _Unsafe { init_int(&x); }  // x marked initialized after call\n    int y = x;                  // ok\n}\n\n// Compiler validates the contract:\nvoid good_init(int *__attribute__((ensure_init)) out) {\n    *out = 42;  // ok\n}\n\nvoid bad_init(int *__attribute__((ensure_init)) out) {\n}  // error: ensure_init parameter 'out' not initialized at return\n```\n\n### Field-level partial initialization\n\n```c\nstruct Pair { int a; int b; };\nvoid init_field(int *__attribute__((ensure_init)) p);\n\n_Safe void example(void) {\n    struct Pair p;\n    _Unsafe {\n        init_field(&p.a);  // only p.a marked\n        init_field(&p.b);  // p.b marked → p auto-promotes\n    }\n    struct Pair q = p;  // ok\n}\n```\n\n### Safe zone usage\n\n```c\n_Safe void init_safe(int *_Borrow __attribute__((ensure_init)) out);\n\n_Safe void caller(void) {\n    int x;\n    init_safe(&_Mut x);  // ok in safe zone with &_Mut\n    int y = x;            // ok\n}\n```\n\n### Restrictions before `*param` is initialized\n\nCannot reassign or alias the `ensure_init` pointer before fulfilling the contract:\n\n```c\nvoid bad(int *__attribute__((ensure_init)) out) {\n    int local;\n    out = &local;   // error: cannot reassign before *out initialized\n}\n\nvoid bad2(int *__attribute__((ensure_init)) out) {\n    int *p = out;   // error: cannot alias before *out initialized\n}\n```\n\nAfter initialization, free use is allowed:\n\n```c\nvoid ok(int *__attribute__((ensure_init)) out) {\n    *out = 42;       // contract fulfilled\n    int *p = out;    // ok: *out already initialized\n    out = &local;    // ok\n}\n```\n\n### Delegation\n\n`ensure_init` can delegate to another `ensure_init` function:\n\n```c\nvoid init_val(int *__attribute__((ensure_init)) out);\n\nvoid init_delegated(int *__attribute__((ensure_init)) out) {\n    init_val(out);  // ok: delegates to another ensure_init\n}\n```\n\n### Redeclaration rules\n\nSame safety-level redeclarations must be consistent (both have `ensure_init` or neither). Different safety levels (`_Safe` vs non-safe) are independent overloads where differences are allowed.\n\n### Function pointer compatibility\n\n`ensure_init` is part of the function type. Cannot assign a non-`ensure_init` function to an `ensure_init` function pointer:\n\n```c\ntypedef _Safe void (*InitFn)(int *__attribute__((ensure_init)) _Borrow out);\n\n_Safe void has_attr(int *__attribute__((ensure_init)) _Borrow out) { *out = 1; }\n_Safe void no_attr(int *_Borrow out) { *out = 1; }\n\n_Safe void test(void) {\n    InitFn fn = has_attr;  // ok\n    // InitFn fn2 = no_attr;  // error: missing ensure_init\n}\n```\n\nIndirect calls through function pointers support `ensure_init` tracking:\n\n```c\n_Safe void indirect_call(InitFn fn) {\n    int x;\n    fn(&_Mut x);   // x marked initialized via ensure_init\n    int y = x;     // ok\n}\n```\n\n## 4. `__assume_initialized`\n\nBuilt-in function to mark a variable as initialized at a program point. No contract verification — user guarantees correctness.\n\n```c\n_Safe void example(void) {\n    int x;\n    _Unsafe { __assume_initialized(&x); }\n    int y = x;  // ok\n}\n```\n\n- Must use `&` prefix: `__assume_initialized(&x)` (not `__assume_initialized(x)`)\n- Only in `_Unsafe` blocks\n- Path-sensitive: only effective on the CFG path where it executes\n- One variable per call\n- For arrays: `__assume_initialized(&arr)` (required due to array decay)\n- For structs: marks all fields as initialized\n\n### Supported argument forms\n\nThe address-of operand must be one of:\n\n| Form | Meaning |\n|------|---------|\n| `&x` | local variable; if `x` is an `ensure_init` pointer parameter, also marks `*x` initialized |\n| `&x.f.g...` | local struct field, any nesting (pure field path) |\n| `&*p` | the object pointed-to by an `ensure_init` parameter `p` |\n| `&p->f.g...` | field of the object pointed-to by an `ensure_init` parameter (pure field path) |\n\nWhen all fields of `*p` are marked through `&p->...`, `*p` is automatically\npromoted to fully initialized.\n\n```c\nstruct Pair { int a; int b; };\nvoid assume_through_ptr(struct Pair *__attribute__((ensure_init)) out) {\n    out->a = 1;\n    _Unsafe { __assume_initialized(&out->b); }   // all fields covered → *out initialized\n}\n```\n\n### **Array subscripts (`[i]`) are NOT allowed in the path**\n\nInit analysis treats arrays as **single units** — individual elements are not\ntracked, so you can only assume the whole array, never an element.\n\n```c\nstruct WithArr { int arr[3]; };\nstruct Outer   { struct WithArr s[2]; };\n\n_Safe void example(void) {\n    struct WithArr w;\n    _Unsafe { __assume_initialized(&w.arr); }       // ok: whole array field\n\n    // _Unsafe { __assume_initialized(&w.arr[0]); }     // error: subscript in path\n    // _Unsafe { __assume_initialized(&o.s[0].arr); }   // error: subscript in middle\n    // _Unsafe { __assume_initialized(&o.s[0].arr[0]); }// error: subscript at end\n}\n```\n\n```c\n// Path-sensitive:\n_Safe void example(int cond) {\n    int x;\n    if (cond) { _Unsafe { __assume_initialized(&x); } }\n    int y = x;  // error: possibly uninitialized (not all paths)\n}\n```\n\n## 5. Compiler Options\n\n`-uninit-check=<mode>`:\n\n| Mode | Behavior |\n|------|----------|\n| `none` | Disable initialization analysis |\n| `safeonly` (default) | Check in `_Safe` zones only; `ensure_init` contract verification always active |\n| `all` | Check in all code (including non-safe) |\n\nNote: `ensure_init` contract verification is active whenever mode is not `none`, even outside safe zones.\n\n> For safe zone rules, see `bsc-safe-zone` Skill\n> For ownership initialization patterns, see `bsc-ownership` Skill\n> For common initialization mistakes, see `bsc-common-mistakes` Skill\n\n---\n\n\n# LSP Tool — BSC Code Intelligence\n\nThe LSP tool (`hover`, `findReferences`, `goToDefinition`, `goToImplementation`, `documentSymbol`, `workspaceSymbol`, `prepareCallHierarchy`, `incomingCalls`, `outgoingCalls`) is BSC-aware when clangd is running and configured for `.cbs`/`.hbs`.\n\n## IMPORTANT: Check LSP availability first\n\nBefore relying on LSP, probe with one call (e.g. `hover` on a known symbol). If it returns `No LSP server available for file type: .cbs`, the BSC-aware LSP is NOT registered in this environment. Fall back to manual analysis (Read + Grep) and tell the user.\n\n## Use LSP proactively when reasoning about ownership\n\nWhen you're about to make a non-trivial change to BSC code involving `_Owned` or `_Borrow` pointers, USE LSP FIRST instead of guessing from local context. Specifically:\n\n1. **Before adding/removing a function call that takes an `_Owned` argument**:\n   `hover` on the variable to see if it's been moved already.\n2. **Before introducing a new borrow** (`&_Const x` or `&_Mut x`):\n   `hover` on `x` to see existing borrowers — overlapping mutable borrows = compile error.\n3. **When a borrow-checker error mentions a variable**:\n   `hover` on that variable's declaration. The Ownership Flow tells you exactly where it was moved/borrowed/freed.\n\n## hover on `_Owned` / `_Borrow` pointer variables\n\nReturns the variable's full ownership lifecycle within its function:\n\n- **Ownership Flow** — chronological events with line numbers and code snippets:\n  `Declared`, `Moved in from x`, `Moved out to y`, `Moved into foo()`, `Copied in`,\n  `Mut borrow of x`, `Immut borrow of x`, `Mut reborrow of x`, `Init null`, `Freed`, `Dropped`\n- **Live range** — first to last event line\n\nExample output:\n```\nOwnership Flow:\nline 10: Declared\n  int *_Owned p = safe_malloc(42);\nline 18: Moved into consume()\n  consume(p);\nLive range: lines 10-18\n```\n\n## Known limitations — when to fall back to Grep\n\nclangd does not fully understand BSC's member-function call syntax (`obj->method(...)` resolved against `T::method`). This affects:\n\n- **findReferences** on a member function often returns only the declaration site, missing call sites. Always cross-check with `Grep` before renaming/deleting a symbol.\n- **incomingCalls** may report \"no incoming calls\" for a function clearly called via `obj->method()`. Use `Grep` for call-site discovery.\n\n## Net rule of thumb\n\n- Use **LSP** for ownership/type questions about a specific variable in a specific function.\n- Use **Grep** for cross-file discovery and call-site enumeration.\n- They are complements, not substitutes.\n\n---\n\n\n# BiSheng C Member Functions Skill\n\n## 1. Overview\n\nAttach methods to any type (struct, union, enum, int, float, etc.) without changing its memory layout (size and alignment are unaffected). Three forms: instance methods, value receivers, and static methods. This enables non-intrusive extension — add methods to existing types without modifying their source.\n\n## 2. Syntax\n\n```c\n// Instance method — first param is `this` pointer\nRetType TypeName::method(TypeName* this, OtherParams...) { body }\n\n// Value receiver — first param is `this` by value\nRetType TypeName::method(TypeName\
    \ this) { body }\n\n// Static method — no `this` param\nRetType TypeName::staticMethod(Params...) { body }\n\n// `This` is a shorthand for the enclosing type name\nRetType TypeName::method(This* this) { body }\nRetType TypeName::method(This this) { body }   // value receiver with This\n```\n\n### Declaration vs Definition separation\n\n```c\nvoid int::print(int* this);       // declaration\n\nvoid int::print(int* this) {      // definition\n    printf(\"%d\", *this);\n}\n```\n\n## 3. Rules\n\n- `this` must be the first parameter if present\n- No method overloading or redefinition\n- Method names must not collide with member variable names (applies to struct, union, enum)\n- Must use `struct` keyword unless typedef-ed: `void struct S::f(struct S* this) {}`\n- typedef-ed names work: `typedef struct { int x; } Vec2; void Vec2::f(This* this) {}`\n- `this` pointer can be `const`/`volatile` qualified: `void int::read(const int* this) {}`\n\n### Type restrictions — cannot add methods to:\n- `void`\n- Pointer types\n- Array types\n- Function types\n- cv-qualified types (e.g. `const int`, `volatile float`)\n- **Incomplete types** (declared but not fully defined)\n\n### Other restrictions\n- If two header files define the same-named member function for the same type, including both in one compilation unit causes a compile error\n- Calling member functions directly on **literals** is currently prohibited: `42.print()` is an error (integer, float, and compound literals)\n- Static methods must be called as `TypeName::method()` — calling via dot notation on an instance is an error\n\n## 4. Call Syntax\n\n- Dot syntax: `obj.method()` for instances\n- Arrow syntax: `ptr->method()` for pointers\n- Explicit: `TypeName::method(&obj)` — equivalent to dot syntax\n\n## 5. Complete Example\n\n```c\n#include <stdio.h>\n\nstruct Person {\n    char name[32];\n    int age;\n};\n\n// Instance methods\nchar* struct Person::getName(struct Person* this) {\n    return this->name;\n}\n\nint struct Person::getAge(struct Person* this) {\n    return this->age;\n}\n\n// Method on primitive type\nvoid int::print(int* this) {\n    printf(\"%d\", *this);\n}\n\n// Value receiver\nint int::doubled(int this) {\n    return this * 2;\n}\n\n// Static method (no this)\nstruct Person struct Person::create(const char* name, int age) {\n    struct Person p;\n    int i = 0;\n    while (name[i] != '\\0' && i < 31) {\n        p.name[i] = name[i];\n        i++;\n    }\n    p.name[i] = '\\0';\n    p.age = age;\n    return p;\n}\n\nint main() {\n    struct Person p = struct Person::create(\"Alice\", 30);\n    printf(\"Name: %s\\n\", p.getName());\n    printf(\"Age: %d\\n\", p.getAge());\n\n    struct Person* pp = &p;\n    printf(\"Via pointer: %s\\n\", pp->getName());\n\n    int x = 21;\n    x.print();\n    printf(\"\\n\");\n    int d = x.doubled();\n    printf(\"Doubled: %d\\n\", d);\n\n    printf(\"Explicit: %d\\n\", struct Person::getAge(&p));\n    return 0;\n}\n```\n\n> For generic member functions, see `bsc-generic` Skill\n> For trait methods using This*, see `bsc-trait` Skill\n> For operator overloading on types, see `bsc-operator-overloading` Skill\n> For member function errors (BSC-E11xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Nullability Skill\n\n## 1. Overview\n\nBSC tracks pointer nullability at compile time. The compiler prevents dereferencing or accessing members through pointers that may be null.\n\n- `_Nonnull` — pointer guaranteed non-null (default for `_Owned` and `_Borrow`)\n- `_Nullable` — pointer may be null (default for raw pointers)\n- `nullptr` — null pointer literal (replaces `NULL` in safe zones)\n\n## 2. Default Nullability\n\n| Pointer kind | Default | Override |\n|-------------|---------|----------|\n| Raw pointer (`int *`) | Nullable | `int *_Nonnull` |\n| `_Owned` pointer (`int *_Owned`) | Nonnull | `int *_Owned _Nullable` |\n| `_Borrow` pointer (`int *_Borrow`) | Nonnull | `int *_Borrow _Nullable` |\n\n```c\n// Nullable pointers:\nint *_Nullable p1 = nullptr;\nint *_Borrow _Nullable p2 = nullptr;\nint *_Owned _Nullable p3 = nullptr;\nint *p4 = nullptr;                    // raw pointer is Nullable by default\n\n// Nonnull pointers:\nint *_Nonnull p5 = &a;\nint *_Borrow p6 = &_Mut a;           // _Borrow is Nonnull by default\nint *_Owned p7 = safe_malloc<int>(5); // _Owned is Nonnull by default\n```\n\n## 3. Trackable Pointers\n\nThe compiler can track nullability only for pointers that:\n1. Are **lvalues** (have a memory address)\n2. Are **not** `volatile`\n3. Are **not** obtained through array subscript (`[]`)\n\n```c\n_Safe void test(int *_Borrow _Nullable p, int *_Borrow _Nullable volatile vp) {\n    int *_Borrow _Nullable q = nullptr;\n    int *_Borrow _Nullable arr[2] = {nullptr, &_Mut local};\n\n    if ((q = p) != nullptr) {\n        *q = 1;  // ok: q is trackable lvalue\n    }\n    if (identity(p) != nullptr) {\n        *identity(p) = 3;  // error: function return is not lvalue\n    }\n    if (vp != nullptr) {\n        *vp = 4;  // error: volatile pointer not tracked\n    }\n    if (arr[1] != nullptr) {\n        *arr[1] = 5;  // error: array subscript not tracked\n    }\n}\n```\n\n### Workaround: copy through a trackable local\n\nWhen you need to dereference an untrackable nullable pointer, first bind it to\na **fresh local variable** (which is trackable by virtue of being a plain lvalue),\nthen null-check and dereference the local:\n\n```c\n_Safe void use_untrackable(int *_Borrow _Nullable p, int *_Borrow _Nullable arr[]) {\n    int *_Borrow _Nullable t1 = identity(p);  // trackable temp\n    if (t1 != nullptr) { *t1 = 3; }           // ok\n\n    int *_Borrow _Nullable t3 = arr[1];       // trackable temp\n    if (t3 != nullptr) { *t3 = 5; }           // ok\n}\n```\n\nThe temp must be a local variable — not a struct member, not another array\nelement. This is the recommended pattern whenever you face an untrackable\nnullable pointer.\n\n## 4. Nullability State Changes\n\nFor **Nonnull-marked** pointers: state is always Nonnull. If null-checked, the null branch treats it as null (useful for `_Owned` leak prevention):\n\n```c\n_Safe int test(void) {\n    int *_Owned a = safe_malloc<int>(1);  // Nonnull\n    if (a != nullptr) {\n        safe_free((void *_Owned)a);\n        return 1;\n    }\n    return 0;  // ok: no leak error (a treated as null in this branch)\n}\n```\n\nFor **Nullable-marked** pointers, state changes via:\n1. **Assignment with non-null expression** → becomes Nonnull\n2. **Null check in control flow** → Nonnull in the non-null branch\n\n```c\n_Safe void test(void) {\n    int *_Borrow _Nullable p1 = nullptr;    // Nullable\n    *p1 = 10;                                // error!\n\n    int local = 10;\n    p1 = &_Mut local;                        // → Nonnull (non-null assignment)\n    *p1 = 20;                                // ok\n\n    p1 = foo(&_Mut local);                   // → Nullable (foo returns _Nullable)\n    *p1 = 20;                                // error!\n\n    p1 = bar(&_Mut local);                   // → Nonnull (bar returns Nonnull)\n    *p1 = 20;                                // ok\n\n    int *_Borrow _Nullable p2 = foo(&_Mut local);\n    if (p2 != nullptr)\n        *p2 = 10;  // ok: Nonnull in true branch\n    else\n        *p2 = 20;  // error: Nullable in else branch\n}\n```\n\n## 5. Null Check Patterns\n\nIn conditions of `if`/`while`/ternary, these patterns constitute null checks:\n\n1. **Direct pointer**: `if (p)` / `while (s.p)`\n2. **Logical operators**: `if (!p)` / `if (p && q)` / `if (p || q)`\n3. **Explicit comparison**: `if (p != nullptr)` / `if (nullptr == p)`\n4. **With assignment**: `if ((q = p) != nullptr)` — only checks `q`\n5. **In comma expression**: `if ((x, p != nullptr))` — only checks last\n6. **Parentheses**: any of above can be nested in parens\n\nState updates:\n- `if (e)` / `if (e != nullptr)`: `e` is Nonnull in true branch\n- `if (!e)` / `if (e == nullptr)`: `e` is Nonnull in false/else branch\n- `if (p && q)`: both Nonnull in true branch\n- `if (!p || !q)`: both Nonnull in else branch\n\n## 6. Assignment, Passing, and Return Rules\n\n```c\n// Cannot assign nullable value to Nonnull pointer:\nint *_Borrow p1 = nullptr;          // error in safe zone\nint *_Borrow p2 = foo(&_Mut local); // error if foo returns _Nullable\n\n// Cannot pass nullable argument to Nonnull parameter:\n_Safe void bar(int *_Borrow p) {}\nbar(nullable_ptr);  // error\n\n// Cannot return nullable from Nonnull return type:\n_Safe int *_Borrow return_nonnull(int *_Borrow p) {\n    int *_Borrow _Nullable q = nullptr;\n    return q;  // error\n}\n```\n\n### Raw `const char*` parameters and C-string return types\n\nRaw pointer parameters default to `_Nullable`. Subscripting or dereferencing a nullable\npointer in a `_Safe` function is a compile error:\n\n```c\n// ERROR — s is _Nullable by default; s[i] is a null-unsafe deref\n_Safe size_t my_strlen(const char* s) {\n    size_t n = 0;\n    while (s[n]) { n++; }  // error: nullable pointer cannot be dereferenced\n    return n;\n}\n\n// CORRECT — declare _Nonnull; caller guarantees non-null at the call site\n_Safe size_t my_strlen(const char* _Nonnull s) {\n    size_t n = 0;\n    while (s[n]) { n++; }  // ok\n    return n;\n}\n```\n\nThe same problem appears in the **return position** when a nullable return feeds a\n`_Nonnull` parameter:\n\n```c\n// Returns nullable by default\nconst char* mime_for_ext(const char* _Nonnull ext);\n\n// Parameter is _Nonnull\n_Safe Response make_response(String body, const char* _Nonnull ct);\n\n// ERROR — \"cannot pass nullable pointer argument to nonnull parameter\"\n_Safe Response f(const char* _Nonnull path) {\n    return make_response(body, mime_for_ext(path));\n}\n\n// FIX — declare the return _Nonnull when the function always returns a valid pointer\nconst char* _Nonnull mime_for_ext(const char* _Nonnull ext);\n```\n\n**Practical rule**: any `_Safe` function that subscripts a `const char*` parameter must\n\
    declare it `const char* _Nonnull`. Any function whose return value is passed\nunconditionally to a `_Nonnull` parameter should declare its return `const char* _Nonnull`\n— provided it truly never returns null.\n\n## 7. Type Casting\n\nWith `-nullability-check=all`, casting Nullable to Nonnull in non-safe zones is also checked:\n\n```c\nvoid foo() {\n    int *p1 = nullptr;\n    int *p2 = (int *_Nonnull)p1;   // error: nullable to nonnull cast\n    int *_Owned p3 = (int *_Owned)p1; // error\n}\n```\n\nAfter a null check, casting is allowed:\n\n```c\nvoid foo() {\n    int *p1 = nullptr;\n    if (p1 != nullptr) {\n        int *_Nonnull p2 = (int *_Nonnull)p1;  // ok\n        int *_Owned p3 = (int *_Owned)p1;       // ok\n    }\n}\n```\n\n## 8. Struct Members\n\n```c\nstruct Data { int *_Borrow _Nullable value; };\n\n_Safe void test(void) {\n    int local = 10;\n    // Init list: nullability inferred from initializer\n    struct Data data1 = {.value = bar(&_Mut local)};  // Nonnull\n    *data1.value = 10;  // ok\n\n    // Non-init-list: defaults to Nullable\n    struct Data data2 = init_data(&_Mut local);  // Nullable\n    *data2.value = 10;  // error\n\n    // Fix: reassign or null-check\n    data2.value = bar(&_Mut local);  // → Nonnull\n    *data2.value = 10;               // ok\n\n    if (data3.value != nullptr)\n        *data3.value = 10;           // ok\n}\n```\n\n## 9. Compiler Options\n\n`-nullability-check=<mode>`:\n\n| Mode | Behavior |\n|------|----------|\n| `safeonly` (default) | Only check in `_Safe` zones |\n| `all` | Check in all code (safe and non-safe) |\n\nWithout the option, behavior is equivalent to `-nullability-check=safeonly`.\n\n> For ownership and `_Owned _Nullable`, see `bsc-ownership` Skill\n> For borrowing and `_Borrow _Nullable`, see `bsc-borrowing` Skill\n> For safe zones, see `bsc-safe-zone` Skill\n> For nullability errors (BSC-E04xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Operator Overloading Skill\n\n## 1. Overview\n\nDefine operator behavior for user-defined types by marking a global function with `__attribute__((operator OP))`. The compiler redirects matching operator expressions to the overload function.\n\n## 2. Syntax\n\n```c\n__attribute__((operator OP))\nRetType functionName(Params...) {\n    // implementation\n}\n```\n\nWhere `OP` is one of the supported operators listed below.\n\n## 3. Supported Operators\n\n| Category | Operators |\n|----------|-----------|\n| Binary arithmetic | `+`, `-`, `*`, `/`, `%` |\n| Relational | `==`, `!=`, `<`, `>`, `<=`, `>=` |\n| Bitwise | `\\|`, `&`, `~`, `^`, `<<`, `>>` |\n| Unary | `+` (positive), `-` (negate), `*` (dereference) |\n| Member access | `->` |\n| Indexing | `[]` |\n\n## 4. Parameter and Return Requirements\n\n| Operator | Params | Return |\n|----------|--------|--------|\n| Relational (`==`, `!=`, `<`, `>`, `<=`, `>=`) | Exactly 2 params; at least one must be a user-defined type (struct, enum) | Must return `_Bool` |\n| `*` (deref), `->` (member access) | Exactly 1 param; must be a pointer to user-defined type (raw, `*_Borrow`, or `*_Borrow const`) | Must return a pointer type (raw, `*_Borrow`, `*_Borrow const`, or `Rc` pointer) |\n| `[]` (indexing) | Exactly 2 params; first must be a pointer to user-defined type (raw, `*_Borrow`, or `*_Borrow const`) | Must return a pointer type (raw, `*_Borrow`, `*_Borrow const`, or `Rc` pointer) |\n| Other unary (`+`, `-`, `~`) | Exactly 1 param; must be a user-defined type | No restriction |\n| Other binary (`+`, `-`, `*`, `/`, `%`, `\\|`, `&`, `^`, `<<`, `>>`) | Exactly 2 params; at least one must be a user-defined type | No restriction |\n\n## 5. Rules\n\n- Overload functions must be **global functions** — cannot be member functions or `_Trait` functions\n- At least one parameter must be a user-defined type (struct, enum) — overloading for purely built-in types is forbidden\n- Overload function names must not conflict with existing non-overload function names\n- Multiple overloads for the same operator are allowed if function names differ AND parameter types differ\n- Overload functions can be **generic functions**\n- For `*` (deref) and `->`: the compiler auto-takes `&_Mut` of the operand and passes it to the function. For `*`, the return value is also auto-dereferenced\n- For `[]`: the compiler auto-takes `&_Mut` of the operand and passes it with the index. The return value is auto-dereferenced\n\n## 6. Examples\n\n### Binary arithmetic\n\n```c\nstruct Square { int width; int height; };\n\n__attribute__((operator+))\nstruct Square squareAdd(struct Square s1, struct Square s2) {\n    struct Square s = {s1.width + s2.width, s1.height + s2.height};\n    return s;\n}\n\nint main() {\n    struct Square s1 = {100, 50};\n    struct Square s2 = {60, 110};\n    struct Square s3 = s1 + s2;  // calls squareAdd\n    return 0;\n}\n```\n\n### Relational\n\n```c\n__attribute__((operator>))\n_Bool FooCompare(struct Foo A, struct Foo B) {\n    return A.y > B.y;\n}\n```\n\n### Dereference (`*`)\n\n```c\nstruct MyPoint<T> { T *data; };\n\n__attribute__((operator*))\nT * derefMyPoint<T>(struct MyPoint<T> *_Borrow p) {\n    return p->data;\n}\n\nint main() {\n    int data = 100;\n    struct MyPoint<int> p = { &data };\n    // *p == 100  (equivalent to: *derefMyPoint(&_Mut p))\n    *p = 10;\n    return 0;\n}\n```\n\n### Member access (`->`)\n\n```c\nstruct MyData<T> { T a; };\nstruct MyPoint<T> { MyData<T> *data; };\n\n__attribute__((operator->))\nMyData<T> * mDerefMyPoint<T>(struct MyPoint<T> *_Borrow p) {\n    return p->data;\n}\n\nint main() {\n    struct MyData<int> d = { 100 };\n    struct MyPoint<int> p = { &d };\n    // p->a == 100  (equivalent to: mDerefMyPoint(&_Mut p)->a)\n    p->a = 10;\n    return 0;\n}\n```\n\n### Indexing (`[]`)\n\n```c\n#define ARRLEN 10\nstruct MyArray<T> { T data[ARRLEN]; };\n\n__attribute__((operator[]))\nT *GetMyArrayData<T>(struct MyArray<T> *p, int index) {\n    return &p->data[index];\n}\n\nint main() {\n    struct MyArray<int> array;\n    for (int i = 0; i < ARRLEN; i++) {\n        array[i] = i;  // equivalent to: *GetMyArrayData(&_Mut array, i) = i\n    }\n    return 0;\n}\n```\n\n### Generic operator overloading\n\n```c\nstruct Point<T> { T x; T y; };\n\n__attribute__((operator+))\nstruct Point<T> Add<T>(struct Point<T> lhs, struct Point<T> rhs) {\n    T x1 = lhs.x + rhs.x;\n    T y1 = lhs.y + rhs.y;\n    struct Point<T> p = { .x = x1, .y = y1 };\n    return p;\n}\n\nint main() {\n    struct Point<int> p1 = {.x = 1, .y = 2};\n    struct Point<int> p2 = {.x = 3, .y = 4};\n    struct Point<int> p3 = p1 + p2;  // {.x = 4, .y = 6}\n    return 0;\n}\n```\n\n> For member function basics, see `bsc-member-function` Skill\n> For generic functions, see `bsc-generic` Skill\n> For operator overload errors (BSC-E12xx), see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Overview Skill\n\n## 1. What is BiSheng C\n\nBiSheng C (BSC) is a **superset of C** with Rust-inspired memory safety, traits, generics, and async/await. All valid C code is valid BSC code.\n\n- Source files: `.cbs` (or `.c` compiled with `-x bsc`)\n- Header files: `.hbs` (or `.h` compiled with `-x bsc`)\n- Compiler: clang fork — `clang file.cbs -o output`, or `clang -x bsc file.c -o output` to treat a `.c` file as BSC\n\n## CRITICAL Syntax Rule\n\n`_Owned` and `_Borrow` are **pointer qualifiers** — they go **after the `*`**, never before the type:\n- CORRECT: `char *_Owned p = (char *_Owned)malloc(n);`\n- CORRECT: `const int *_Borrow r = &_Const x;`\n- WRONG: `_Owned char* p = malloc(n);` — does not compile\n- WRONG: `_Borrow int* r = ...;` — does not compile\n\n`malloc()` returns raw `void*` and MUST be cast: `(T *_Owned)malloc(...)`.\n\n## 2. Feature Overview\n\n| Feature | Keywords | Description |\n|---------|----------|-------------|\n| Member functions | `TypeName::method`, `this`, `This` | Attach methods to any type (struct, primitive, etc.) |\n| Generics | `<T>`, `<T, int N>` | Compile-time monomorphization, constant generics, type aliases |\n| Traits | `_Trait`, `_Impl`, `This*` | Interface abstraction with vtable dynamic dispatch |\n| Operator overloading | `__attribute__((operator OP))` | Overload operators for user-defined types |\n| Ownership | `_Owned`, `_ArrayElem`, `_Nullable`, `_Nonnull`, `_Public` | Move semantics, RAII destructors, compile-time memory safety |\n| Borrowing | `_Borrow`, `_ArrayElem`, `&_Const`, `&_Mut` | Non-owning references with lifetime enforcement |\n| Nullability | `_Nullable`, `_Nonnull`, `nullptr` | Compile-time null-safety checking |\n| Safe zones | `_Safe`, `_Unsafe` | Compiler-enforced memory safety regions |\n| Initialization analysis | `__attribute__((ensure_init))`, `__assume_initialized` | Field-level uninitialized variable detection |\n| Coroutines | `_Async`, `_Await`, `Future` | Stackless coroutines with poll-based execution |\n| Scheduler | `Scheduler::init/spawn/run/destroy` | Thread-pool concurrent task execution |\n| constexpr | `constexpr`, `_Static_assert`, `if constexpr` | Compile-time evaluation and type-specialized branches |\n| Type traits | `is_integral<T>()`, `is_pointer<T>()`, etc. | Compile-time type classification |\n| Standard library | `Vec<T>`, `String`, `Option<T>`, `Result<T>` | Safe containers with RAII |\n\n## 3. Quick Syntax Summary\n\n| Feature | Syntax |\n|---------|--------|\n| Source/header | `.cbs` / `.hbs` |\n| Member function | `RetType TypeName::method(TypeName* this, ...)` |\n| Static member | `RetType TypeName::method(...)` (no this) |\n| Generic function | `T func<T>(T arg)` |\n| Generic struct | `struct S<T> { T field; };` |\n| Constant generic | `struct A<T, int N> { T data[N]; };` |\n| Type alias (generic) | `typedef Alias<T> = OldType<T>;` |\n| Conditional type alias | `conditional<C, T, F>` (from `bsc_conditional.hbs`) |\n| Trait definition | `_Trait Name { RetType method(This* this); };` |\n| Trait impl | `_Impl _Trait Name for TypeName;` |\n| Trait pointer | `_Trait Name* ptr = &value;` |\n| Operator overload | `__attribute__((operator+))\
    \ RetType func(...)` |\n| Owned pointer | `T *_Owned` (**not** `_Owned T*` — qualifier goes after `*`) |\n| Owned struct | `_Owned struct S { _Public: ...; ~S(S this) {...} };` (must be at file scope) |\n| Owned array pointer | `T *_Owned _ArrayElem` — `_Owned` pointer that supports `[]` (see `bsc-ownership`) |\n| Immutable borrow | `const T *_Borrow ref = &_Const value;` (**not** `_Borrow T*`) |\n| Mutable borrow | `T *_Borrow ref = &_Mut value;` |\n| Borrow into array | `T *_Borrow _ArrayElem p = &_Mut arr[i];` — supports `[]`, `+`, `-`, `++`, `--` |\n| Nullable pointer | `T *_Owned _Nullable p = nullptr;` |\n| Nonnull pointer | `T *_Nonnull p = &value;` |\n| Safe function | `_Safe RetType func(ParamType param) { ... }` |\n| Unsafe block | `_Unsafe { ... }` |\n| Async function | `_Async RetType func(...) { ... }` |\n| Await | `T result = _Await asyncFunc();` |\n| constexpr if | `if constexpr (expr) { ... }` |\n| Destructor | `~TypeName(TypeName this) { ... }` (inside `_Owned struct`) |\n| ensure_init | `void f(int *__attribute__((ensure_init)) out)` |\n| assume init | `_Unsafe { __assume_initialized(&x); }` |\n\n## 4. Skill Index\n\n> For member functions, see `bsc-member-function` Skill\n> For generics, see `bsc-generic` Skill\n> For traits, see `bsc-trait` Skill\n> For operator overloading, see `bsc-operator-overloading` Skill\n> For ownership, see `bsc-ownership` Skill\n> For borrowing, see `bsc-borrowing` Skill\n> For nullability, see `bsc-nullability` Skill\n> For safe zones, see `bsc-safe-zone` Skill\n> For initialization analysis, see `bsc-initialization` Skill\n> For coroutines, see `bsc-coroutine` Skill\n> For constexpr, see `bsc-constexpr` Skill\n> For standard library, see `bsc-stdlib` Skill\n> For compilation, see `bsc-compile` Skill\n> For common pitfalls, see `bsc-common-mistakes` Skill\n> For error codes and diagnostics, see `bsc-errors` Skill\n\n---\n\n\n# BiSheng C Ownership Skill\n\n## CRITICAL: `_Owned` Syntax\n\n**`_Owned` goes AFTER the `*`, not before the type.** It is a pointer qualifier, like `const`.\n\n```c\n// CORRECT — _Owned after *\nint *_Owned p = safe_malloc(42);\n\n// WRONG — _Owned before type (DOES NOT COMPILE)\n_Owned int* p = safe_malloc(42);\n```\n\nSame rule applies to `_Borrow`: write `int *_Borrow`, not `_Borrow int*`.\n\n## 1. Overview\n\nMove semantics for compile-time memory safety. Prevents use-after-free and double-free at compile time. Once ownership transfers, the original variable is dead.\n\nUse `safe_malloc` / `safe_free` (from `bishengc_safety.hbs`) as the idiomatic allocation APIs. Raw `malloc`/`free` require `_Unsafe` context and explicit casts.\n\n## 2. safe_malloc / safe_free\n\nSignatures: `T *_Owned safe_malloc<T>(T t)` — allocates, initializes to `t`, returns `T *_Owned`.\n`void safe_free(void *_Owned)` — frees an `_Owned` pointer. No cast needed for `safe_malloc`:\n```c\n#include \"bishengc_safety.hbs\"\n_Safe void example(void) {\n    int *_Owned p = safe_malloc(42);       // no cast needed\n    safe_free((void *_Owned)p);            // must cast to void *_Owned\n}\n```\n\n**malloc/free alternative** (requires `_Unsafe` context):\n```c\n_Unsafe {\n    int *_Owned p = (int *_Owned)malloc(sizeof(int));  // raw->owned cast\n    *p = 42;\n    free((void *_Owned)p);\n}\n```\n\n## 3. Owned Pointers\n\n```c\n#include \"bishengc_safety.hbs\"\n\nint *_Owned create(int val) {\n    return safe_malloc(val);  // ownership transfers to caller\n}\n\nvoid consume(int *_Owned p) {\n    int val = *p;\n    safe_free((void *_Owned)p);\n}\n\n_Safe int main(void) {\n    int *_Owned p = create(21);\n    int *_Owned p2 = p;        // ownership MOVES; p is now dead\n    consume(p2);               // p2 is now dead\n    int *_Owned _Nullable maybe = nullptr;  // nullable owned pointer\n    return 0;\n}\n```\n\n## 4. Multi-level Pointer Release (Inner to Outer)\n\nFor multi-level pointers, release from inner to outer. For structs with `_Owned` pointer members, free all `_Owned` members first, then the struct pointer.\n\n```c\n#include \"bishengc_safety.hbs\"\nstruct S { int *_Owned p; int *_Owned q; };\n\n_Safe void foo(void) {\n    // Multi-level pointer: free inner first, then outer\n    int *_Owned inner = safe_malloc(1);\n    int *_Owned *_Owned pp = safe_malloc(inner);\n    safe_free((void *_Owned)*pp);\n    safe_free((void *_Owned)pp);\n\n    // Struct with _Owned members: free members first, then struct\n    struct S s = {.p = safe_malloc(2), .q = safe_malloc(3)};\n    struct S *_Owned sp = safe_malloc(s);\n    safe_free((void *_Owned)sp->p);\n    safe_free((void *_Owned)sp->q);\n    safe_free((void *_Owned)sp);\n}\n```\n\n## 5. Rules\n\n- **`_Owned` goes after the `*`**: write `int *_Owned`, NOT `_Owned int*`\n- `_Owned` can only modify **pointer types**, not non-pointer types\n- `_Owned` types have **move semantics**: assignment, passing, returning **transfers** ownership\n- After transfer, the original variable is **dead** — any use is a compile error\n- Before scope ends, `_Owned` variables **must** have ownership released\n- Release by: (a) passing to function taking `_Owned`, (b) `safe_free((void *_Owned)p)`, (c) returning, (d) assigning to another `_Owned` variable\n- No pointer arithmetic on `_Owned` pointers (no `+`, `-`, `[]`, `++`, `--`). For an `_Owned` pointer that owns an array and needs `[]`, use `_Owned _ArrayElem` instead — see §8.\n- Comparison operators (`==`, `!=`, `<`, etc.) are allowed\n- No implicit conversion between `_Owned` and raw pointers in **either** direction — strict type matching\n- Explicit cast between `_Owned` and raw pointers requires `_Unsafe` context\n- Exception: `T *_Owned` -> `void *_Owned` is allowed in safe context\n\n### Prohibited uses of `_Owned`\n- **Global variables** (including function-local `static`)\n- **Union members**: `_Owned` cannot modify union type members\n  ```c\n  union U { int *_Owned p; };  // ERROR\n  ```\n- **Array elements**: cannot store `_Owned` pointers in arrays, including structs with `_Owned` members as array elements. The same restriction applies to the pointee type of `T *_Owned _ArrayElem` (the inner element type cannot have `_Owned` members)\n\n### Nullable `_Owned` pointers\n- `int *_Owned _Nullable p = nullptr;` allows null owned pointers\n- `__take_from_raw` and `__move_to_raw` preserve Nullability\n\n### Logical and conditional operators\n- Logical operators (`!`, `&&`, `||`) work on `_Owned` pointers (null checks, no ownership consumed)\n- `_Owned` pointers can be conditions in `if`/`while`/`do-while`/`for`/ternary, but **NOT** `switch`\n- Implicit `_Owned` -> `_Bool` conversion is allowed (does not consume ownership)\n\n### `_Owned` with `_Trait` types\n- Implicit conversion: `S *_Owned` to `_Trait T *_Owned` if `S` implements `T`\n- Can call trait methods through `_Trait T *_Owned` pointers\n\n### Function pointer matching\n- Function pointer types must match `_Owned` annotations exactly — cannot assign an `_Owned`-parameter function to a non-`_Owned`-parameter pointer or vice versa\n\n### Explicit ownership transfer interfaces\n- `__move_to_raw(p)` — moves ownership out, returns raw pointer\n- `__take_from_raw(p)` — takes ownership from raw pointer, returns `_Owned` pointer\n- Both preserve Nullability\n\n### Conversion order matters\nWhen converting between `T *_Owned` and `void *`:\n- **Order 1**: `T *_Owned` → `void *_Owned` → `void *` (internal `_Owned` pointers must NOT have ownership)\n- **Order 2**: `T *_Owned` → `T *` → `void *` (internal `_Owned` pointers KEEP ownership)\n\nThe reverse cast `void *_Owned` → `T *_Owned` is allowed (in `_Unsafe`) when the variable still owns memory, **but the resulting struct's inner `_Owned` members do NOT own their pointees** after the cast. You must either reassign them before reading or treat them as raw. Example: after `struct S *_Owned sp = _Unsafe((struct S *_Owned)memAlloc(...));`, reading `sp->p` as `int *_Owned` is a compile error until `sp->p` is reassigned.\n\n### `_Owned` with generics\nIn generic functions, when `_Owned` modifies generic type parameter T (as `T _Owned` or `_Owned T`), `_Owned` applies to the complete type T. When T instantiates as `int*`, the result is `int* _Owned`.\n\n## 6. _Safe / _Unsafe Context\n\n- `_Safe` functions use `safe_malloc`/`safe_free`; raw `malloc`/`free` require `_Unsafe` blocks\n- Functions without `_Safe` or `_Unsafe` are non-safe by default\n\n## 7. Owned Structs (RAII)\n\n```c\n#include \"bishengc_safety.hbs\"\n#include <stdio.h>\n\n_Owned struct Buffer {\n_Private:                    // _Private is the DEFAULT access modifier\n    char *_Owned data;\n    int len;\n_Public:\n    int cap;\n    ~Buffer(Buffer this) {   // destructor — auto-called at scope end\n        safe_free((void *_Owned)this.data);  // _Owned members MUST be freed here\n    }\n};\n\nBuffer Buffer::new(int capacity, char init) {\n    return (Buffer){ .data = safe_malloc(init), .len = 0, .cap = capacity };\n}\n\n_Safe int main(void) {\n    {\n        Buffer buf = Buffer::new(256, '\\0');\n    }   // ~Buffer auto-called here\n    {\n        Buffer buf1 = Buffer::new(128, '\\0');\n        Buffer buf2 = buf1;  // MOVE: buf1 is dead, only ~Buffer(buf2) called\n    }\n    return 0;\n}\n```\n\n### 7.1 Owned Struct Rules\n\n- `_Owned struct` has move semantics as a whole\n- Destructor syntax: `~TypeName(TypeName this) { ... }` inside the struct body\n- Destructor is called automatically when variable goes out of scope (if not moved)\n- **Destructor cannot be explicitly called by the user** — only the compiler invokes it\n- If no destructor is defined, the compiler provides a default one\n- `_Owned` pointer members inside the struct **must** be manually freed in the destructor\n- **Access modifiers**: `_Private` (default) and `_Public` — only members/functions inside the struct body can access `_Private` members; extension functions and external code can only access `_Public` members\n- **Partial move is prohibited**: at scope end,\
    \ an `_Owned struct` must be either fully owned (nothing moved out) or entirely moved as a whole. Moving individual `_Owned` members while keeping the struct causes a compile error\n- Global `_Owned struct` variables do not have their destructors called (including function-local `static`)\n\n### 7.2 Pitfall: Tagged-struct as union-replacement carries hidden cost\n\nWhen you replace a C union with an `_Owned struct` containing all variant\nfields (a common pattern because BSC has no safe `_Owned` union), **every\ninstance carries the destructor cost of every variant**, not just the active one.\n\n```c\n// Replaces a C union { Object*; Array*; double; ... }\n_Owned struct ValueValue {\n_Public:\n    String         string;\n    double         number;\n    Object* _Owned object;   // heap-allocated for EVERY instance\n    Array*  _Owned array;    // heap-allocated for EVERY instance\n    int            boolean;\n\n    ~ValueValue(ValueValue this) {\n        free_Object(this.object);   // ALWAYS runs, even for non-Object values\n        free_Array(this.array);\n    }\n};\n```\n\nConsequences to be aware of:\n\n- Construction allocates **all** heap pointers via `safe_malloc` (one per\n  variant pointer field), even for primitive variants like `JSONNull` or\n  `JSONBoolean`.\n- Destruction calls `safe_free` on **all** of them — so any aliasing across\n  instances (especially through `clone` paths or `safe_swap` patterns)\n  doubles the free.\n- Memory cost is constant per value but **multiplies across containers**\n  (a `Vec<ValueValue>` of 1000 nulls still allocates 1000 Objects + 1000 Arrays).\n\n**Mitigations to consider at design time** (cross-ref `/bsc-design` Rule 7\nand §2 \"Replacing C unions\"):\n\n- Trait-based sum type for genuinely heterogeneous variants\n- Lazy initialization (allocate inner heap only when the variant is set)\n- Accept the cost and document it explicitly with a FIXME\n\nWhen debugging double-frees in code that uses this pattern, the most likely\ncause is field-level aliasing introduced by `clone` or `safe_swap` on the\nall-fields struct — see `/bsc-common-mistakes` §8.\n\n### 7.3 Raw pointer as heap buffer field (RawVec idiom)\n\nA plain `T *_Owned` **forbids array subscript** (`ptr[i]`). For a heap-allocated\narray that needs indexing you have two safe options:\n\n1. **`T *_Owned _ArrayElem`** (preferred when the buffer really is a uniform\n   array of `T`) — supports `[]` and pointer arithmetic, stays in `_Safe`. See §8.\n2. **Raw `T *` field** (the RawVec idiom, below) — needed when the buffer is\n   reinterpreted (byte buffer of mixed records), is allocated by a non-BSC\n   API (`malloc` from a C library), or otherwise doesn't fit `_ArrayElem`'s\n   uniform-element model.\n\nThe `_Owned struct` destructor handles freeing in both cases.\n\n```c\n// WRONG — _Owned ptr forbids subscript; this->data[i] = v is a compile error\nstruct BadBuf {\n    uint8_t *_Owned data;\n    size_t   used;\n};\n\n// CORRECT — raw T* field; struct destructor owns the allocation\n_Owned struct GoodBuf {\n_Public:\n    uint8_t *data;   // raw pointer — indexing works\n    size_t   used;\n    size_t   cap;\n\n    ~GoodBuf(GoodBuf this) {\n        _Unsafe { free(this.data); }   // manual free; struct is the owner\n    }\n};\n```\n\nAll reads and writes through the raw field must be wrapped in `_Unsafe`:\n\n```c\n_Safe void buf_write(GoodBuf *_Borrow _Nonnull this, uint8_t v) {\n    _Unsafe this->data[this->used] = v;   // raw subscript — _Unsafe statement\n    this->used += 1;\n}\n```\n\nFor plain `struct` (non-`_Owned`) wrappers, the pattern is identical: raw `T *`\nfield, `_Unsafe` around all dereferences, explicit `free` in a paired destroy\nfunction rather than a destructor. The distinction from `T *_Owned` is intentional\nand load-bearing: with raw `T *` the struct itself is the logical owner; the field\nis just a cursor.\n\n### 7.4 `_Owned struct` must be defined at file scope\n\n`_Owned struct S { ... };` definitions can only appear at translation-unit (file)\nscope — alongside `_Trait` definitions and function definitions. They **cannot**\nbe defined inside a function body or block (this differs from standard C where\nplain `struct` may be defined locally).\n\n```c\n// CORRECT — file scope\n_Owned struct Person { _Public: int age; ~Person(Person this) {} };\n\n_Safe int main(void) {\n    Person p = {.age = 18};\n    // _Owned struct S { };  // error: cannot be defined in function scope\n    return 0;\n}\n```\n\nCompiler error: `_Owned struct cannot be defined in function scope; move the\ndefinition to file scope`.\n\n## 8. `_ArrayElem`: Owned Pointers That Index Into Arrays\n\nA second qualifier, `_ArrayElem`, can be combined with `_Owned` (or `_Borrow` —\nsee `bsc-borrowing`) to form a pointer **into a heap-allocated array of T**.\n\n```\nT *_Owned _ArrayElem p;   // owns a heap array of T, supports p[i], p == q\n```\n\n`_Owned _ArrayElem` follows all the rules of plain `_Owned` (move semantics,\nmust be released, no implicit cast to/from raw, etc.) with these differences:\n\n- **`[]` subscript is allowed** (`p[i] = ...`, `int x = p[i];`)\n- Pointer **arithmetic is still forbidden** (`p += 1` is an error — even on\n  `_Owned _ArrayElem`)\n- Comparison (`==`, `!=`) is allowed\n- Allocate / free with **array-specific** APIs (from `bishengc_safety.hbs`):\n\n  ```c\n  _Safe T *_Owned _ArrayElem safe_malloc_array<T>(size_t n, T initial);\n  _Safe void safe_free_array(void *_Owned _ArrayElem);\n  ```\n\n- Raw-pointer conversion uses dedicated builtins (not `__move_to_raw` /\n  `__take_from_raw`):\n  - `__move_array_to_raw(p)` — moves an `_Owned _ArrayElem` out to a raw pointer\n  - `__take_array_from_raw(p)` — takes a raw pointer as `_Owned _ArrayElem`\n- **C-style casts between `T *`, `T *_Owned`, and `T *_Owned _ArrayElem` are\n  forbidden** — these three are distinct categories. Use the array builtins.\n- The **pointee type cannot contain `_Owned` members** (same restriction that\n  applies to ordinary arrays of `_Owned`).\n- `_ArrayElem` cannot modify a **raw** pointer; it only attaches to `_Owned` or\n  `_Borrow`.\n\n```c\n#include \"bishengc_safety.hbs\"\n\n_Safe int main(void) {\n    int *_Owned _ArrayElem p = safe_malloc_array(10, 0);  // [0]..[9] = 0\n    p[3] = 3;                                             // ok: subscript\n    // p += 1;                                            // error: no arithmetic\n    int *_Owned _ArrayElem q = safe_malloc_array(10, 1);\n    if (p == q) { /* ... */ }                             // ok: comparison\n    safe_free_array((void *_Owned _ArrayElem)p);\n    safe_free_array((void *_Owned _ArrayElem)q);\n    return 0;\n}\n```\n\n**`_Safe` / `_Unsafe` interop**: the compatibility rules treat `_Owned _ArrayElem`\nand `_Borrow _ArrayElem` as **whole qualifiers** — a `_Safe` redeclaration may\nadd `_Owned _ArrayElem` to an unannotated `_Unsafe` parameter, but you cannot\n\"upgrade\" `_Owned` to `_Owned _ArrayElem` or move between `_Owned` and\n`_Owned _ArrayElem` across declarations.\n\n### When to prefer `_Owned _ArrayElem` over the RawVec idiom (§7.3)\n\n- Buffer is a uniform array of one element type `T` and you index it as such\n  → `_Owned _ArrayElem`.\n- Buffer is treated as raw bytes, reinterpreted, or comes from a non-BSC\n  allocator → keep raw `T *` field + `_Unsafe` (RawVec).\n\n> See also: `bsc-borrowing`, `bsc-safe-zone`, `bsc-nullability`, `bsc-design`, `bsc-errors` Skills\n\n---\n\n\n# BiSheng C Safe Zones Skill\n\n## A Function With `_Unsafe { ... }` Inside Is STILL `_Safe`\n\n`_Safe` and `_Unsafe { ... }` are not in conflict; the whole point of an\n`_Unsafe` block is to give the function a local escape. Do not demote a\nfunction from `_Safe` to `_Unsafe` because its body needs one or two\nescape lines. `_Unsafe` is contagious — making the function `_Unsafe`\nforces every caller to also be `_Unsafe`.\n\n## `_Unsafe` Blocks Must Be Minimal\n\nWrap only the statements that genuinely require the escape, and nothing\nelse. Re-check each line you put inside `_Unsafe { ... }`: if it would\ncompile fine in `_Safe`, move it out.\n\n```c\n// BAD — bloated _Unsafe block, only the assignment needs the escape\n_Safe void f(uint8_t *buf, size_t i, uint8_t v) {\n    _Unsafe {\n        if (i >= cap) return;\n        validate(v);\n        buf[i] = v;\n        log(\"wrote byte\");\n    }\n}\n\n// GOOD — only the raw subscript is _Unsafe\n_Safe void f(uint8_t *buf, size_t i, uint8_t v) {\n    if (i >= cap) return;\n    validate(v);\n    _Unsafe buf[i] = v;\n    log(\"wrote byte\");\n}\n```\n\n`_Unsafe stmt;` (single statement, no braces) is often the right shape.\n\n## 1. Overview\n\nDesignate code regions where the compiler enforces memory safety. Default context is `_Unsafe` (standard C compatibility). Use `_Safe` to opt in to strict checking.\n\n## 2. Syntax\n\n`_Safe` / `_Unsafe` can modify: function declarations, function definitions, function signatures, function pointers, statements, and parenthesized expressions.\n\n```c\n_Safe int add(int a, int b) { return a + b; }  // safe function\n\nvoid example(void) {\n    _Safe { int x = 10; }         // safe block\n    _Safe int y = 1;              // safe statement\n}\n\n_Safe void process(const int *_Borrow v) {\n    _Unsafe { printf(\"%d\\n\", *v); }  // unsafe escape (printf is variadic)\n    _Unsafe int c = 1;               // unsafe statement\n    char d = _Unsafe((char)c);       // unsafe expression\n}\n```\n\nCannot use `_Safe`/`_Unsafe` on: global variables, type declarations outside functions, or `typedef` (except function pointer typedefs).\n\n## 3. Restrictions (compiler-enforced)\n\nIn `_Safe` zones:\n\n### Pointer operations\n- **No `&` address-of** — use `&_Const` or `&_Mut` to take borrows. Exception: taking the address of a function is allowed.\n- **No raw pointer dereference** (`*rawptr`, `rawptr->field`) — `_Owned` and `_Borrow` pointer dereference is OK\n- **No pointer category casts** — no casting\
    \ between `_Owned`/`_Borrow`/raw pointers, no pointer-to-integer or integer-to-pointer casts. Exception: `T *_Owned` can be explicitly cast to `void *_Owned`.\n- **No casts between pointers of different pointed-to types**\n- **`nullptr` required** — `NULL` is forbidden in safe zones; use `nullptr` to initialize or compare pointers\n\n#### Pointer conversion matrix\n\n| Conversion | In `_Safe` | In `_Unsafe` |\n|---|---|---|\n| `T *_Borrow` → `void *_Borrow` (T is trivial data: no pointers, not `_Owned struct`) | **OK** (implicit) | OK |\n| `T *_Borrow` → `void *_Borrow` (T has pointer fields / is `_Owned struct`) | **Forbidden** (even with explicit cast) | Forbidden |\n| `void *_Borrow` → `T *_Borrow` | **Forbidden** — explicit cast required, must be in `_Unsafe` | OK (explicit cast) |\n| `T *_Borrow _ArrayElem` → `T *_Borrow` | OK (implicit) | OK |\n| `T *_Borrow` → `T *_Borrow _ArrayElem` | Forbidden | Forbidden |\n| `T *_Borrow` → raw `T *` | **Forbidden everywhere** | Forbidden everywhere |\n| `T *_Owned` → `void *_Owned` | OK (explicit cast) | OK |\n| `void *_Owned` → `T *_Owned` | Forbidden in `_Safe`; in `_Unsafe`, allowed but the resulting struct's inner `_Owned` members do NOT own anything | OK (explicit cast, same caveat) |\n| `T *_Owned` ↔ `T *_Owned _ArrayElem` (C cast) | Forbidden — these are distinct categories; use `safe_malloc_array`/`__take_array_from_raw` | Forbidden |\n| `T *_Owned` → raw `T *` | Forbidden — use `__move_to_raw` | Forbidden — use `__move_to_raw` |\n| `T *_Owned _ArrayElem` → raw `T *` | Forbidden — use `__move_array_to_raw` | Forbidden — use `__move_array_to_raw` |\n| `fn(A *_Borrow)` → `fn(B *_Borrow)` (fn-ptr cast) | Forbidden in heterogeneous `_Safe`/`_Unsafe` declarations — use trampoline pattern | Forbidden in heterogeneous declarations — use trampoline pattern |\n\n**The void-borrow two-step cast** is the canonical pattern for casting between unrelated struct pointer types inside a `_Safe` function (e.g. vtable trampolines — see `c-to-bsc` §5 \"C OO patterns\"):\n\n```c\n/* Goal: cast public_t *_Borrow → private_t *_Borrow */\nprivate_t *_Borrow _Nonnull this = _Unsafe(\n    (private_t *_Borrow _Nonnull)(void *_Borrow _Nonnull)self);\n```\n\n- Step 1: `public_t *_Borrow → void *_Borrow` — implicit, allowed in `_Safe`.\n- Step 2: `void *_Borrow → private_t *_Borrow` — explicit cast, wrapped in `_Unsafe(expr)`.\n- Direct `public_t *_Borrow → private_t *_Borrow` is **forbidden** (different pointed-to types).\n\n### Raw pointer params/returns are allowed in signatures\nA `_Safe` function **may** have raw pointer params/returns, and may have structs with pointer members or union types as params/returns. The restrictions apply to *operations on* pointers inside the safe zone, not their presence in signatures.\n\n### Initialization rules\n- **Pointer types** (raw, `_Owned`, `_Borrow`, function pointers) **must** be initialized (use `nullptr` if needed)\n- **Structs/unions containing pointer fields** must be initialized with **complete** initializer lists (no partial init)\n- **Basic types** (`int`, `float`, `char`, `_Bool`) and structs/unions **without** pointer fields **may** be left uninitialized or partially initialized\n\n```c\n_Safe {\n    int a;                            // ok: basic type\n    int *p;                           // error: pointer must be initialized\n    int *p1 = nullptr;                // ok\n    struct HasPtr hp = {nullptr, 0};  // ok: complete init\n    struct HasPtr hp2 = {0};          // error: partial init (has pointer field)\n}\n```\n\n#### `_Owned struct` must use aggregate designated init — never a bare declarator\n\nAn `_Owned struct` always contains `_Owned` fields (directly or through `String`/`Vec`\nmembers). A bare declarator is always rejected in a safe zone:\n\n```c\n// ERROR — \"uninitialized declarator is forbidden in the safe zone\"\nRequest r;\n\n// CORRECT — all fields provided via aggregate designated init\nRequest r = {\n    .method  = String::new(),\n    .path    = String::new(),\n    .headers = Vec<Header>::new(),\n    .body    = String::new(),\n    .ok      = 0\n};\n```\n\nAll `_Owned` sub-fields must be move-initialized inside the brace list. You cannot\nconstruct the struct first and assign fields afterward — see the rule immediately below.\n\n#### Cannot reassign an `_Owned` struct field after construction; use `safe_swap` instead\n\nAfter an `_Owned struct` is initialized, assigning to an `_Owned` field is rejected:\n\n```c\nConfig c = { .name = String::new(), ... };\nString newname = build_name();\nc.name = newname;   // ERROR — \"assign to part of _Owned value\"\n```\n\nTwo legal alternatives:\n\n**A — move at construction** (preferred when the value is known before the struct is built):\n\n```c\nString name = build_name();\nConfig c = { .name = name, ... };  // `name` is moved in; `name` is dead afterward\n```\n\n**B — `safe_swap` for post-construction replacement** (from `bishengc_safety.hbs`):\n\n```c\nString newname = build_name();\nsafe_swap(&_Mut c.name, &_Mut newname);\n// swaps in place; old value lands in `newname` and destructs at scope end\n```\n\n`safe_swap<T>(T* _Borrow left, T* _Borrow right)` exchanges two owned values without a\ndirect assignment statement, which the safe-zone rules permit.\n\n### Increment/decrement (`++`/`--`)\n`++` and `--` are **allowed**, but their result type is `void`. You can use them as standalone statements, but you cannot use the expression's value.\n\n```c\n_Safe void foo(void) {\n    int a = 0;\n    a++;                // ok: side-effect only\n    int x = a++;        // error: result is void\n    for (int i = 0; i < 10; i++) {}  // ok: iteration clause\n}\n```\n\n### Type conversion rules\n- **No narrowing implicit casts** (`long` to `int`, `double` to `float`, `int` to `float`) — explicit cast required\n- **Compile-time constants** that fit the target type are exempt from narrowing restrictions\n- **No float-to-integer casts** (even explicit)\n- **Int-to-float** conversions are allowed explicitly in safe zones\n- **Enum conversions**: implicit enum-to-enum is forbidden; explicit is allowed only if target enum contains all values of source. Implicit enum-to-underlying-integer is allowed\n- **Comparison/logical operators** (`==`, `!=`, `>=`, `<=`, `>`, `<`, `&&`, `||`, `!`): results are `int` type (0 or 1) and may implicitly convert to other integer types\n- **if/while conditions**: any arithmetic type allowed (follows C rules)\n\n### Union rules\n- **No union member access** (`.` read or write) — but unions can be declared, initialized, and passed as arguments\n\n### Other restrictions\n- **No inline assembly**\n- **No calling unsafe functions** — must wrap in `_Unsafe {}`\n- **Empty params require `void`**: `_Safe void f(void)` — not `_Safe void f()`\n- **No variadic params** — unless the function has `__attribute__((format(...)))`:\n  ```c\n  _Safe int foo(int a, ...);  // error\n  __attribute__((format(printf, 1, 2)))\n  _Safe int bar(const char *fmt, ...);  // ok (but va_start/va_arg/va_end still forbidden inside the body)\n  ```\n- **Switch**: `case`/`default` only in first-level block after `switch`; no variable declarations in that first-level block\n\n## 4. Trait and Generic Safety Rules\n\n- `_Trait` functions declared `_Safe` require implementation functions to also be `_Safe`; if trait function is not `_Safe`, implementation can be `_Safe` (compiler warns)\n- `_Safe` generic functions: all instantiations are checked for safety\n- Member functions can also be `_Safe`/`_Unsafe` modified with same rules as global functions\n\n## 5. Mixed-Mode Declarations (_Safe/_Unsafe overloading)\n\nThe same function can have both `_Safe` and `_Unsafe` declarations:\n\n```c\n_Unsafe int* foo(int* p);              // unsafe version\n_Safe int* _Owned foo(int* _Owned p);  // safe version: adds _Owned\n```\n\n- `_Safe` declaration may **add** `_Owned`, `_Borrow`, `_Owned _ArrayElem`, or `_Borrow _ArrayElem` to raw pointer params/returns. `_Owned _ArrayElem` and `_Borrow _ArrayElem` are added as **whole units** — you cannot upgrade a plain `_Owned` to `_Owned _ArrayElem` across declarations.\n- Must **not remove** qualifiers present in the `_Unsafe` declaration, nor swap `_Owned` for `_Borrow` (and vice versa). Standard C qualifiers (`const`, `volatile`, …) on the **return type** must also be preserved; on **parameter types** they are stripped for compatibility.\n- In safe context, only `_Safe` overload is callable. In unsafe context, `_Safe` version preferred when types match.\n- **Generic functions do NOT support mixed mode**\n- If a function has multiple declarations of the same safety level, they must be consistent\n\n## 6. Function Pointer Rules\n\n- `_Safe` function pointers can only be assigned from functions that have a `_Safe` declaration\n- `_Unsafe` function pointers can be assigned from either `_Safe` or `_Unsafe` functions (if types are compatible)\n\n```c\n_Safe void safe_fn(void);\n_Unsafe void unsafe_fn(void);\n\n_Safe void (*sp)(void) = nullptr;\nsp = safe_fn;    // ok\nsp = unsafe_fn;  // error: no _Safe declaration available\n```\n\n## 7. Complete Example\n\n```c\n#include <stdio.h>\n#include \"bishengc_safety.hbs\"\n\n_Safe int add(int a, int b) { return a + b; }\n\n_Safe int readBorrow(const int *_Borrow ref) {\n    return *ref;  // ok: _Borrow dereference is safe\n}\n\nvoid mixedFunction(void) {\n    int *raw = (int *)malloc(sizeof(int));\n    *raw = 100;\n    _Safe {\n        int x = 42;\n        int y;  // ok: basic type, no init needed\n        const int *_Borrow ref = &_Const x;\n        y = readBorrow(ref);\n        _Unsafe {\n            printf(\"from safe zone: %d\\n\", y);\n            free(raw);\n        }\n    }\n}\n\n_Safe int main(void) {\n    int sum = add(10, 20);\n    const int *_Borrow r = &_Const sum;\n    _Unsafe { printf(\"sum = %d\\n\", *r); }\n    return 0;\n}\n```\n\n> For initialization analysis (field-level tracking), see `bsc-initialization`\
    \ Skill\n> For borrowing (required in safe zones), see `bsc-borrowing` Skill\n> For ownership in safe contexts, see `bsc-ownership` Skill\n> For nullability checking, see `bsc-nullability` Skill\n> For safe zone errors (BSC-E03xx), see `bsc-errors` Skill\n> For common safe zone mistakes, see `bsc-common-mistakes` Skill\n\n---\n\n\n# BiSheng C Standard Library — Core Types\n\n## 1. Overview\n\nlibcbs provides safe container types with RAII semantics. All containers are `_Owned struct` types with automatic destructors. Include the appropriate `.hbs` header.\n\n**Key rule**: Generic containers can only be instantiated with `_Owned struct` or copyable types. If `T` has move semantics but is not an `_Owned struct`, wrap it in one.\n\n## 2. Safety Utilities — `bishengc_safety.hbs`\n\nCore safety primitives used by all other libcbs types.\n\n```c\n#include \"bishengc_safety.hbs\"\n\n// Safe malloc — allocates and initializes with value, returns _Owned pointer\nT *_Owned safe_malloc<T>(T t);\n\n// Safe free — frees an owned pointer\nvoid safe_free(void *_Owned);\n\n// Safe array malloc — allocates n contiguous T initialized to `initial`,\n// returns _Owned _ArrayElem (supports p[i]). See bsc-ownership §8.\n_Safe T *_Owned _ArrayElem safe_malloc_array<T>(size_t n, T initial);\n\n// Safe array free — frees an _Owned _ArrayElem (NOT interchangeable with safe_free)\n_Safe void safe_free_array(void *_Owned _ArrayElem);\n\n// Safe swap — swaps two borrowed values\nvoid safe_swap<T>(T* _Borrow left, T* _Borrow right);\n\n// Forget — takes ownership and drops without running destructor\nvoid forget<T>(T t);\n```\n\n**Important**: `safe_free` is NOT `_Safe` — calls to `safe_free` inside a `_Safe` function must be wrapped in an `_Unsafe {}` block. `safe_malloc_array` and `safe_free_array` ARE `_Safe`, so they can be called directly from a `_Safe` function.\n\n**Match alloc/free**: `safe_malloc` ↔ `safe_free`, `safe_malloc_array` ↔ `safe_free_array`. Crossing the two pairs is a compile error — `T *_Owned` and `T *_Owned _ArrayElem` are distinct pointer categories. Likewise for raw conversion: `__move_to_raw` / `__take_from_raw` for `_Owned`; `__move_array_to_raw` / `__take_array_from_raw` for `_Owned _ArrayElem`.\n\n### Usage Example\n\n```c\n#include \"bishengc_safety.hbs\"\n\n_Safe void example(void) {\n    int *_Owned p = safe_malloc(42);\n\n    int a = 1;\n    int b = 2;\n    safe_swap(&_Mut a, &_Mut b);  // a=2, b=1\n\n    _Unsafe {\n        safe_free((void *_Owned)p);\n    }\n}\n```\n\n## 3. Vec\\<T\\> — Dynamic Array\n\n```c\n#include \"vec.hbs\"\n```\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `Vec<T>::new()` → `Vec<T>` | Create empty vec |\n| `with_capacity` | `Vec<T>::with_capacity(size_t)` → `Vec<T>` | Create with pre-allocated capacity |\n| `push` | `v.push(T)` | Append element (grows if needed) |\n| `pop` | `v.pop()` → `T` | Remove and return last element (aborts if empty) |\n| `get` | `v.get(size_t)` → `const T *_Borrow` | Immutable access (aborts if out of bounds) |\n| `get_mut` | `v.get_mut(size_t)` → `T *_Borrow` | Mutable access (aborts if out of bounds) |\n| `set` | `v.set(size_t, T)` | Set element at index (pushes if index == len) |\n| `remove` | `v.remove(size_t)` → `T` | Remove element at index, shift remaining |\n| `length` | `v.length()` → `size_t` | Number of elements |\n| `capacity` | `v.capacity()` → `size_t` | Allocated capacity |\n| `is_empty` | `v.is_empty()` → `_Bool` | Whether vec is empty |\n| `clear` | `v.clear()` | Remove all elements (calls destructors) |\n| `shrink_to_fit` | `v.shrink_to_fit()` | Reduce capacity to length |\n\n```c\n_Safe void vec_example(void) {\n    Vec<int> v = Vec<int>::new();\n    v.push(42);\n    v.push(17);\n    const int *_Borrow ref = v.get(0);       // 42\n    int val = v.pop();                        // 17\n    int removed = v.remove(0);               // 42\n    // ~Vec auto-frees when v goes out of scope\n}\n```\n\n## 4. String\n\n```c\n#include \"string.hbs\"\n```\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `String::new()` → `String` | Create empty string |\n| `with_capacity` | `String::with_capacity(size_t)` → `String` | Create with capacity |\n| `from` | `String::from(const char*)` → `String` | **_Unsafe** — create from C string |\n| `as_str` | `s.as_str()` → `const char *_Borrow` | Immutable C string view |\n| `as_mut_str` | `s.as_mut_str()` → `char *_Borrow` | Mutable C string view |\n| `get` | `s.get(size_t)` → `const char *_Borrow` | Immutable char access (bounds-checked) |\n| `get_mut` | `s.get_mut(size_t)` → `char *_Borrow` | Mutable char access (bounds-checked) |\n| `at` | `s.at(size_t)` → `char` | Character at index |\n| `push` | `s.push(char)` | Append character |\n| `set` | `s.set(size_t, char)` | Set character at index |\n| `find` | `s.find(char)` → `size_t` | Find first occurrence (`bsc_string_no_pos` if not found) |\n| `slice` | `s.slice(size_t start, size_t len)` → `String` | Extract substring |\n| `equals` | `s.equals(&other)` → `_Bool` | Compare two strings |\n| `length` | `s.length()` → `size_t` | String length |\n| `capacity` | `s.capacity()` → `size_t` | Allocated capacity |\n| `shrink_to_fit` | `s.shrink_to_fit()` | Reduce capacity to length |\n| `is_empty` | `s.is_empty()` → `_Bool` | Whether string is empty |\n\n**Note**: `String::from()` is `_Unsafe` — wrap in `_Unsafe {}` block when used in `_Safe` code.\n\n#### Common pitfalls\n\n**`String` is NOT NUL-terminated.** `as_str()` returns a view into the internal buffer\nwithout a guaranteed `\\0` after the last byte. Passing `s.as_str()` to any C function\nexpecting a NUL-terminated string (`fopen`, `printf \"%s\"`, `strcmp`, …) is undefined\nbehaviour. Always copy into a `char[]` with a NUL terminator before calling C APIs:\n\n```c\n// Helper (adapt to your project's naming):\n_Safe size_t str_to_cbuf(const String* _Borrow s, char* _Nonnull out, size_t cap) {\n    size_t n = s->length();\n    if (n >= cap) { n = cap - 1; }\n    for (size_t i = 0; i < n; i++) { out[i] = s->at(i); }\n    out[n] = '\\0';\n    return n;\n}\n\n// Usage:\nchar pathbuf[2048] = {0};\nstr_to_cbuf(&_Const full_path, pathbuf, sizeof(pathbuf));\n_Unsafe { FILE* f = fopen(pathbuf, \"rb\"); ... }\n```\n\n**`String` has no `push_str`.** There is no method to append a `const char*` or another\n`String` in one call. `push` appends a single `char`. Write a helper:\n\n```c\n_Safe void str_append_cstr(String* _Borrow s, const char* _Nonnull src) {\n    for (size_t i = 0; src[i] != '\\0'; i++) { s->push(src[i]); }\n}\n\n_Safe void str_append(String* _Borrow dst, const String* _Borrow src) {\n    size_t n = src->length();\n    for (size_t i = 0; i < n; i++) { dst->push(src->at(i)); }\n}\n```\n\nDefine both helpers once (e.g. in a `str_util.cbs` module) and reuse everywhere.\n\n## 5. LinkedList\\<T\\>\n\n```c\n#include \"list.hbs\"\n```\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `LinkedList<T>::new()` → `LinkedList<T>` | Create empty list |\n| `push_back` | `l.push_back(T)` | Append to end |\n| `push_front` | `l.push_front(T)` | Prepend to front |\n| `pop_back` | `l.pop_back()` → `T` | Remove and return last (aborts if empty) |\n| `pop_front` | `l.pop_front()` → `T` | Remove and return first (aborts if empty) |\n| `front` | `l.front()` → `T` | Return copy of first element |\n| `back` | `l.back()` → `T` | Return copy of last element |\n| `remove` | `l.remove(T)` | Remove all elements equal to value |\n| `split_off` | `l.split_off(size_t)` → `LinkedList<T>` | Split list at index |\n| `contains` | `l.contains(T)` → `_Bool` | Check if element exists |\n| `length` | `l.length()` → `size_t` | Number of elements |\n| `is_empty` | `l.is_empty()` → `_Bool` | Whether list is empty |\n| `clear` | `l.clear()` | Remove all elements |\n\n## 6. Option\\<T\\>\n\n```c\n#include \"option.hbs\"\n```\n\n| Method / Function | Signature | Description |\n|--------|-----------|-------------|\n| `Some` | `Option<T>::Some(T)` → `Option<T>` | Create Some value |\n| `None` | `Option<T>::None()` → `Option<T>` | Create None value |\n| `is_some` | `o.is_some()` → `_Bool` | Check if Some |\n| `is_none` | `o.is_none()` → `_Bool` | Check if None |\n| `option_unwrap` | `option_unwrap<T>(Option<T>)` → `T` | Extract value (aborts if None) |\n\n```c\n_Safe void option_example(void) {\n    Option<int> some = Option<int>::Some(42);\n    if (some.is_some()) {\n        int val = option_unwrap<int>(some);  // 42\n    }\n}\n```\n\n**Note**: `option_unwrap` is a free function, not a method. It consumes the Option (takes by value).\n\n## 7. Result\\<T, E\\>\n\n```c\n#include \"result.hbs\"\n```\n\n| Method / Function | Signature | Description |\n|--------|-----------|-------------|\n| `Ok` | `Result<T, E>::Ok(T)` → `Result<T, E>` | Create Ok value |\n| `Err` | `Result<T, E>::Err(E)` → `Result<T, E>` | Create Err value |\n| `is_ok` | `r.is_ok()` → `_Bool` | Check if Ok |\n| `is_err` | `r.is_err()` → `_Bool` | Check if Err |\n| `result_unwrap` | `result_unwrap<T, E>(Result<T, E>)` → `T` | Extract Ok (aborts if Err) |\n| `result_unwrap_err` | `result_unwrap_err<T, E>(Result<T, E>)` → `E` | Extract Err (aborts if Ok) |\n\n**Note**: `result_unwrap` and `result_unwrap_err` are free functions that consume the Result.\n\n## 8. Design Pattern: Safe API with Unsafe Internals\n\nAll libcbs types follow a consistent pattern:\n\n```c\n_Owned struct MyType<T> {\n_Public:\n    // ... fields ...\n    ~MyType(MyType<T> this) { /* cleanup */ }\n};\n\n_Safe void MyType<T>::method(MyType<T> *_Borrow this, ...) {\n    _Unsafe { /* implementation using raw operations */ }\n}\n```\n\n## 9. Include Summary\n\n| Header | Types Provided |\n|--------|---------------|\n| `bishengc_safety.hbs` | `safe_malloc`, `safe_free`, `safe_swap`, `forget` |\n| `vec.hbs` | `Vec<T>` |\n| `string.hbs` | `String` |\n| `list.hbs` | `LinkedList<T>` |\n| `option.hbs` | `Option<T>` |\n\
    | `result.hbs` | `Result<T, E>` |\n| `rc.hbs` | `Rc<T>`, `Weak<T>` |\n| `cell.hbs` | `Cell<T>`, `RefCell<T>`, `RefImmut<T>`, `RefMut<T>` |\n| `slice.hbs` | `Slice<T>`, `SliceMut<T>` |\n| `hash_map.hbs` | `HashMap<K, V, S>` |\n\n> For smart pointers, interior mutability, slices, and HashMap, see `bsc-stdlib-advanced` Skill\n> For ownership/RAII patterns, see `bsc-ownership` Skill\n> For borrowing in API design, see `bsc-borrowing` Skill\n\n---\n\n\n# BiSheng C Standard Library — Advanced Types\n\n## 1. Overview\n\nThese types build on the core libcbs containers. All are `_Owned struct` types with automatic destructors. For core types (`Vec`, `String`, `Option`, `Result`, etc.), see `bsc-stdlib` Skill.\n\n## 2. Rc\\<T\\> and Weak\\<T\\> — Reference Counting\n\n```c\n#include \"rc.hbs\"\n```\n\n### Rc\\<T\\> (strong reference)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `Rc<T>::new(T)` → `Rc<T>` | Create new Rc with value |\n| `clone` | `rc.clone()` → `Rc<T>` | Increment ref count, return new Rc |\n| `deref` | `rc.deref()` → `const T *_Borrow` | Get immutable borrow to inner value |\n| `strong_ref_count` | `rc.strong_ref_count()` → `unsigned` | Current strong reference count |\n| `weak_ref_count` | `rc.weak_ref_count()` → `unsigned` | Current weak reference count |\n\n### Weak\\<T\\> (weak reference)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `Weak<T>::new(&rc)` → `Weak<T>` | Create weak ref from Rc |\n| `clone` | `w.clone()` → `Weak<T>` | Clone weak reference |\n| `upgrade` | `w.upgrade()` → `Option<Rc<T>>` | Try to upgrade to Rc (None if dropped) |\n| `strong_ref_count` | `w.strong_ref_count()` → `unsigned` | Strong count (0 if dropped) |\n| `weak_ref_count` | `w.weak_ref_count()` → `unsigned` | Weak count |\n\n```c\n_Safe void rc_example(void) {\n    Rc<int> a = Rc<int>::new(42);\n    Rc<int> b = a.clone();                          // strong_count = 2\n    const int *_Borrow val = a.deref();             // 42\n\n    Weak<int> w = Weak<int>::new(&_Const a);        // weak_count = 1\n    Option<Rc<int>> upgraded = w.upgrade();         // Some(Rc)\n    // ~Rc, ~Weak auto-destruct; memory freed when strong_count reaches 0\n}\n```\n\n## 3. Cell\\<T\\> and RefCell\\<T\\> — Interior Mutability\n\n```c\n#include \"cell.hbs\"\n```\n\n### Cell\\<T\\> (copyable types only)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `Cell<T>::new(T)` → `Cell<T>` | Create new Cell |\n| `get` | `c.get()` → `T` | Return copy of contained value |\n| `set` | `c.set(T)` | Replace contained value |\n\n### RefCell\\<T\\> (runtime borrow checking)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `RefCell<T>::new(T)` → `RefCell<T>` | Create new RefCell |\n| `borrow_immut` | `rc.borrow_immut()` → `RefImmut<T>` | Immutable borrow (aborts if mut-borrowed) |\n| `borrow_mut` | `rc.borrow_mut()` → `RefMut<T>` | Mutable borrow (aborts if any borrow active) |\n| `try_borrow_immut` | `rc.try_borrow_immut()` → `Option<RefImmut<T>>` | Try immutable borrow (None on failure) |\n| `try_borrow_mut` | `rc.try_borrow_mut()` → `Option<RefMut<T>>` | Try mutable borrow (None on failure) |\n\n### RefImmut\\<T\\> / RefMut\\<T\\> (RAII borrow guards)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `deref` (RefImmut) | `ri.deref()` → `const T *_Borrow` | Get immutable reference |\n| `deref` (RefMut) | `rm.deref()` → `T *_Borrow` | Get mutable reference |\n\nBorrow guards automatically release the borrow when they go out of scope.\n\n```c\n_Safe void refcell_example(void) {\n    RefCell<int> cell = RefCell<int>::new(42);\n\n    // Immutable borrow\n    RefImmut<int> ri = cell.borrow_immut();\n    const int *_Borrow val = ri.deref();     // 42\n    // ~RefImmut releases borrow when ri goes out of scope\n\n    // Mutable borrow (after immutable borrow is released)\n    RefMut<int> rm = cell.borrow_mut();\n    int *_Borrow mval = rm.deref();\n    *mval = 100;\n    // ~RefMut releases borrow\n}\n```\n\n## 4. Slice\\<T\\> and SliceMut\\<T\\>\n\n```c\n#include \"slice.hbs\"\n```\n\n### Slice\\<T\\> (immutable view)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `Slice<T>::new(ptr, len)` → `Slice<T>` | **_Unsafe** — create from pointer + length |\n| `get` | `s.get(size_t)` → `const T *_Borrow` | Get element (bounds-checked) |\n| `sub` | `s.sub(start, end)` → `Slice<T>` | Sub-slice [start, end) |\n| `length` | `s.length()` → `size_t` | Number of elements |\n| `is_empty` | `s.is_empty()` → `_Bool` | Whether slice is empty |\n| `as_ptr` | `s.as_ptr()` → `const T *_Nonnull` | **_Unsafe** — raw nonnull pointer |\n\n### SliceMut\\<T\\> (mutable view)\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `new` | `SliceMut<T>::new(ptr, len)` → `SliceMut<T>` | **_Unsafe** — create from pointer + length |\n| `get` | `s.get(size_t)` → `const T *_Borrow` | Get immutable element |\n| `get_mut` | `s.get_mut(size_t)` → `T *_Borrow` | Get mutable element |\n| `sub` | `s.sub(start, end)` → `Slice<T>` | Immutable sub-slice |\n| `sub_mut` | `s.sub_mut(start, end)` → `SliceMut<T>` | Mutable sub-slice |\n| `as_mut_ptr` | `s.as_mut_ptr()` → `T *_Nonnull` | **_Unsafe** — raw mutable nonnull pointer |\n| `length` | `s.length()` → `size_t` | Number of elements |\n| `is_empty` | `s.is_empty()` → `_Bool` | Whether slice is empty |\n\n## 5. HashMap\\<K, V, S\\>\n\n```c\n#include \"hash_map.hbs\"\n```\n\n| Method | Signature | Description |\n|--------|-----------|-------------|\n| `with_hasher` | `HashMap<K,V,S>::with_hasher(S)` → `HashMap<K,V,S>` | Create empty with hasher |\n| `with_capacity_and_hasher` | `HashMap<K,V,S>::with_capacity_and_hasher(size_t, S)` → `HashMap<K,V,S>` | Create with capacity and hasher |\n| `insert` | `m.insert(K, V)` → `Option<V>` | Insert key-value (returns old value if key existed) |\n| `get_mut` | `m.get_mut(&k)` → `Option<V *_Borrow>` | Get mutable ref to value |\n| `remove` | `m.remove(&k)` → `Option<V>` | Remove key, return value |\n| `contains_key` | `m.contains_key(&k)` → `_Bool` | Check if key exists |\n| `reserve` | `m.reserve(size_t)` | Reserve additional capacity |\n| `length` | `m.length()` → `size_t` | Number of entries |\n| `capacity` | `m.capacity()` → `size_t` | Current capacity |\n| `is_empty` | `m.is_empty()` → `_Bool` | Whether map is empty |\n| `clear` | `m.clear()` | Remove all entries |\n\n**Note**: Keys must implement `hash` and `equals` functions. Built-in types have these pre-implemented.\n\n> For core types (Vec, String, Option, Result, etc.), see `bsc-stdlib` Skill\n> For ownership/RAII patterns, see `bsc-ownership` Skill\n> For borrowing in API design, see `bsc-borrowing` Skill\n\n---\n\n\n# BiSheng C Traits Skill\n\n## 1. Overview\n\nInterface abstraction with vtable-based dynamic dispatch. Define a set of methods, implement them for concrete types, and call through trait pointers for polymorphism.\n\n## 2. Defining Traits\n\n```c\n_Trait Printable {\n    void print(This* this);          // First param MUST be `This* this`\n    int toInt(This* this);\n};\n```\n\n- Only function declarations inside `_Trait` body (no implementations, no variables)\n- First param must be `This* this` — named exactly `this`\n- `_Trait` definitions only at top-level scope (not inside functions or structs)\n- Empty traits are allowed: `_Trait T {};`\n- Cannot extend member functions on a trait type: `void _Trait T::method(_Trait T* this)` is an error\n- Can typedef: `typedef _Trait Printable { void print(This* this); } P;`\n\n## 3. Implementing Traits\n\n```c\nstruct Circle { float r; };\n\nvoid struct Circle::print(struct Circle* this) {\n    printf(\"Circle(r=%f)\\n\", this->r);\n}\nint struct Circle::toInt(struct Circle* this) {\n    return (int)this->r;\n}\n\n_Impl _Trait Printable for struct Circle;  // all methods must exist before this line\n```\n\n- Can implement for primitives: `_Impl _Trait Printable for int;`\n- Can implement for typedef-ed types\n- All trait methods must be defined **before** the `_Impl` statement\n- Cannot implement trait for a trait type: `_Impl _Trait T for _Trait T;` is an error\n- Cannot implement trait for an instantiated generic struct type:\n  ```c\n  struct G<T> {};\n  _Impl _Trait Printable for struct G<int>;  // ERROR\n  ```\n\n## 4. Trait Pointers (Dynamic Dispatch)\n\n```c\nvoid printAnything(_Trait Printable* obj) {\n    obj->print();  // vtable dispatch\n}\n\nint main() {\n    struct Circle c = {.r = 3.14};\n    _Trait Printable* p = &c;      // implicit conversion\n    p->print();\n    printAnything(&c);\n\n    int x = 42;\n    p = &x;                        // OK if int implements Printable\n    p->print();\n    return 0;\n}\n```\n\n### Trait pointer variable rules\n\n- Only pointer form: `_Trait T* p;` — **NOT** `_Trait T p;`\n- Trait pointers **cannot be dereferenced** with `*`\n- Multi-level pointers allowed: `_Trait T** q = &p;` — access via `(*q)->method()`\n- `const`/`volatile` qualifiers apply: `const _Trait T* p;` or `_Trait T* const p;`\n- Can be function parameters and return values\n- Conversion: concrete type pointer implicitly converts to trait pointer if `_Impl`'d; reverse requires explicit cast\n- **Comparison** limited to `==` and `!=` only:\n  - `p == NULL` / `p != NULL` — OK\n  - `p1 == p2` — OK if same trait type; **warning** if different trait types\n  - `p == concretePtr` — OK if concrete type implements the trait; warning if not\n\n### Type casting rules\n\n- Cannot cast trait pointer to a non-pointer type\n- Cast to concrete type must be **explicit**: `(int*)p` — no implicit downcasting\n- Cast to `void*` is allowed: `(void*)p`\n- `void*` **CANNOT** be cast back to trait pointer\n\n## 5. Generic Traits\n\n```c\n_Trait Converter<T> {\n    T convert(This* this);\n};\n\nint int::convert(int* this) { return *this; }\n_Impl _Trait Converter<int>\
    \ for int;\n\nfloat float::convert(float* this) { return *this; }\n_Impl _Trait Converter<float> for float;\n```\n\n### Generic trait rules\n\n- Generic trait definitions follow the same scope rules (top-level only)\n- Only **instantiated** generic traits can be `_Impl`'d: `_Impl _Trait Converter<int> for int;`\n- `_Impl _Trait Converter<T> for int;` is ERROR — `T` is undefined\n- The implementing struct/union type cannot itself be generic:\n  ```c\n  struct G<T> {};\n  _Impl _Trait Converter<int> for struct G<int>;  // ERROR: cannot _Impl for instantiated type\n  ```\n\n### Generic trait pointer variables\n\n- Use instantiated form: `_Trait Converter<int>* p;`\n- Multi-level pointers: `_Trait Converter<int>** q;`\n- `const`/`volatile` on generic trait pointers works the same as non-generic\n- Comparing different instantiations produces a **warning**: `_Trait Converter<int>* t1` vs `_Trait Converter<float>* t3` → warning on `t1 == t3`\n- Casting rules are the same as non-generic trait pointers\n\n## 6. Complete Example\n\n```c\n#include <stdio.h>\n\n// Shape trait with area and side-length methods\n_Trait Shape {\n    float getArea(This* this);\n    float getSideLen(This* this);\n};\n\nstruct Square { float side; };\nstruct Rectangle { float width; float height; };\n\nfloat struct Square::getArea(struct Square* this) {\n    return this->side * this->side;\n}\nfloat struct Square::getSideLen(struct Square* this) {\n    return this->side * 4;\n}\n_Impl _Trait Shape for struct Square;\n\nfloat struct Rectangle::getArea(struct Rectangle* this) {\n    return this->width * this->height;\n}\nfloat struct Rectangle::getSideLen(struct Rectangle* this) {\n    return (this->width + this->height) * 2;\n}\n_Impl _Trait Shape for struct Rectangle;\n\n// Dynamic dispatch through trait pointer\nvoid showShape(_Trait Shape* s) {\n    printf(\"  area = %f\\n\", s->getArea());\n    printf(\"  perimeter = %f\\n\", s->getSideLen());\n}\n\nint main() {\n    struct Square sq = {.side = 5.0};\n    struct Rectangle rc = {.width = 3.0, .height = 4.0};\n\n    _Trait Shape* p = &sq;\n    showShape(p);       // Square: area=25, perimeter=20\n\n    p = &rc;\n    showShape(p);       // Rectangle: area=12, perimeter=14\n\n    // Compare trait pointers\n    _Trait Shape* p2 = &sq;\n    if (p != p2) {\n        printf(\"Different shapes\\n\");\n    }\n\n    // Explicit cast back to concrete type\n    struct Rectangle* rp = (struct Rectangle*)p;\n    return 0;\n}\n```\n\n> For member function basics, see `bsc-member-function` Skill\n> For generic functions/structs, see `bsc-generic` Skill\n> For trait errors (BSC-E05xx), see `bsc-errors` Skill\n\n---\n\n\n# C to BiSheng C Translation Skill\n\n## MANDATORY: Read This Before Any C-to-BSC Translation\n\nIf you are translating C code to BSC, you MUST follow this process. **The fundamental rule is: keep the file structure as-is, only ADD ownership annotations.** Do NOT rename `.c`/`.h` → `.cbs`/`.hbs`; do NOT strip platform-specific code. Compile with `clang -x bsc file.c`. A translation is about analyzing every pointer and adding BSC annotations — not about restructuring the codebase.\n\n## TOP RULE: Safe by Default — `_Unsafe` is Compiler-Driven, Not Author-Driven\n\n**Mark every function `_Safe`. Write every body as if it were `_Safe`. Add `_Unsafe` ONLY where the compiler reports an error you cannot fix any other way.**\n\nYou do not get to predict which lines \"feel unsafe\" and pre-wrap them. The borrow checker and safe-zone checker are the source of truth — if a line compiles in `_Safe`, it stays in `_Safe`. The workflow is:\n\n1. Annotate the function signature `_Safe`.\n2. Translate the body as plain BSC — no `_Unsafe` anywhere.\n3. Compile. For each diagnostic the compiler reports:\n   - First try to **fix it without `_Unsafe`** (convert `&` to `&_Const`/`&_Mut`, replace raw `malloc`/`free` with `safe_malloc`/`safe_free`, add missing `_Owned`/`_Borrow`/`_Nullable`, restructure the line).\n   - Only if no `_Safe`-zone form exists (variadic `printf`, raw pointer arithmetic on a non-container buffer, FFI cast, raw subscripting through `T*`, etc.), wrap **just the offending statement** in `_Unsafe stmt;` (no braces) or `_Unsafe { ... }` (smallest block).\n4. Re-compile. Repeat until clean. Do not pre-emptively widen any `_Unsafe` block \"in case\" — leave it tight; the compiler will tell you if you need more.\n\n**Forbidden shortcuts:**\n\n- ❌ Marking a whole function `_Unsafe` because one line inside needed an escape.\n- ❌ Wrapping a multi-line block in `_Unsafe { ... }` when only one statement triggered the error.\n- ❌ Adding `_Unsafe` \"defensively\" before compiling — write the safe form first, let the compiler decide.\n- ❌ Treating a borrow-checker error as a reason to escape to `_Unsafe`. Borrow errors mean the ownership annotations are wrong; fix the annotations, do not bypass the checker.\n\n**`_Unsafe` is contagious — `_Unsafe` on a function forces every caller into `_Unsafe` context.** Keeping the function `_Safe` and the escape limited to one line keeps the cost local. A function that contains an `_Unsafe { ... }` block is **still `_Safe`** — that is the whole point of the block.\n\nThe rest of this Skill expands on what to write inside `_Safe` and how to fix specific diagnostics. When a section says \"use `_Unsafe` for X\", it means: the compiler will reject the safe form for X — wrap the minimal failing line, not the surrounding logic.\n\n## TOP RULE 2: Every Pointer in a Function Signature MUST Be Annotated\n\n**Every pointer that appears in a function declaration, function definition, or parameter list MUST carry `_Owned`, `_Borrow`, or be deliberately raw with a structural reason.** A bare `T *` in a signature is NEVER acceptable as a \"default\" or \"TODO\" — it is a positive claim that the pointer is raw (interior pointer, arithmetic cursor, output double-pointer, function pointer, opaque void* in generic contexts, or inside an `_Unsafe`-only API).\n\nThis applies to:\n\n- Every parameter: `f(T *p)` is wrong unless `p` is genuinely raw. Use `f(T *_Owned p)`, `f(T *_Borrow p)`, or `f(const T *_Borrow p)`.\n- Every return type: `T *f(...)` is wrong unless the returned pointer is genuinely raw. Use `T *_Owned f(...)` (caller frees) or `T *_Borrow f(...)` (caller does not free; lifetime tied to an input).\n- Both the declaration in the `.h`/`.hbs` AND the definition in the `.c`/`.cbs` — they must match.\n\n**Default decision tree (apply to every pointer in every signature):**\n\n1. Does the function free the pointer, transfer it onward, or store it in a long-lived owner? → `T *_Owned`.\n2. Does the function read through it without mutating? → `const T *_Borrow`.\n3. Does the function mutate through it but does not free? → `T *_Borrow`.\n4. Is it an output double-pointer (`T **out`), function pointer, opaque cast intermediary, or a cursor for arithmetic? → raw `T *` is correct, with a one-line comment explaining why.\n\nIf none of (1)–(4) clearly applies, you have not finished analyzing the function. **Do not leave it raw as a \"good enough\" placeholder** — the missing annotation will silently pass C, fail under BSC's borrow checker at the call site, or worse, type-check but encode the wrong ownership model.\n\n```c\n// WRONG — bare T*; reader cannot tell if caller frees, callee frees, or both\nNode *find(Container *c, int id);\n\n// CORRECT — read-only lookup, returns reference into c\nconst Node *_Borrow find(const Container *_Borrow c, int id);\n\n// CORRECT — factory: callee allocates, caller frees\nNode *_Owned create(int id);\n\n// CORRECT — consumer: callee takes ownership of item\nvoid enqueue(Container *_Borrow c, Node *_Owned item);\n```\n\n**Header / source consistency.** The annotation must appear in the declaration too, not just the definition. A `.h` that exposes `Node *find(Container *c, int id)` while the `.c` defines `const Node *_Borrow find(const Container *_Borrow c, int id)` will produce mismatched-type diagnostics or silently let callers misuse the API.\n\n**Self-check at translation time:** before moving to the next function, scan its signature line-by-line and confirm every `*` has a qualifier (`_Owned` / `_Borrow`) or a deliberate raw-with-reason justification. If you cannot decide, that is a signal to read the function body and its callers — not a signal to leave it bare.\n\n**MINIMUM BAR**: A valid BSC translation of any non-trivial C project MUST contain `_Owned` annotations. Any C code that calls `malloc`/`free` has ownership semantics that MUST be expressed in BSC. If your translation has zero `_Owned` annotations, it is incomplete — go back to Step 3 and re-analyze. \"The code is too complex for ownership\" is NOT a valid reason to skip annotations; use `_Unsafe` blocks for the complex parts and annotate what you can.\n\n## CRITICAL RULE: `_Owned` Is Non-Nullable By Default\n\n`_Owned` pointers CANNOT be `NULL` unless you add `_Nullable`:\n\n```c\n// WRONG — compiler error: _Owned pointer cannot be null\ncJSON *_Owned item = NULL;\n\n// CORRECT — add _Nullable when the pointer may be NULL\ncJSON *_Owned _Nullable item = nullptr;\n\n// CORRECT — initialized immediately, no _Nullable needed\ncJSON *_Owned item = safe_malloc<cJSON>((cJSON){0});\n```\n\n**Rule**: If an `_Owned` variable is ever assigned `NULL`/`nullptr`, initialized to `NULL`, or checked against `NULL`, it MUST be declared `T *_Owned _Nullable`. Use `nullptr` instead of `NULL` in BSC code.\n\n## Translation Process\n\n### Step 1: Change as Little as Possible (Fundamental Rule)\n\n**Change the C codebase as little as you can.** Only ADD BSC ownership annotations. Change anything else only if the compiler genuinely requires it.\n\n- Keep `.c`/`.h` file extensions; compile with `clang -x bsc file.c` (or `-xbsc`, both work at driver and `-cc1`).\n- Platform-specific code (`#ifdef _WIN32`, `__declspec(...)`, `__cdecl`, `__stdcall`, `extern \"C\"` guards, visibility macros) generally works\
    \ as-is. BSC is clang-based; these either apply to the target platform or are silently ignored. Only touch them if a specific construct triggers a compile error.\n- `#include` paths stay as-is (still `.h`). The one new include you typically need: `#include \"bishengc_safety.hbs\"` wherever you use `safe_malloc`/`safe_free`.\n\nWhy: incremental migration lets the project build as plain C AND as BSC from the same sources; keeps review diffs focused on ownership; preserves cross-platform code if you need it later.\n\n### Step 2: Default Functions to `_Safe`; Add `_Unsafe` Only When the Compiler Demands It\n\nThis step is the application of the **TOP RULE** at the top of this Skill. Read it again before continuing.\n\nWhen you add or modify a function signature, mark it `_Safe`. Write the body as if it were fully `_Safe`. Compile. The compiler — not your intuition — tells you which lines need to escape to `_Unsafe`. For operations the safety checker genuinely cannot model — variadic calls like `printf`, raw pointer arithmetic, FFI, pointer conversions requiring casts, raw subscripting through `T*` — wrap ONLY the offending statement in an `_Unsafe stmt;` (single line, no braces) or `_Unsafe { ... }` block.\n\n**`_Unsafe` is contagious.** An `_Unsafe` function forces every caller to also be in `_Unsafe` context, and the cost spreads through the codebase. Keeping the interface `_Safe` lets the borrow checker help callers, even when the implementation has some escape hatches inside.\n\n```c\n// GOOD — interface is _Safe, only the one unsafe operation is wrapped\n_Safe void log_value(const int *_Borrow v) {\n    _Unsafe { printf(\"%d\\n\", *v); }     // printf is variadic, needs _Unsafe\n}\n\n// BAD — whole function is _Unsafe just for one line\n_Unsafe void log_value(const int *_Borrow v) {\n    printf(\"%d\\n\", *v);                  // forces every caller to be _Unsafe too\n}\n```\n\n**A function with an `_Unsafe { ... }` block inside is STILL `_Safe`.** The\ntwo are not in conflict; that is the whole point of `_Unsafe` blocks. Do not\ndemote the function to `_Unsafe` just because its body needs one escape.\n\n**`_Unsafe` blocks must be minimal.** Wrap exactly the statements that require\nthe escape, and nothing else. Re-check every line you put inside `_Unsafe`:\nif it would compile fine in `_Safe`, move it out.\n\n```c\n// BAD — bloated _Unsafe block, only the assignment needs the escape\n_Safe void f(uint8_t *buf, size_t i, uint8_t v) {\n    _Unsafe {\n        if (i >= cap) return;       // _Safe-able\n        validate(v);                // _Safe-able\n        buf[i] = v;                 // raw subscript — needs _Unsafe\n        log(\"wrote byte\");          // _Safe-able\n    }\n}\n\n// GOOD — only the raw-subscript line is _Unsafe\n_Safe void f(uint8_t *buf, size_t i, uint8_t v) {\n    if (i >= cap) return;\n    validate(v);\n    _Unsafe buf[i] = v;             // single-statement _Unsafe — no braces needed\n    log(\"wrote byte\");\n}\n```\n\n**Self-check before submitting BSC code with any `_Unsafe`:**\n1. Is the enclosing function annotated `_Safe`? If not, would it pass the\n   borrow checker as `_Safe`? If yes, change it.\n2. Is every line inside `_Unsafe { ... }` actually requiring the escape? If\n   not, move the safe lines out — a one-line `_Unsafe stmt;` (no braces) is\n   often the right shape.\n\n### Step 2.5: Default Pointer Parameters to `_Borrow`, Not `_Owned`\n\nA function that **reads or mutates** a value through a pointer but does **not\ntake ownership** must use `_Borrow`, never `_Owned`. `_Owned` means the\nfunction consumes the value — the caller's variable becomes dead after the\ncall. Most C functions don't do that; they just need to look at or mutate\nsomething that lives elsewhere.\n\n**Rule of thumb when picking a parameter qualifier:**\n\n- The function frees the pointer, transfers it onward, or stores it in a\n  long-lived owner → `T *_Owned`. (Caller's variable is dead after the call.)\n- The function only reads through the pointer → `const T *_Borrow`.\n- The function mutates *through* the pointer but does not free it → `T *_Borrow`.\n- The function does pointer arithmetic / iteration → raw `T *` (no borrow). This is the ONLY case where a bare `T *` parameter is correct; all other pointer parameters MUST be `_Owned` or `_Borrow` (see TOP RULE 2).\n\n```c\n// BAD — _Owned forces the caller to give up ownership for a function\n// that just reads. Caller cannot use cfg afterwards.\n_Safe int get_port(const Config *_Owned cfg) { return cfg->port; }\n\n// GOOD — borrow; caller keeps cfg\n_Safe int get_port(const Config *_Borrow cfg) { return cfg->port; }\n\n// BAD — _Owned for a setter that doesn't consume\n_Safe void set_port(Config *_Owned cfg, int p) { cfg->port = p; }\n\n// GOOD — mutable borrow; caller keeps cfg\n_Safe void set_port(Config *_Borrow cfg, int p) { cfg->port = p; }\n```\n\n**Self-check before annotating a function signature:** for each pointer\nparameter, ask \"does the caller's variable become dead after this call?\" If\nno, it is `_Borrow`, not `_Owned`. Defaulting to `_Owned` everywhere makes\nevery call site a one-shot move — that is wrong, and it forces the caller\ninto ugly re-allocation patterns that aren't in the original C.\n\nSee `/bsc-safe-zone` for the full list of `_Safe`-zone restrictions and legitimate uses of `_Unsafe` blocks.\n\n### Step 3: Analyze Ownership (THE CRITICAL STEP)\n\nFor every pointer in the codebase, classify it into one of three categories:\n\n#### Category A: Owned pointers → annotate `*_Owned`\n\nA pointer OWNS data if:\n- It was assigned from `malloc`/`calloc`/`realloc`/`strdup`\n- The code calls `free()` on it (or is responsible for freeing)\n- It is returned from a function that creates/allocates (caller must free)\n- A struct field that gets freed in the struct's cleanup/delete function\n\n#### Category B: Borrowed pointers → annotate `*_Borrow`\n\nA pointer BORROWS data if:\n- It points into someone else's allocation (e.g. back-pointers, parent pointers)\n\n[1238 more lines truncated due to context window limit]\n\n[Note: Content was truncated to save context window space. For full context, please read the file directly: /home/user/project/.github/copilot-instructions.md]"
