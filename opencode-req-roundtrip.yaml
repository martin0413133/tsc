- type: function
  function:
    name: skill
    description: "Load a skill or execute a slash command to get detailed instructions for a specific task.\n\nSkills and commands provide specialized knowledge and step-by-step guidance.\nUse this when a task matches an available skill's or command's description.\n\n**How to use:**\n- Call with a skill name: name='review-work'\n- Call with a command name (without leading slash): name='publish'\n- The tool will return detailed instructions with your context applied.\n\n<available_items>\nPriority: project > user > opencode > builtin/plugin | Skills listed before commands\nInvoke via: skill(name=\"item-name\") - omit leading slash for commands.\n  <command>\n    <name>/bsc-generic</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. Generic functions, generic structs, generic unions, constant generics, and generic type aliases are disabled. Do not introduce them.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-borrowing</name>\n    <description>(opencode-project - Skill) BiSheng C borrowing in the constrained subset. _Borrow pointers, &_Const (immutable borrow), &_Mut (mutable borrow), borrow lifetime rules, freezing semantics, NLL (Non-Lexical Lifetimes), borrow type conversions, dereference/member access semantics, borrow function signatures on free functions, and the _Borrow _ArrayElem variant for array iteration.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-constexpr</name>\n    <description>(opencode-project - Skill) Constexpr variables, constexpr functions, and _Static_assert are available in the constrained subset. Type traits (is_integral, etc.) and conditional type aliases require generics and are NOT available.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-errors</name>\n    <description>(opencode-project - Skill) BiSheng C error codes and diagnostics in the constrained subset. Use when you encounter a BSC compiler error (BSC-Exxxx), need to understand what an error means, or want to look up fix strategies for the categories that apply to this subset (ownership, borrowing, safe-zone, nullability, type system, parse-level, constexpr).</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-trait</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. The project disables _Trait — trait-based polymorphism, _Impl registration, and dynamic dispatch are off-limits. Do not introduce them.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-coroutine</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. _Async functions, _Await, Future trait, PollResult, Scheduler — all rely on _Trait and generics which are disabled. Use synchronous code only.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-common-mistakes</name>\n    <description>(opencode-project - Skill) BiSheng C common mistakes and fixes in the constrained subset. Use when encountering compilation errors or debugging pitfalls with ownership, borrowing, safe zones, or nullability.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-nullability</name>\n    <description>(opencode-project - Skill) BiSheng C non-null pointers and nullability in the constrained subset. _Nullable, _Nonnull, nullptr, null-safety checking on _Owned/_Borrow/_Owned _ArrayElem pointers, null-check patterns, the _Nullable narrowing-via-reassignment idiom for _Owned _ArrayElem, -nullability-check compiler option, and the -Wnullability-completeness all-or-none rule.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-member-function</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. Member functions (TypeName::method syntax, this/This, static methods) are disabled. Write free functions that take the struct or borrow.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-stdlib-advanced</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. Rc, Weak, Cell, RefCell, Slice, HashMap and interior mutability types from libcbs are disabled. Use plain structs with _Owned _ArrayElem buffers and explicit borrows instead.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-lsp</name>\n    <description>(opencode-project - Skill) BSC code intelligence via LSP in the constrained subset. Load this Skill when you need to inspect ownership flow, live ranges, borrows, or call graphs in BSC code — e.g. before introducing a borrow, tracing where an _Owned variable was moved, or diagnosing a borrow-checker error. Explains what BSC-aware clangd returns for plain structs + free functions, when it's reliable, and when to fall back to Grep.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/subset-skill-curation</name>\n    <description>(opencode-project - Skill) Methodology for adapting a BSC skill collection to a constrained subset. Use when a BSC project disables features (e.g. no _Owned struct, no generics, no libcbs) and the skill files need to reflect that. Not a BSC technical skill — a skill-maintenance process.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/c-to-bsc</name>\n    <description>(opencode-project - Skill) BiSheng C translation from C in the constrained subset (ownership + safe zones only, no _Owned struct, no generics, no member functions, no traits, no libcbs). Use when porting C (.c/.h) to BSC, adding ownership annotations, writing per-type allocator wrappers, or setting up the bsc_compat.h dual-compilation shim.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-operator-overloading</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. Operator overloading (__attribute__((operator OP))) is intended for generic and trait-based types, both of which are disabled. Use named free functions instead (str_eq, str_cmp).</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-overview</name>\n    <description>(opencode-project - Skill) BiSheng C language overview for the constrained subset used in this project (ownership + safe zones only). Lists the available features and keywords, the disabled features, and entry-point skills.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-safe-zone</name>\n    <description>(opencode-project - Skill) BiSheng C safe zones in the constrained subset. _Safe functions, _Safe blocks, _Unsafe escape blocks, safe-zone restrictions (initialization, pointers, type casts, enum/float conversions, ++/-- semantics), mixed-mode _Safe redeclaration of libc, and the const-char-* wrapper pattern for void-* libc APIs.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-initialization</name>\n    <description>(opencode-project - Skill) BiSheng C initialization analysis in the constrained subset. Uninitialized variable detection, field-level init tracking on plain structs, __attribute__((ensure_init)), __assume_initialized, array initialization rules, and -uninit-check compiler option.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-design</name>\n    <description>(opencode-project - Skill) BiSheng C design and architecture decisions in the constrained subset (ownership + safe zones only, no _Owned struct, no generics, no member functions, no traits, no libcbs). Load BEFORE writing a plan or implementation that involves new APIs, plain-struct types with _Owned _ArrayElem buffers, ownership flow changes, the _Safe/_Unsafe boundary, the layered-helper module pattern, the by-value destructor pattern, or the INVALID-sentinel OOM strategy.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-stdlib</name>\n    <description>(opencode-project - Skill) Not available in the constrained subset. libcbs is disabled — safe_malloc, safe_free, Vec, String, Option, Result, LinkedList and bishengc_safety.hbs are off-limits. Implement required helpers yourself with raw malloc/free + __take_array_from_raw / __move_array_to_raw inside _Unsafe.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-compile</name>\n    <description>(opencode-project - Skill) BiSheng C compilation in the constrained subset. Compiling .cbs files, compiler path setup, include paths, diagnostic suppression flags, syntax checking, source-to-source rewriting, and dual-compilation (BSC + standard C) via bsc_compat.h.</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/bsc-ownership</name>\n    <description>(opencode-project - Skill) BiSheng C ownership system in the constrained subset. _Owned pointers, move semantics, _Owned _ArrayElem buffers, _Nullable, ownership transfer rules, plain-struct + _Owned field RAII (§7.5), and free-and-replace through borrow (§7.6).</description>\n    <scope>opencode-project</scope>\n  </command>\n  <command>\n    <name>/playwright</name>\n    <description>(opencode - Skill) MUST USE for any browser-related tasks. Browser automation via Playwright MCP - verification, browsing, information gathering, web scraping, testing, screenshots, and all browser interactions.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/frontend-ui-ux</name>\n    <description>(opencode - Skill) Designer-turned-developer who crafts stunning UI/UX even without design mockups</description>\n    <scope>builtin</scope>\n  </command>\n\
      \  <command>\n    <name>/git-master</name>\n    <description>(opencode - Skill) MUST USE for ANY git operations. Atomic commits, rebase/squash, history search (blame, bisect, log -S). STRONGLY RECOMMENDED: Use with task(category='quick', load_skills=['git-master'], ...) to save context. Triggers: 'commit', 'rebase', 'squash', 'who wrote', 'when was X added', 'find the commit that'.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/review-work</name>\n    <description>(opencode - Skill) Post-implementation review orchestrator. Launches 5 parallel background sub-agents: Oracle (goal/constraint verification), Oracle (code quality), Oracle (security), unspecified-high (hands-on QA execution), unspecified-high (context mining from GitHub/git/Slack/Notion). All must pass for review to pass. MUST USE after completing any significant implementation work. Triggers: 'review work', 'review my work', 'review changes', 'QA my work', 'verify implementation', 'check my work', 'validate changes', 'post-implementation review'.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/remove-ai-slops</name>\n    <description>(opencode - Skill) Remove AI-generated code smells (slop) from branch changes or an explicit file list. Locks behavior with regression tests FIRST, then runs categorized cleanup via parallel `deep` agents in batches of 5, then verifies with quality gates. Covers 10 slop categories including performance equivalences, excessive complexity (object annotations, if/elif variant chains), and oversized modules (250+ pure LOC with mandatory modular refactoring). MUST USE when the user asks to \"remove slop\", \"clean AI code\", \"deslop\", \"clean up AI-generated code\", \"remove AI slop\", or wants to clean up AI-generated patterns from recent changes. Triggers - \"remove ai slops\", \"clean ai code\", \"deslop\", \"cleanup AI generated\", \"remove AI slop\", \"clean up AI-generated code\", \"strip slop\", \"ai-slop cleanup\".</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/init-deep</name>\n    <description>(opencode - Skill) (builtin) Initialize hierarchical AGENTS.md knowledge base</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/debugging</name>\n    <description>(opencode - Skill) MUST USE for any real runtime debugging across ANY language or binary — crashes, silent failures, wrong responses, stuck processes, memory leaks, async misbehavior, unexplained timing, reverse engineering. Runs a hypothesis-driven loop: form ≥3 hypotheses, investigate in parallel, after 2 failed rounds spawn Oracles from orthogonal angles, confirm root cause, lock with a failing test, fix minimally, QA by actually USING the system, scrub artifacts. The actual HOW lives in `references/` — READ THEM. Triggers: 'debug this', 'why is X not working', 'hanging', 'attach a debugger', 'reverse engineer', 'pwndbg', 'gdb', 'lldb', 'node inspect', 'tsx debug', 'pdb', 'dlv', 'delve', 'rust-gdb', 'set a breakpoint', 'context window exploded', 'why is the response empty', 'attach the debugger', 'debug it', 'why is this happening', 'trace this bug', 'reproduce and fix', 'silent failure', 'HTTP 200 but empty', 'why did it stop', 'inspect the binary', 'reverse engineering', 'playwright'.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/security-research</name>\n    <description>(opencode - Skill) Team Mode security research skill. Orchestrates 3 vulnerability hunters and 2 PoC engineers to audit a codebase in parallel, prove exploitability, classify root causes, and calibrate severity by actual exploitability. Use for security review, vulnerability research, exploitability audit, pre-release security check, threat model validation, and `/security-research`. Triggers: 'security-research', 'security research', 'security review', 'vulnerability audit', 'exploitability audit', '보안 리뷰', '취약점 감사'.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/security-review</name>\n    <description>(opencode - Skill) Alias for security-research and /security-review. Team Mode security research skill. Orchestrates 3 vulnerability hunters and 2 PoC engineers to audit a codebase in parallel, prove exploitability, classify root causes, and calibrate severity by actual exploitability. Use for security review, vulnerability research, exploitability audit, pre-release security check, threat model validation, and `/security-research`. Triggers: 'security-research', 'security research', 'security review', 'vulnerability audit', 'exploitability audit', '보안 리뷰', '취약점 감사'.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/ralph-loop</name>\n    <description>(builtin) Start self-referential development loop until completion</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/ulw-loop</name>\n    <description>(builtin) Start ultrawork loop - continues until completion with ultrawork mode</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/cancel-ralph</name>\n    <description>(builtin) Cancel active Ralph Loop</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/refactor</name>\n    <description>(builtin) Intelligent refactoring command with LSP, AST-grep, architecture analysis, codemap, and TDD verification.</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/start-work</name>\n    <description>(builtin) Start Sisyphus work session from Prometheus plan</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/stop-continuation</name>\n    <description>(builtin) Stop all continuation mechanisms (ralph loop, todo continuation, boulder) for this session</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/remove-ai-slops</name>\n    <description>(builtin) Remove AI-generated code smells from branch changes and critically review the results</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/handoff</name>\n    <description>(builtin) Create a detailed context summary for continuing work in a new session</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/hyperplan</name>\n    <description>(builtin) Adversarial multi-agent planning via team-mode (5 hostile category members cross-critique, lead synthesizes)</description>\n    <scope>builtin</scope>\n  </command>\n  <command>\n    <name>/superpowers:receiving-code-review</name>\n    <description>(plugin: superpowers - Skill) Use when receiving code review feedback, before implementing suggestions, especially if feedback seems unclear or technically questionable - requires technical rigor and verification, not performative agreement or blind implementation</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:finishing-a-development-branch</name>\n    <description>(plugin: superpowers - Skill) Use when implementation is complete, all tests pass, and you need to decide how to integrate the work - guides completion of development work by presenting structured options for merge, PR, or cleanup</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:subagent-driven-development</name>\n    <description>(plugin: superpowers - Skill) Use when executing implementation plans with independent tasks in the current session</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:dispatching-parallel-agents</name>\n    <description>(plugin: superpowers - Skill) Use when facing 2+ independent tasks that can be worked on without shared state or sequential dependencies</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:systematic-debugging</name>\n    <description>(plugin: superpowers - Skill) Use when encountering any bug, test failure, or unexpected behavior, before proposing fixes</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:requesting-code-review</name>\n    <description>(plugin: superpowers - Skill) Use when completing tasks, implementing major features, or before merging to verify work meets requirements</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:brainstorming</name>\n    <description>(plugin: superpowers - Skill) You MUST use this before any creative work - creating features, building components, adding functionality, or modifying behavior. Explores user intent, requirements and design before implementation.</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:writing-skills</name>\n    <description>(plugin: superpowers - Skill) Use when creating new skills, editing existing skills, or verifying skills work before deployment</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:using-git-worktrees</name>\n    <description>(plugin: superpowers - Skill) Use when starting feature work that needs isolation from current workspace or before executing implementation plans - ensures an isolated workspace exists via native tools or git worktree fallback</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:verification-before-completion</name>\n    <description>(plugin: superpowers - Skill) Use when about to claim work is complete, fixed, or passing, before committing or creating PRs - requires running verification commands and confirming output before making any success claims; evidence before assertions always</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:using-superpowers</name>\n    <description>(plugin: superpowers - Skill) Use when starting any conversation - establishes how to find and use skills, requiring Skill tool\
      \ invocation before ANY response including clarifying questions</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:test-driven-development</name>\n    <description>(plugin: superpowers - Skill) Use when implementing any feature or bugfix, before writing implementation code</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:executing-plans</name>\n    <description>(plugin: superpowers - Skill) Use when you have a written implementation plan to execute in a separate session with review checkpoints</description>\n    <scope>plugin</scope>\n  </command>\n  <command>\n    <name>/superpowers:writing-plans</name>\n    <description>(plugin: superpowers - Skill) Use when you have a spec or requirements for a multi-step task, before touching code</description>\n    <scope>plugin</scope>\n  </command>\n</available_items>\nLoad a specialized skill that provides domain-specific instructions and workflows.\n\nWhen you recognize that a task matches one of the available skills listed below, use this tool to load the full skill instructions.\n\nThe skill will inject detailed instructions, workflows, and access to bundled resources (scripts, references, templates) into the conversation context.\n\nTool output includes a `<skill_content name=\"...\">` block with the loaded content.\n\nThe following skills provide specialized sets of instructions for particular tasks\nInvoke this tool to load a skill when a task matches one of the available skills listed below:\n\n## Available Skills\n- **brainstorming**: You MUST use this before any creative work - creating features, building components, adding functionality, or modifying behavior. Explores user intent, requirements and design before implementation.\n- **bsc-borrowing**: BiSheng C borrowing in the constrained subset. _Borrow pointers, &_Const (immutable borrow), &_Mut (mutable borrow), borrow lifetime rules, freezing semantics, NLL (Non-Lexical Lifetimes), borrow type conversions, dereference/member access semantics, borrow function signatures on free functions, and the _Borrow _ArrayElem variant for array iteration.\n- **bsc-common-mistakes**: BiSheng C common mistakes and fixes in the constrained subset. Use when encountering compilation errors or debugging pitfalls with ownership, borrowing, safe zones, or nullability.\n- **bsc-compile**: BiSheng C compilation in the constrained subset. Compiling .cbs files, compiler path setup, include paths, diagnostic suppression flags, syntax checking, source-to-source rewriting, and dual-compilation (BSC + standard C) via bsc_compat.h.\n- **bsc-constexpr**: Constexpr variables, constexpr functions, and _Static_assert are available in the constrained subset. Type traits (is_integral, etc.) and conditional type aliases require generics and are NOT available.\n- **bsc-coroutine**: Not available in the constrained subset. _Async functions, _Await, Future trait, PollResult, Scheduler — all rely on _Trait and generics which are disabled. Use synchronous code only.\n- **bsc-design**: BiSheng C design and architecture decisions in the constrained subset (ownership + safe zones only, no _Owned struct, no generics, no member functions, no traits, no libcbs). Load BEFORE writing a plan or implementation that involves new APIs, plain-struct types with _Owned _ArrayElem buffers, ownership flow changes, the _Safe/_Unsafe boundary, the layered-helper module pattern, the by-value destructor pattern, or the INVALID-sentinel OOM strategy.\n- **bsc-errors**: BiSheng C error codes and diagnostics in the constrained subset. Use when you encounter a BSC compiler error (BSC-Exxxx), need to understand what an error means, or want to look up fix strategies for the categories that apply to this subset (ownership, borrowing, safe-zone, nullability, type system, parse-level, constexpr).\n- **bsc-generic**: Not available in the constrained subset. Generic functions, generic structs, generic unions, constant generics, and generic type aliases are disabled. Do not introduce them.\n- **bsc-initialization**: BiSheng C initialization analysis in the constrained subset. Uninitialized variable detection, field-level init tracking on plain structs, __attribute__((ensure_init)), __assume_initialized, array initialization rules, and -uninit-check compiler option.\n- **bsc-lsp**: BSC code intelligence via LSP in the constrained subset. Load this Skill when you need to inspect ownership flow, live ranges, borrows, or call graphs in BSC code — e.g. before introducing a borrow, tracing where an _Owned variable was moved, or diagnosing a borrow-checker error. Explains what BSC-aware clangd returns for plain structs + free functions, when it's reliable, and when to fall back to Grep.\n- **bsc-member-function**: Not available in the constrained subset. Member functions (TypeName::method syntax, this/This, static methods) are disabled. Write free functions that take the struct or borrow.\n- **bsc-nullability**: BiSheng C non-null pointers and nullability in the constrained subset. _Nullable, _Nonnull, nullptr, null-safety checking on _Owned/_Borrow/_Owned _ArrayElem pointers, null-check patterns, the _Nullable narrowing-via-reassignment idiom for _Owned _ArrayElem, -nullability-check compiler option, and the -Wnullability-completeness all-or-none rule.\n- **bsc-operator-overloading**: Not available in the constrained subset. Operator overloading (__attribute__((operator OP))) is intended for generic and trait-based types, both of which are disabled. Use named free functions instead (str_eq, str_cmp).\n- **bsc-overview**: BiSheng C language overview for the constrained subset used in this project (ownership + safe zones only). Lists the available features and keywords, the disabled features, and entry-point skills.\n- **bsc-ownership**: BiSheng C ownership system in the constrained subset. _Owned pointers, move semantics, _Owned _ArrayElem buffers, _Nullable, ownership transfer rules, plain-struct + _Owned field RAII (§7.5), and free-and-replace through borrow (§7.6).\n- **bsc-safe-zone**: BiSheng C safe zones in the constrained subset. _Safe functions, _Safe blocks, _Unsafe escape blocks, safe-zone restrictions (initialization, pointers, type casts, enum/float conversions, ++/-- semantics), mixed-mode _Safe redeclaration of libc, and the const-char-* wrapper pattern for void-* libc APIs.\n- **bsc-stdlib**: Not available in the constrained subset. libcbs is disabled — safe_malloc, safe_free, Vec, String, Option, Result, LinkedList and bishengc_safety.hbs are off-limits. Implement required helpers yourself with raw malloc/free + __take_array_from_raw / __move_array_to_raw inside _Unsafe.\n- **bsc-stdlib-advanced**: Not available in the constrained subset. Rc, Weak, Cell, RefCell, Slice, HashMap and interior mutability types from libcbs are disabled. Use plain structs with _Owned _ArrayElem buffers and explicit borrows instead.\n- **bsc-trait**: Not available in the constrained subset. The project disables _Trait — trait-based polymorphism, _Impl registration, and dynamic dispatch are off-limits. Do not introduce them.\n- **c-to-bsc**: BiSheng C translation from C in the constrained subset (ownership + safe zones only, no _Owned struct, no generics, no member functions, no traits, no libcbs). Use when porting C (.c/.h) to BSC, adding ownership annotations, writing per-type allocator wrappers, or setting up the bsc_compat.h dual-compilation shim.\n- **customize-opencode**: Use ONLY when the user is editing or creating opencode's own configuration: opencode.json, opencode.jsonc, files under .opencode/, or files under ~/.config/opencode/. Also use when creating or fixing opencode agents, subagents, skills, plugins, MCP servers, or permission rules. Do not use for the user's own application code, or for any project that is not configuring opencode itself.\n- **dispatching-parallel-agents**: Use when facing 2+ independent tasks that can be worked on without shared state or sequential dependencies\n- **executing-plans**: Use when you have a written implementation plan to execute in a separate session with review checkpoints\n- **finishing-a-development-branch**: Use when implementation is complete, all tests pass, and you need to decide how to integrate the work - guides completion of development work by presenting structured options for merge, PR, or cleanup\n- **receiving-code-review**: Use when receiving code review feedback, before implementing suggestions, especially if feedback seems unclear or technically questionable - requires technical rigor and verification, not performative agreement or blind implementation\n- **requesting-code-review**: Use when completing tasks, implementing major features, or before merging to verify work meets requirements\n- **security-research**: Team Mode security research skill. Orchestrates 3 vulnerability hunters and 2 PoC engineers to audit a codebase in parallel, prove exploitability, classify root causes, and calibrate severity by actual exploitability. Use for security review, vulnerability research, exploitability audit, pre-release security check, threat model validation, and `/security-research`. Triggers: 'security-research', 'security research', 'security review', 'vulnerability audit', 'exploitability audit', '보안 리뷰', '취약점 감사'.\n- **security-review**: Alias for security-research and /security-review. Team Mode security research skill. Orchestrates 3 vulnerability hunters and 2 PoC engineers to audit a codebase in parallel, prove exploitability, classify root causes, and calibrate severity by actual exploitability. Use for security review, vulnerability research, exploitability audit, pre-release security check, threat model validation, and `/security-research`. Triggers: 'security-research', 'security research', 'security review', 'vulnerability audit', 'exploitability audit', '보안 리뷰', '취약점 감사'.\n- **subagent-driven-development**: Use when executing implementation\
      \ plans with independent tasks in the current session\n- **subset-skill-curation**: Methodology for adapting a BSC skill collection to a constrained subset. Use when a BSC project disables features (e.g. no _Owned struct, no generics, no libcbs) and the skill files need to reflect that. Not a BSC technical skill — a skill-maintenance process.\n- **systematic-debugging**: Use when encountering any bug, test failure, or unexpected behavior, before proposing fixes\n- **test-driven-development**: Use when implementing any feature or bugfix, before writing implementation code\n- **using-git-worktrees**: Use when starting feature work that needs isolation from current workspace or before executing implementation plans - ensures an isolated workspace exists via native tools or git worktree fallback\n- **using-superpowers**: Use when starting any conversation - establishes how to find and use skills, requiring Skill tool invocation before ANY response including clarifying questions\n- **verification-before-completion**: Use when about to claim work is complete, fixed, or passing, before committing or creating PRs - requires running verification commands and confirming output before making any success claims; evidence before assertions always\n- **writing-plans**: Use when you have a spec or requirements for a multi-step task, before touching code\n- **writing-skills**: Use when creating new skills, editing existing skills, or verifying skills work before deployment"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        name:
          type: string
          description: The skill or command name (e.g., 'review-work' or 'publish'). Use without leading slash for commands.
        user_message:
          description: 'Optional arguments or context for command invocation. Example: name=''publish'', user_message=''patch'''
          type: string
      required:
      - name
- type: function
  function:
    name: skill_mcp
    description: 'Invoke MCP server operations from skill-embedded MCPs. Requires mcp_name plus exactly one of: tool_name, resource_name, or prompt_name.'
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        mcp_name:
          type: string
          description: Name of the MCP server from skill config
        tool_name:
          description: MCP tool to call
          type: string
        resource_name:
          description: MCP resource URI to read
          type: string
        prompt_name:
          description: MCP prompt to get
          type: string
        arguments:
          description: JSON string or object of arguments
          anyOf:
          - type: string
          - type: object
            properties: {}
            additionalProperties: false
        grep:
          description: Regex pattern to filter output lines (only matching lines returned)
          type: string
      required:
      - mcp_name
- type: function
  function:
    name: task
    description: "Spawn agent task with category-based or direct agent selection.\n\n  ⚠️  CRITICAL: You MUST provide EITHER category OR subagent_type. Omitting BOTH will FAIL.\n\n  **COMMON MISTAKE (DO NOT DO THIS):**\n  ```\n  task(description=\"...\", prompt=\"...\")  // ❌ FAILS - missing category AND subagent_type\n  ```\n\n  **CORRECT - Using category:**\n  ```\n  task(category=\"quick\", description=\"Fix type error\", prompt=\"...\")\n  ```\n\n  **CORRECT - Using subagent_type with parallel exploration:**\n  ```\n  task(subagent_type=\"explore\", description=\"Find patterns\", prompt=\"...\", run_in_background=true)\n  ```\n\n  REQUIRED: Provide ONE of:\n  - category: For task delegation (uses Sisyphus-Junior with category-optimized model)\n  - subagent_type: For direct agent invocation (explore, librarian, oracle, etc.)\n\n  **DO NOT provide both.** If category is provided, subagent_type is ignored.\n\n  - load_skills: Optional. Defaults to [] when omitted. Pass [\"skill-1\", \"skill-2\"] for skill-specific tasks.\n  - category: Use predefined category → Spawns Sisyphus-Junior with category config\n    Available categories:\n    - visual-engineering: Frontend, UI/UX, design, styling, animation\n  - artistry: Complex problem-solving with unconventional, creative approaches - beyond standard patterns\n  - ultrabrain: Use ONLY for genuinely hard, logic-heavy tasks. Give clear goals only, not step-by-step instructions.\n  - deep: Goal-oriented autonomous problem-solving on hairy problems requiring deep research. ONE goal + ONE deliverable per call — multiple goals must fan out as parallel `deep` calls, never bundled into one.\n  - quick: Trivial tasks - single file changes, typo fixes, simple modifications\n  - unspecified-low: Tasks that don't fit other categories, low effort required\n  - unspecified-high: Tasks that don't fit other categories, high effort required\n  - writing: Documentation, prose, technical writing\n  - subagent_type: Use specific agent directly (explore, librarian, oracle, metis, momus)\n  - run_in_background: Optional. Defaults to false (sync, waits). Set true=async (returns a background task ID like `bg_...` for `background_output`) ONLY for parallel exploration with 5+ independent queries.\n    Sync waits use a 30-minute inactivity window: OpenCode busy/retry/running status resets the window, so this is not a total wall-clock limit.\n  - task_id: Continuation session id (`ses_...`) from task metadata. Continues the same subagent session with FULL CONTEXT PRESERVED; not the background task id (`bg_...`).\n  - command: The command that triggered this task (optional, for slash command tracking).\n  \n  **WHEN TO USE task_id:**\n  - Task failed/incomplete → `task(task_id=\"ses_...\", prompt=\"fix: [specific issue]\")`\n  - Need follow-up on previous result → `task(task_id=\"ses_...\", prompt=\"Also: [question]\")`\n  - Multi-turn conversation with same agent → always `task(task_id=\"ses_...\")` instead of new task\n  \n  Prompts MUST be in English.\nAvailable agent types and the tools they have access to:\n- bsc-learn: Review a completed BSC coding session and propose skill improvements. Given a summary of issues encountered and the session's git diff, identifies generalisable patterns worth adding to BSC skills. Returns proposed additions as text for user approval; does NOT write to files.\n- bsc-planner: Plan non-trivial BiSheng C changes. Use for refactors, new APIs, new structs (especially _Owned struct), changes that cross ownership timelines, or any task that requires reading many .cbs files to understand ownership flow before deciding what to change. The agent is read-only (Read/Grep/Glob/LSP) — it produces a plan, not code. The main thread implements based on the plan. Do not use for small single-file edits or typo fixes — the main thread handles those directly.\n- build: The default agent. Executes tools based on configured permissions.\n- explore: Contextual grep for codebases. Answers \"Where is X?\", \"Which file has Y?\", \"Find the code that does Z\". Fire multiple in parallel for broad searches. Specify thoroughness: \"quick\" for basic, \"medium\" for moderate, \"very thorough\" for comprehensive analysis. (Explore - OhMyOpenCode)\n- general: General-purpose agent for researching complex questions and executing multi-step tasks. Use this agent to execute multiple units of work in parallel.\n- librarian: Specialized codebase understanding agent for multi-repository analysis, searching remote codebases, retrieving official documentation, and finding implementation examples using GitHub CLI, Context7, and Web Search. MUST BE USED when users ask to look up code in remote repositories, explain library internals, or find usage examples in open source. (Librarian - OhMyOpenCode)\n- Metis - Plan Consultant: Pre-planning consultant that analyzes requests to identify hidden intentions, ambiguities, and AI failure points. (Metis - OhMyOpenCode)\n- Momus - Plan Critic: Expert reviewer for evaluating work plans against rigorous clarity, verifiability, and completeness standards. (Momus - OhMyOpenCode)\n- multimodal-looker: Analyze media files (PDFs, images, diagrams) that require interpretation beyond raw text. Extracts specific information or summaries from documents, describes visual content. Use when you need analyzed/extracted data rather than literal file contents. (Multimodal-Looker - OhMyOpenCode)\n- oracle: Read-only consultation agent. High-IQ reasoning specialist for debugging hard problems and high-difficulty architecture design. (Oracle - OhMyOpenCode)\n- plan: Plan mode. Disallows all edit tools.\n- Sisyphus-Junior: Focused task executor. Same discipline, no delegation. (Sisyphus-Junior - OhMyOpenCode)"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        load_skills:
          description: Skill names to inject. Optional; defaults to [] when omitted. Pass an explicit array (e.g. ["git-master"]) for skill-specific tasks.
          type: array
          items:
            type: string
        description:
          description: Short task description (3-5 words). Auto-generated from prompt if omitted.
          type: string
        prompt:
          type: string
          description: Full detailed prompt for the agent
        run_in_background:
          description: Optional; defaults to false (sync). true=async (returns background task ID `bg_...` for background_output), false=sync (waits). Use true ONLY for parallel exploration; otherwise omit or pass false for task delegation.
          type: boolean
        category:
          description: REQUIRED if subagent_type not provided. Do NOT provide both category and subagent_type.
          type: string
        subagent_type:
          description: REQUIRED if category not provided. Do NOT provide both category and subagent_type.
          type: string
        task_id:
          description: Continuation session id (`ses_...`) from task metadata; not a background task id (`bg_...`).
          type: string
        command:
          description: The command that triggered this task
          type: string
      required:
      - prompt
- type: function
  function:
    name: todowrite
    description: 'Use this tool to create and manage a structured task list for tracking progress on multi-step work.


      ## OpenCode Schema Contract


      The upstream OpenCode `todowrite` schema expects each todo item to include:


      - `content`: string

      - `status`: string, one of `pending`, `in_progress`, `completed`, `cancelled`

      - `priority`: string, one of `high`, `medium`, `low`


      `priority` is a string field. Never send numeric priorities such as `0`, `1`, `2`, or labels such as `P0`, `P1`, `P2`.


      ## Todo Format (MANDATORY)


      Each todo title MUST encode four elements: WHERE, WHY, HOW, and EXPECTED RESULT.


      Format: "[WHERE] [HOW] to [WHY] - expect [RESULT]"


      GOOD:

      - "src/utils/validation.ts: Add validateEmail() for input sanitization - returns boolean"

      - "UserService.create(): Call validateEmail() before DB insert - rejects invalid emails with 400"

      - "validation.test.ts: Add test for missing @ sign - expect validateEmail(''foo'') to return false"


      BAD:

      - "Implement email validation" (where? how? what result?)

      - "Add dark mode" (feature, not a todo)

      - "Fix auth" (what file? what changes? what''s expected?)


      ## Granularity Rules


      Each todo MUST be a single atomic action completable in 1-3 tool calls. If it needs more, split it.


      **Size test**: Can you complete this todo by editing one file or running one command? If not, it''s too big.


      ## Task Management

      - One in_progress at a time. Complete it before starting the next.

      - Mark completed immediately after finishing each item.

      - Skip this tool for single trivial tasks (one-step, obvious action).'
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        todos:
          type: array
          items:
            type: object
            properties:
              content:
                type: string
                description: Brief description of the task
              status:
                type: string
                description: 'Current status of the task: pending, in_progress, completed, cancelled'
              priority:
                type: string
                description: 'Priority level of the task: high, medium, low'
            required:
            - content
            - status
            - priority
          description: The updated todo list
      required:
      - todos
- type: function
  function:
    name: webfetch
    description: "- Fetches content from a specified URL\n- Takes a URL and optional format as input\n- Fetches the URL content, converts to requested format (markdown by default)\n- Returns the content in the specified format\n- Use this tool when you need to retrieve and analyze web content\n\nUsage notes:\n  - IMPORTANT: if another tool is present that offers better web fetching capabilities, is more targeted to the task, or has fewer restrictions, prefer using that tool instead of this one.\n  - The URL must be a fully-formed valid URL\n  - HTTP URLs will be automatically upgraded to HTTPS\n  - Format options: \"markdown\" (default), \"text\", or \"html\"\n  - This tool is read-only and does not modify any files\n  - Results may be summarized if the content is very large\n"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        url:
          type: string
          description: The URL to fetch content from
        format:
          anyOf:
          - type: string
            enum:
            - text
            - markdown
            - html
            description: The format to return the content in (text, markdown, or html). Defaults to markdown.
            default: markdown
          - type: 'null'
        timeout:
          type: number
          description: Optional timeout in seconds (max 120)
      required:
      - url
- type: function
  function:
    name: websearch
    description: "- Search the web using the session's web search provider - performs real-time web searches and can scrape content from specific URLs\n- Provides up-to-date information for current events and recent data\n- Supports configurable result counts and returns the content from the most relevant websites\n- Use this tool for accessing information beyond knowledge cutoff\n- Searches are performed automatically within a single API call\n\nUsage notes:\n  - Supports live crawling modes when available: 'fallback' (backup if cached unavailable) or 'preferred' (prioritize live crawling)\n  - Search types when available: 'auto' (balanced), 'fast' (quick results), 'deep' (comprehensive search)\n  - Configurable context length for optimal LLM integration\n  - Domain filtering and advanced search options available\n\nThe current year is 2026. You MUST use this year when searching for recent information or current events\n- Example: If the current year is 2026 and the user asks for \"latest AI news\", search for \"AI news 2026\", NOT \"AI news 2025\"\n"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        query:
          type: string
          description: Websearch query
        numResults:
          type: number
          description: 'Number of search results to return (default: 8)'
        livecrawl:
          type: string
          enum:
          - fallback
          - preferred
          description: 'Live crawl mode - ''fallback'': use live crawling as backup if cached content unavailable, ''preferred'': prioritize live crawling (default: ''fallback'')'
        type:
          type: string
          enum:
          - auto
          - fast
          - deep
          description: 'Search type - ''auto'': balanced search (default), ''fast'': quick results, ''deep'': comprehensive search'
        contextMaxCharacters:
          type: number
          description: 'Maximum characters for context string optimized for LLMs (default: 10000)'
      required:
      - query
- type: function
  function:
    name: websearch_web_search_exa
    description: "Search the web for any topic and get clean, ready-to-use content.\n\n      Best for: Finding current information, news, facts, people, companies, or answering questions about any topic.\n      Returns: Clean text content from top search results.\n\n      Query tips:\n      describe the ideal page, not keywords. \"blog post comparing React and Vue performance\" not \"React vs Vue\".\n      Use category:people / category:company to search through Linkedin profiles / companies respectively.\n      If highlights are insufficient, follow up with web_fetch_exa on the best URLs."
    parameters:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: Natural language search query. Should be a semantically rich description of the ideal page, not just keywords. Optionally include category:<type> (company, people) to focus results — e.g. 'category:people John Doe software engineer'.
        numResults:
          type: number
          description: 'Number of search results to return (default: 10).'
      required:
      - query
      additionalProperties: false
      $schema: http://json-schema.org/draft-07/schema#
- type: function
  function:
    name: write
    description: 'Writes a file to the local filesystem.


      Usage:

      - This tool will overwrite the existing file if there is one at the provided path.

      - If this is an existing file, you MUST use the Read tool first to read the file''s contents. This tool will fail if you did not read the file first.

      - ALWAYS prefer editing existing files in the codebase. NEVER write new files unless explicitly required.

      - NEVER proactively create documentation files (*.md) or README files. Only create documentation files if explicitly requested by the User.

      - Only use emojis if the user explicitly requests it. Avoid writing emojis to files unless asked.

      '
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        content:
          type: string
          description: The content to write to the file
        filePath:
          type: string
          description: The absolute path to the file to write (must be absolute, not relative)
      required:
      - content
      - filePath
tool_choice: auto
stream: true
stream_options:
  include_usage: true
