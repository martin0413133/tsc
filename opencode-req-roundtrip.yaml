- type: function
  function:
    name: bash
    description: "Executes a given bash command in a persistent shell session with optional timeout, ensuring proper handling and security measures.\n\nBe aware: OS: linux, Shell: bash\n\nAll commands run in the current working directory by default. Use the `workdir` parameter if you need to run a command in a different directory. AVOID using `cd <directory> && <command>` patterns - use `workdir` instead.\n\nUse `/tmp/opencode` for temporary work outside the workspace. This directory has already been created, already exists, and is pre-approved for external directory access.\n\nIMPORTANT: This tool is for terminal operations like git, npm, docker, etc. DO NOT use it for file operations (reading, writing, editing, searching, finding files) - use the specialized tools for this instead.\n\nBefore executing the command, please follow these steps:\n\n1. Directory Verification:\n   - If the command will create new directories or files, first use `ls` to verify the parent directory exists and is the correct location\n   - For example, before running \"mkdir foo/bar\", first use `ls foo` to check that \"foo\" exists and is the intended parent directory\n\n2. Command Execution:\n   - Always quote file paths that contain spaces with double quotes (e.g., rm \"path with spaces/file.txt\")\n   - Examples of proper quoting:\n     - mkdir \"/Users/name/My Documents\" (correct)\n     - mkdir /Users/name/My Documents (incorrect - will fail)\n     - python \"/path/with spaces/script.py\" (correct)\n     - python /path/with spaces/script.py (incorrect - will fail)\n   - After ensuring proper quoting, execute the command.\n   - Capture the output of the command.\n\nUsage notes:\n  - The command argument is required.\n  - You can specify an optional timeout in milliseconds. If not specified, commands will time out after 120000ms (2 minutes).\n  - It is very helpful if you write a clear, concise description of what this command does in 5-10 words.\n  - If the output exceeds 2000 lines or 51200 bytes, it will be truncated and the full output will be written to a file. You can use Read with offset/limit to read specific sections or Grep to search the full content. Do NOT use `head`, `tail`, or other truncation commands to limit output; the full output will already be captured to a file for more precise searching.\n\n  - Avoid using Bash with the `find`, `grep`, `cat`, `head`, `tail`, `sed`, `awk`, or `echo` commands, unless explicitly instructed or when these commands are truly necessary for the task. Instead, always prefer using the dedicated tools for these commands:\n    - File search: Use Glob (NOT find or ls)\n    - Content search: Use Grep (NOT grep or rg)\n    - Read files: Use Read (NOT cat/head/tail)\n    - Edit files: Use Edit (NOT sed/awk)\n    - Write files: Use Write (NOT echo >/cat <<EOF)\n    - Communication: Output text directly (NOT echo/printf)\n  - When issuing multiple commands:\n    - If the commands are independent and can run in parallel, make multiple bash tool calls in a single message. For example, if you need to run \"git status\" and \"git diff\", send a single message with two bash tool calls in parallel.\n    - If the commands depend on each other and must run sequentially, use a single Bash call with '&&' to chain them together (e.g., `git add . && git commit -m \"message\" && git push`). For instance, if one operation must complete before another starts (like mkdir before cp, Write before Bash for git operations, or git add before git commit), run these operations sequentially instead.\n    - Use ';' only when you need to run commands sequentially but don't care if earlier commands fail\n    - DO NOT use newlines to separate commands (newlines are ok in quoted strings)\n  - AVOID using `cd <directory> && <command>`. Use the `workdir` parameter to change directories instead.\n    <good-example>\n    Use workdir=\"/foo/bar\" with command: pytest tests\n    </good-example>\n    <bad-example>\n    cd /foo/bar && pytest tests\n    </bad-example>\n\n# Git and GitHub\n- Only commit, amend, push, or create PRs when explicitly requested.\n- Before committing, inspect `git status`, `git diff`, and `git log --oneline -10`; stage only intended files and never commit secrets.\n- Write a concise commit message that matches the repo style.\n- Do not update git config, skip hooks, use interactive `-i`, force-push, or create empty commits unless explicitly requested.\n- If a commit fails or hooks reject it, fix the issue and create a new commit; do not amend the failed commit.\n- Before creating a PR, inspect status, diff, remote tracking, recent commits, and the diff from the base branch.\n- Review all commits included in the PR, not just the latest commit.\n- Use `gh` for GitHub tasks, including PRs, issues, checks, and releases; return the PR URL when done.\n"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        command:
          type: string
          description: The command to execute
        timeout:
          minimum: -9007199254740991
          exclusiveMinimum: 0
          type: integer
          maximum: 9007199254740991
          description: Optional timeout in milliseconds
        workdir:
          type: string
          description: The working directory to run the command in. Defaults to the current directory. Use this instead of 'cd' commands.
        description:
          type: string
          description: 'Clear, concise description of what this command does in 5-10 words. Examples:

            Input: ls

            Output: Lists files in current directory


            Input: git status

            Output: Shows working tree status


            Input: npm install

            Output: Installs package dependencies


            Input: mkdir foo

            Output: Creates directory ''foo'''
      required:
      - command
      - description
- type: function
  function:
    name: context7_query-docs
    description: 'Retrieves and queries up-to-date documentation and code examples from Context7 for any programming library or framework.


      You must call ''Resolve Context7 Library ID'' tool first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.


      Do not call this tool more than 3 times per question.'
    parameters:
      type: object
      properties:
        libraryId:
          type: string
          description: Exact Context7-compatible library ID (e.g., '/mongodb/docs', '/vercel/next.js', '/supabase/supabase', '/vercel/next.js/v14.3.0-canary.87') retrieved from 'resolve-library-id' or directly from user query in the format '/org/project' or '/org/project/version'.
        query:
          type: string
          description: 'The question or task you need help with. Be specific and include relevant details. Good: ''How to set up authentication with JWT in Express.js'' or ''React useEffect cleanup function examples''. Bad: ''auth'' or ''hooks''. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query.'
      required:
      - libraryId
      - query
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
- type: function
  function:
    name: context7_resolve-library-id
    description: 'Resolves a package/product name to a Context7-compatible library ID and returns matching libraries.


      You MUST call this function before ''Query Documentation'' tool to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format ''/org/project'' or ''/org/project/version'' in their query.


      Each result includes:

      - Library ID: Context7-compatible identifier (format: /org/project)

      - Name: Library or package name

      - Description: Short summary

      - Code Snippets: Number of available code examples

      - Source Reputation: Authority indicator (High, Medium, Low, or Unknown)

      - Benchmark Score: Quality indicator (100 is the highest score)

      - Versions: List of versions if available. Use one of those versions if the user provides a version in their query. The format of the version is /org/project/version.


      For best results, select libraries based on name match, source reputation, snippet coverage, benchmark score, and relevance to your use case.


      Selection Process:

      1. Analyze the query to understand what library/package the user is looking for

      2. Return the most relevant match based on:

      - Name similarity to the query (exact matches prioritized)

      - Description relevance to the query''s intent

      - Documentation coverage (prioritize libraries with higher Code Snippet counts)

      - Source reputation (consider libraries with High or Medium reputation more authoritative)

      - Benchmark Score: Quality indicator (100 is the highest score)


      Response Format:

      - Return the selected library ID in a clearly marked section

      - Provide a brief explanation for why this library was chosen

      - If multiple good matches exist, acknowledge this but proceed with the most relevant one

      - If no good matches exist, clearly state this and suggest query refinements


      For ambiguous queries, request clarification before proceeding with a best-guess match.


      IMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best result you have.'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: The question or task you need help with. This is used to rank library results by relevance to what the user is trying to accomplish. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query.
        libraryName:
          type: string
          description: Library name to search for and retrieve a Context7-compatible library ID. Use the official library name with proper punctuation — e.g., 'Next.js' instead of 'nextjs', 'Customer.io' instead of 'customerio', 'Three.js' instead of 'threejs'.
      required:
      - query
      - libraryName
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
- type: function
  function:
    name: edit
    description: "Performs exact string replacements in files. \n\nUsage:\n- You must use your `Read` tool at least once in the conversation before editing. This tool will error if you attempt an edit without reading the file. \n- When editing text from Read tool output, ensure you preserve the exact indentation (tabs/spaces) as it appears AFTER the line number prefix. The line number prefix format is: line number + colon + space (e.g., `1: `). Everything after that space is the actual file content to match. Never include any part of the line number prefix in the oldString or newString.\n- ALWAYS prefer editing existing files in the codebase. NEVER write new files unless explicitly required.\n- Only use emojis if the user explicitly requests it. Avoid adding emojis to files unless asked.\n- The edit will FAIL if `oldString` is not found in the file with an error \"oldString not found in content\".\n- The edit will FAIL if `oldString` is found multiple times in the file with an error \"Found multiple matches for oldString. Provide more surrounding lines in oldString to identify the correct match.\" Either provide a larger string with more surrounding context to make it unique or use `replaceAll` to change every instance of `oldString`. \n- Use `replaceAll` for replacing and renaming strings across the file. This parameter is useful if you want to rename a variable for instance.\n"
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        filePath:
          type: string
          description: The absolute path to the file to modify
        oldString:
          type: string
          description: The text to replace
        newString:
          type: string
          description: The text to replace it with (must be different from oldString)
        replaceAll:
          type: boolean
          description: Replace all occurrences of oldString (default false)
      required:
      - filePath
      - oldString
      - newString
- type: function
  function:
    name: glob
    description: Fast file pattern matching tool with safety limits (60s timeout, 100 file limit). Supports glob patterns like "**/*.js" or "src/**/*.ts". Returns matching file paths sorted by modification time. Use this tool when you need to find files by name patterns.
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        pattern:
          type: string
          description: The glob pattern to match files against
        path:
          description: 'The directory to search in. If not specified, the current working directory will be used. IMPORTANT: Omit this field to use the default directory. DO NOT enter "undefined" or "null" - simply omit it for the default behavior. Must be a valid directory path if provided.'
          type: string
      required:
      - pattern
- type: function
  function:
    name: grep
    description: 'Fast content search tool with safety limits (60s timeout, 256KB output). Searches file contents using regular expressions. Supports full regex syntax (eg. "log.*Error", "function\s+\w+", etc.). Filter files by pattern with the include parameter (eg. "*.js", "*.{ts,tsx}"). Output modes: "content" shows matching lines, "files_with_matches" shows only file paths (default), "count" shows match counts per file.'
    parameters:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        pattern:
          type: string
          description: The regex pattern to search for in file contents
        include:
          description: File pattern to include in the search (e.g. "*.js", "*.{ts,tsx}")
          type: string
        path:
          description: The directory to search in. Defaults to the current working directory.
          type: string
        output_mode:
          description: 'Output mode: "content" shows matching lines, "files_with_matches" shows only file paths (default), "count" shows match counts per file.'
          type: string
          enum:
          - content
          - files_with_matches
          - count
        head_limit:
          description: Limit output to first N entries. 0 or omitted means no limit.
          type: number
      required:
      - pattern
- type: function
  function:
    name: grep_app_searchGitHub
    description: 'Find real-world code examples from over a million public GitHub repositories to help answer programming questions.


      **IMPORTANT: This tool searches for literal code patterns (like grep), not keywords. Search for actual code that would appear in files:**

      - ✅ Good: ''useState('', ''import React from'', ''async function'', ''(?s)try {.*await''

      - ❌ Bad: ''react tutorial'', ''best practices'', ''how to use''


      **When to use this tool:**

      - When implementing unfamiliar APIs or libraries and need to see real usage patterns

      - When unsure about correct syntax, parameters, or configuration for a specific library

      - When looking for production-ready examples and best practices for implementation

      - When needing to understand how different libraries or frameworks work together


      **Perfect for questions like:**

      - "How do developers handle authentication in Next.js apps?" → Search: ''getServerSession'' with language=[''TypeScript'', ''TSX'']

      - "What are common React error boundary patterns?" → Search: ''ErrorBoundary'' with language=[''TSX'']

      - "Show me real useEffect cleanup examples" → Search: ''(?s)useEffect\(\(\) => {.*removeEventListener'' with useRegexp=true

      - "How do developers handle CORS in Flask applications?" → Search: ''CORS('' with matchCase=true and language=[''Python'']


      Use regular expressions with useRegexp=true for flexible patterns like ''(?s)useState\(.*loading'' to find useState hooks with loading-related variables. Prefix the pattern with ''(?s)'' to match across multiple lines.


      Filter by language, repository, or file path to narrow results.'
    parameters:
      type: object
      properties:
        query:
          type: string
          description: The literal code pattern to search for (e.g., 'useState(', 'export function'). Use actual code that would appear in files, not keywords or questions.
        matchCase:
          type: boolean
          description: Whether the search should be case sensitive
          default: false
        matchWholeWords:
          type: boolean
          description: Whether to match whole words only
          default: false
        useRegexp:
          type: boolean
          description: Whether to interpret the query as a regular expression
          default: false
        repo:
          type: string
          description: "Filter by repository.\n            Examples: 'facebook/react', 'microsoft/vscode', 'vercel/ai'.\n            Can match partial names, for example 'vercel/' will find repositories in the vercel org."
        path:
          type: string
          description: "Filter by file path.\n            Examples: 'src/components/Button.tsx', 'README.md'.\n            Can match partial paths, for example '/route.ts' will find route.ts files at any level."
        language:
          type: array
          items:
            type: string
          description: "Filter by programming language.\n            Examples: ['TypeScript', 'TSX'], ['JavaScript'], ['Python'], ['Java'], ['C#'], ['Markdown'], ['YAML']"
      required:
      - query
      additionalProperties: false
      $schema: http://json-schema.org/draft-07/schema#
