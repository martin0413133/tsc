ace or before executing implementation plans - ensures an isolated workspace exists via native tools or git worktree fallback</description>\n    <location>file:///home/user/project/superpowers/skills/using-git-worktrees/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>using-superpowers</name>\n    <description>Use when starting any conversation - establishes how to find and use skills, requiring Skill tool invocation before ANY response including clarifying questions</description>\n    <location>file:///home/user/project/superpowers/skills/using-superpowers/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>verification-before-completion</name>\n    <description>Use when about to claim work is complete, fixed, or passing, before committing or creating PRs - requires running verification commands and confirming output before making any success claims; evidence before assertions always</description>\n    <location>file:///home/user/project/superpowers/skills/verification-before-completion/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>writing-plans</name>\n    <description>Use when you have a spec or requirements for a multi-step task, before touching code</description>\n    <location>file:///home/user/project/superpowers/skills/writing-plans/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>writing-skills</name>\n    <description>Use when creating new skills, editing existing skills, or verifying skills work before deployment</description>\n    <location>file:///home/user/project/superpowers/skills/writing-skills/SKILL.md</location>\n  </skill>\n</available_skills>"
