elligence via LSP in the constrained subset. Load this Skill when you need to inspect ownership flow, live ranges, borrows, or call graphs in BSC code — e.g. before introducing a borrow, tracing where an _Owned variable was moved, or diagnosing a borrow-checker error. Explains what BSC-aware clangd returns for plain structs + free functions, when it's reliable, and when to fall back to Grep.</description>\n    <location>file:///home/user/project/.opencode/skills/bsc-lsp/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>bsc-member-function</name>\n    <description>Not available in the constrained subset. Member functions (TypeName::method syntax, this/This, static methods) are disabled. Write free functions that take the struct or borrow.</description>\n    <location>file:///home/user/project/.opencode/skills/bsc-member-function/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>bsc-nullability</name>\n    <description>BiSheng C non-null pointers and nullability in the constrained subset. _Nullable, _Nonnull, nullptr, null-safety checking on _Owned/_Borrow/_Owned _ArrayElem pointers, null-check patterns, the _Nullable narrowing-via-reassignment idiom for _Owned _ArrayElem, -nullability-check compiler option, and the -Wnullability-completeness all-or-none rule.</description>\n    <location>file:///home/user/project/.opencode/skills/bsc-nullability/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>bsc-operator-overloading</name>\n    <description>Not available in the constrained subset. Operator overloading (__attribute__((operator OP))) is intended for generic and trait-based types, both of which are disabled. Use named free functions instead (str_eq, str_cmp).</description>\n    <location>file:///home/user/project/.opencode/skills/bsc-operator-overloading/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>bsc-overview</name>\n    <description>BiSheng C language overview for the constrained subset used in this project (ownership + safe zones only). Lists