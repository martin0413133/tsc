  content: '## Skill: bsc-overview


    **Base directory**: /home/user/project/.opencode/skills/bsc-overview


    Base directory for this skill: /home/user/project/.opencode/skills/bsc-overview/

    File references (@path) in this skill are relative to this directory.


    # BiSheng C — Constrained-subset overview


    This project uses a deliberately restricted subset of BiSheng C. The available

    features are listed in §2; everything else (generics, traits, member functions,

    `_Owned struct`, libcbs) is off-limits.


    ## 1. What is BiSheng C (subset)


    BiSheng C (BSC) is a **superset of C** with compile-time memory safety via

    ownership + borrowing + safe zones. In this subset BSC adds these checks on

    top of plain C without introducing additional language abstractions.


    - Source files: `.cbs` (or `.c` compiled with `-x bsc`)

    - Header files: `.hbs` (or `.h` compiled with `-x bsc`)

    - Compiler: clang fork — `clang -x bsc file.cbs -o output`


    ## CRITICAL syntax rule


    `_Owned` and `_Borrow` are **pointer qualifiers** — they go **after the `*`**, never before the type:


    - CORRECT: `char *_Owned p = ...;`

    - CORRECT: `const int *_Borrow r = &_Const x;`

    - WRONG: `_Owned char* p = ...;` — does not compile

    - WRONG: `_Borrow int* r = ...;` — does not compile


    ## 2. Available in this subset


    | Feature | Keywords | Skill |

    |---|---|---|

    | Ownership | `_Owned`, `_ArrayElem`, `_Nullable`, `nullptr`, `__take_array_from_raw`, `__move_array_to_raw` | `bsc-ownership` |

    | Borrowing | `_Borrow`, `_ArrayElem`, `&_Const`, `&_Mut` | `bsc-borrowing` |

    | Safe zones | `_Safe`, `_Unsafe` (block / stmt / expr / decl) | `bsc-safe-zone` |

    | Nullability | `_Nullable`, `_Nonnull`, `nullptr`, `-Wnullability-completeness` | `bsc-nullability` |

    | Initialization analysis | `__attribute__((ensure_init))`, `__assume_initialized` | `bsc-initialization` |

    | constexpr | `constexpr`, `_Static_assert` (no type-traits) | `bsc-constexpr` |

    | Mixed-mode `_Safe` redeclaration of libc | `_Safe size_t strlen(const char *_Borrow _ArrayElem);` | `bsc-safe-zone` §5 |

    | Design patterns under this subset | INVALID-sentinel, swap-then-free, helper layering | `bsc-design` |

    | BSC ↔ standard-C dual compilation | `bsc_compat.h` macro shim, `__bishengc` guard | `c-to-bsc` |


    ## 3. NOT in this subset


    The following BSC features are **disabled** for this project. Do not introduce

    them in plans, code, or design proposals.


    | Disabled | Notes |

    |---|---|

    | `_Owned struct` | Use a plain struct with one `T *_Owned _ArrayElem _Nullable` field + a `name_free(struct T s)` consumer function. See `bsc-ownership` §7.5. |

    | Generics (`<T>`, `<T, int N>`, generic structs/unions/typedefs) | Write one specialised function per element type. |

    | Member functions (`TypeName::method`, `this`, `This`) | Write free functions taking `struct T *_Borrow s`. |

    | `_Trait` / `_Impl` / trait pointers / vtable dispatch | Use tagged enums + switch, or one function per concrete type. |

    | Operator overloading (`__attribute__((operator OP))`) | Use named free functions (`str_eq`, `str_cmp`). |

    | Coroutines (`_Async`, `_Await`, `Future`, `Scheduler`) | Write synchronous code. |

    | libcbs (`bishengc_safety.hbs`, `Vec<T>`, `String`, `Option`, `Result`, `Rc`, `Cell`, …) | Roll your own wrappers around raw `malloc`/`free`. |

    | Type traits / `constexpr if` on traits / conditional type aliases | Use `#if`/`#ifdef` and concrete types. |


    ## 4. Skill index


    > For ownership, see `bsc-ownership` Skill

    > For borrowing, see `bsc-borrowing` Skill

    > For nullability, see `bsc-nullability` Skill

    > For safe zones, see `bsc-safe-zone` Skill

    > For initialization analysis, see `bsc-initialization` Skill

    > For constexpr (subset), see `bsc-constexpr` Skill

    > For design patterns under this subset, see `bsc-design` Skill

    > For compilation, see `bsc-compile` Skill

    > For common pitfalls, see `bsc-common-mistakes` Skill

    > For error codes and diagnostics, see `bsc-errors` Skill

    > For LSP / clangd queries, see `bsc-lsp` Skill

    > For porting C to BSC + dual-compile shim, see `c-to-bsc` Skill


    Skills for disabled features (`bsc-generic`, `bsc-trait`, `bsc-member-function`,

    `bsc-stdlib`, `bsc-stdlib-advanced`, `bsc-coroutine`, `bsc-operator-overloading`)

    have been stubbed — invoking them returns "not in this subset" guidance.'
