    \ — lowest priority\n\nIf CLAUDE.md, GEMINI.md, or AGENTS.md says \"don't use\
    \ TDD\" and a skill says \"always use TDD,\" follow the user's instructions. The\
    \ user is in control.\n\n## How to Access Skills\n\n**In Claude Code:** Use the\
    \ `Skill` tool. When you invoke a skill, its content is loaded and presented to\
    \ you—follow it directly. Never use the Read tool on skill files.\n\n**In Copilot\
    \ CLI:** Use the `skill` tool. Skills are auto-discovered from installed plugins.\
    \ The `skill` tool works the same as Claude Code's `Skill` tool.\n\n**In Gemini\
    \ CLI:** Skills activate via the `activate_skill` tool. Gemini loads skill metadata\
    \ at session start and activates the full content on demand.\n\n**In other environments:**\
    \ Check your platform's documentation for how skills are loaded.\n\n## Platform\
    \ Adaptation\n\nSkills use Claude Code tool names. Non-CC platforms: see `references/copilot-tools.md`\
    \ (Copilot CLI), `references/codex-tools.md` (Codex) for tool equivalents. Gemini\
    \ CLI users get the tool mapping loaded automatically via GEMINI.md.\n\n# Using\
    \ Skills\n\n## The Rule\n\n**Invoke relevant or requested skills BEFORE any response\
    \ or action.** Even a 1% chance a skill might apply means that you should invoke\
    \ the skill to check. If an invoked skill turns out to be wrong for the situation,\
    \ you don't need to use it.\n\n```dot\ndigraph skill_flow {\n    \"User message\
    \ received\" [shape=doublecircle];\n    \"About to EnterPlanMode?\" [shape=doublecircle];\n\
    \    \"Already brainstormed?\" [shape=diamond];\n    \"Invoke brainstorming skill\"\
    \ [shape=box];\n    \"Might any skill apply?\" [shape=diamond];\n    \"Invoke\
    \ Skill tool\" [shape=box];\n    \"Announce: 'Using [skill] to [purpose]'\" [shape=box];\n\
    \    \"Has checklist?\" [shape=diamond];\n    \"Create TodoWrite todo per item\"\
    \ [shape=box];\n    \"Follow skill exactly\" [shape=box];\n    \"Respond (including\
    \ clarifications)\" [shape=doublecircle];\n\n    \"About to EnterPlanMode?\" ->\
    \ \"Already brainstormed?\";\n    \"Already brainstormed?\" -> \"Invoke brainstorming\
    \ skill\" [label=\"no\"];\n    \"Already brainstormed?\" -> \"Might any skill\
    \ apply?\" [label=\"yes\"];\n    \"Invoke brainstorming skill\" -> \"Might any\
    \ skill apply?\";\n\n    \"User message received\" -> \"Might any skill apply?\"\
    ;\n    \"Might any skill apply?\" -> \"Invoke Skill tool\" [label=\"yes, even\
    \ 1%\"];\n    \"Might any skill apply?\" -> \"Respond (including clarifications)\"\
    \ [label=\"definitely not\"];\n    \"Invoke Skill tool\" -> \"Announce: 'Using\
    \ [skill] to [purpose]'\";\n    \"Announce: 'Using [skill] to [purpose]'\" ->\
    \ \"Has checklist?\";\n    \"Has checklist?\" -> \"Create TodoWrite todo per item\"\
    \ [label=\"yes\"];\n    \"Has checklist?\" -> \"Follow skill exactly\" [label=\"\
    no\"];\n    \"Create TodoWrite todo per item\" -> \"Follow skill exactly\";\n\
    }\n```\n\n## Red Flags\n\nThese thoughts mean STOP—you're rationalizing:\n\n|\
    \ Thought | Reality |\n|---------|---------|\n| \"This is just a simple question\"\
    \ | Questions are tasks. Check for skills. |\n| \"I need more context first\"\
    \ | Skill check comes BEFORE clarifying questions. |\n| \"Let me explore the codebase\
    \ first\" | Skills tell you HOW to explore. Check first. |\n| \"I can check git/files\
    \ quickly\" | Files lack conversation context. Check for skills. |\n| \"Let me\
    \ gather information first\" | Skills tell you HOW to gather information. |\n\
    | \"This doesn't need a formal skill\" | If a skill exists, use it. |\n| \"I remember\
    \ this skill\" | Skills evolve. Read current version. |\n| \"This doesn't count\
    \ as a task\" | Action = task. Check for skills. |\n| \"The skill is overkill\"\
    \ | Simple things become complex. Use it. |\n| \"I'll just do this one thing first\"\
    \ | Check BEFORE doing anything. |\n| \"This feels productive\" | Undisciplined\
    \ action wastes time. Skills prevent this. |\n| \"I know what that means\" | Knowing\
    \ the concept ≠ using the skill. Invoke it. |\n\n## Skill Priority\n\nWhen multiple\
    \ skills could apply, use this order:\n\n1. **Process skills first** (brainstorming,\
    \ debugging) - these determine HOW to approach the task\n2. **Implementation skills\
    \ second** (frontend-design, mcp-builder) - these guide execution\n\n\"Let's build\
    \ X\" → brainstorming first, then implementation skills.\n\"Fix this bug\" → debugging\
    \ first, then domain-specific skills.\n\n## Skill Types\n\n**Rigid** (TDD, debugging):\
    \ Follow exactly. Don't adapt away discipline.\n\n**Flexible** (patterns): Adapt\
    \ principles to context.\n\nThe skill itself tells you which.\n\n## User Instructions\n\
    \nInstructions say WHAT, not HOW. \"Add X\" or \"Fix Y\" doesn't mean skip workflows.\n\
    \n\n</EXTREMELY_IMPORTANT>\n\nThe following deferred tools are now available via\
    \ ToolSearch. Their schemas are NOT loaded — calling them directly will fail with\
    \ InputValidationError. Use ToolSearch with query \"select:<name>[,<name>...]\"\
    \ to load tool schemas before calling them:\nCronCreate\nCronDelete\nCronList\n\
    EnterPlanMode\nEnterWorktree\nExitPlanMode\nExitWorktree\nMonitor\nNotebookEdit\n\
    PushNotification\nRemoteTrigger\nTaskCreate\nTaskGet\nTaskList\nTaskOutput\nTaskStop\n\
    TaskUpdate\nWebFetch\nWebSearch\nmcp__claude_ai_Gmail__authenticate\nmcp__claude_ai_Gmail__complete_authentication\n\
    mcp__claude_ai_Google_Calendar__authenticate\nmcp__claude_ai_Google_Calendar__complete_authentication\n\
    mcp__claude_ai_Google_Drive__authenticate\nmcp__claude_ai_Google_Drive__complete_authentication\n\
    mcp__ide__executeCode\nmcp__ide__getDiagnostics\n\nThe following skills are available\
    \ for use with the Skill tool:\n\n- bsc-borrowing: BiSheng C borrowing in the\
    \ constrained subset. _Borrow pointers, &_Const (immutable borrow), &_Mut (mutable\
    \ borrow), borrow lifetime rules, freezing semantics, NLL (Non-Lexical Lifetimes),\
    \ borrow type conversions, dereference/member access semantics, borrow function\
    \ signatures on free functions, and the _Borrow _ArrayElem variant for array iteration.\n\
    - bsc-common-mistakes: BiSheng C common mistakes and fixes in the constrained\
    \ subset. Use when encountering compilation errors or debugging pitfalls with\
    \ ownership, borrowing, safe zones, or nullability.\n- bsc-compile: BiSheng C\
    \ compilation in the constrained subset. Compiling .cbs files, compiler path setup,\
    \ include paths, diagnostic suppression flags, syntax checking, source-to-source\
    \ rewriting, and dual-compilation (BSC + standard C) via bsc_compat.h.\n- bsc-constexpr:\
    \ Constexpr variables, constexpr functions, and _Static_assert are available in\
    \ the constrained subset. Type traits (is_integral, etc.) and conditional type\
    \ aliases require generics and are NOT available.\n- bsc-design: BiSheng C design\
    \ and architecture decisions in the constrained subset (ownership + safe zones\
    \ only, no _Owned struct, no generics, no member functions, no traits, no libcbs).\
    \ Load BEFORE writing a plan or implementation that involves new APIs, plain-struct\
    \ types with _Owned _ArrayElem buffers, large-struct heap-box patterns, exposing\
    \ globals through function APIs (decision tree + raw-return escape hatch), ownership\
    \ flow changes, the _Safe/_Unsafe boundary, the layered-helper module pattern,\
    \ the by-value destructor pattern, or the `static inline` rule for one-line per-type\
    \ wrappers. For the OOM-tolerant INVALID-sentinel pattern see the dedicated bsc-invalid-sentinel\
    \ skill.\n- bsc-errors: BiSheng C error codes and diagnostics in the constrained\
    \ subset. Use when you encounter a BSC compiler error (BSC-Exxxx), need to understand\
    \ what an error means, or want to look up fix strategies for the categories that\
    \ apply to this subset (ownership, borrowing, safe-zone, nullability, type system,\
    \ parse-level, constexpr).\n- bsc-initialization: BiSheng C initialization analysis\
    \ in the constrained subset. Uninitialized variable detection, field-level init\
    \ tracking on plain structs, __attribute__((ensure_init)), __assume_initialized,\
    \ array initialization rules, and -uninit-check compiler option.\n- bsc-invalid-sentinel:\
    \ The INVALID-sentinel pattern for OOM-tolerant API design in the constrained\
    \ subset. Use when designing a plain struct with an _Owned _ArrayElem _Nullable\
    \ buffer field that must propagate allocation failure instead of aborting — covers\
    \ the VALID/INVALID state model, constructor/query/mutator/destructor contracts,\
    \ the mandatory defensive null-guard in helpers, and how this replaces _Owned\
    \ struct + destructors that the subset disables.\n- bsc-lsp: BSC code intelligence\
    \ via LSP in the constrained subset. Load this Skill when you need to inspect\
    \ ownership flow, live ranges, borrows, or call graphs in BSC code — e.g. before\
    \ introducing a borrow, tracing where an _Owned variable was moved, or diagnosing\
    \ a borrow-checker error. Explains what BSC-aware clangd returns for plain structs\
    \ + free functions, when it's reliable, and when to fall back to Grep.\n- bsc-nullability:\
    \ BiSheng C non-null pointers and nullability in the constrained subset. _Nullable,\
    \ _Nonnull, nullptr, null-safety checking on _Owned/_Borrow/_Owned _ArrayElem\
    \ pointers, null-check patterns, the _Nullable narrowing-via-reassignment idiom\
    \ for _Owned _ArrayElem, -nullability-check compiler option, and the -Wnullability-completeness\
    \ all-or-none rule.\n- bsc-overview: BiSheng C language overview for the constrained\
    \ subset used in this project (ownership + safe zones only). Lists the available\
    \ features and keywords, the disabled features, and entry-point skills.\n- bsc-ownership:\
    \ BiSheng C ownership system in the constrained subset. _Owned pointers, move\
    \ semantics, _Owned _ArrayElem buffers, _Nullable, ownership transfer rules, plain-struct\
    \ + _Owned field RAII (§7.5), free-and-replace through borrow (§7.6), release-through-borrow\
    \ + the `*slot = nullptr` silent-leak trap (§7.7).\n- bsc-safe-zone: BiSheng C\
    \ safe zones in the constrained subset. _Safe functions, _Safe blocks, _Unsafe\
    \ escape blocks, safe-zone restrictions (initialization, pointers, type casts,\
    \ enum/float conversions, ++/-- semantics), the two orthogonal meanings of _Safe\
    \ (declaration = caller contract, definition = body check), mixed-mode _Safe redeclaration\
    \ of libc (including void *_Borrow for memcpy/memset/memcmp), and user-code mixed-mode\
    \ (_Safe declaration over non-_Safe definition).\n- c-to-bsc-annotation-only:\
    \ BiSheng C dual-build via annotation-only mode in the constrained subset. Use\
    \ when annotating an existing C codebase so the same `.c` / `.h` sources compile\
    \ under BOTH the BSC compiler (with ownership / borrow / safe-zone checks) and\
    \ a standard C compiler (gcc / plain clang). Covers the bsc_compat.h macro shim,\
    \ allowed and forbidden constructs, per-type allocator wrappers, the __bishengc\
    \ guard, the Makefile pattern, and the verification workflow.\n- subset-skill-curation:\
    \ Methodology for adapting a BSC skill collection to a constrained subset. Use\
    \ when a BSC project disables features (e.g. no _Owned struct, no generics, no\
    \ libcbs) and the skill files need to reflect that. Not a BSC technical skill\
    \ — a skill-maintenance process.\n- deep-research: Deep research harness — fan-out\
    \ web searches, fetch sources, adversarially verify claims, synthesize a cited\
    \ report. - When the user wants a deep, multi-source, fact-checked research report\
    \ on any topic. BEFORE invoking, check if the question is specific enough to research\
    \ directly — if underspecified (e.g., \"what car to buy\" without budget/use-case/region),\
    \ ask 2-3 clarifying questions to narrow scope. Then pass the refined question\
    \ as args, weaving the answers in.\n- superpowers:brainstorming: You MUST use\
    \ this before any creative work - creating features, building components, adding\
