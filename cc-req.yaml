      \ success criteria let you loop independently. Weak criteria (\"make it work\"\
      ) require constant clarification.\n\n---\n\n# BiSheng C (BSC) — MUST READ before\
      \ writing any .cbs code\n\n## Pointer Qualifier Grammar (CRITICAL)\n\n`_Owned`\
      \ and `_Borrow` are **pointer qualifiers**, like `const`. They go AFTER `*`,\
      \ NEVER before the type.\n\nGrammar: `base_type *qualifier variable_name`\n\n\
      Think of it like `const`: you write `int *const p`, not `const int* p` for a\
      \ const pointer.\nSame rule: `int *_Owned p`, not `_Owned int* p`.\n\n### Correct\n\
