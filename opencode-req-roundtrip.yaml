ame>\n    <description>Not available in the constrained subset. The project disables _Trait — trait-based polymorphism, _Impl registration, and dynamic dispatch are off-limits. Do not introduce them.</description>\n    <location>file:///home/user/project/.opencode/skills/bsc-trait/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>c-to-bsc</name>\n    <description>BiSheng C translation from C in the constrained subset (ownership + safe zones only, no _Owned struct, no generics, no member functions, no traits, no libcbs). Use when porting C (.c/.h) to BSC, adding ownership annotations, writing per-type allocator wrappers, or setting up the bsc_compat.h dual-compilation shim.</description>\n    <location>file:///home/user/project/.opencode/skills/c-to-bsc/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>customize-opencode</name>\n    <description>Use ONLY when the user is editing or creating opencode's own configuration: opencode.json, opencode.jsonc, files under .opencode/, or files under ~/.config/opencode/. Also use when creating or fixing opencode agents, subagents, skills, plugins, MCP servers, or permission rules. Do not use for the user's own application code, or for any project that is not configuring opencode itself.</description>\n    <location>file:///home/user/project/%3Cbuilt-in%3E</location>\n  </skill>\n  <skill>\n    <name>dispatching-parallel-agents</name>\n    <description>Use when facing 2+ independent tasks that can be worked on without shared state or sequential dependencies</description>\n    <location>file:///home/user/project/superpowers/skills/dispatching-parallel-agents/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>executing-plans</name>\n    <description>Use when you have a written implementation plan to execute in a separate session with review checkpoints</description>\n    <location>file:///home/user/project/superpowers/skills/executing-plans/SKILL.md</location>\n  </skill>\n  <skill>\n    <name>finishing-a-development-bra