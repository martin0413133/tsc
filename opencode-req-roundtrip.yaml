    text: "<skill-instruction>\nBase directory for this skill: /home/user/project/.opencode/skills/bsc-design/\nFile references (@path) in this skill are relative to this directory.\n\n# BiSheng C Design Skill\n\nBSC is not just \"C with annotations\" — the ownership system changes how APIs are shaped.\nThis skill covers design decisions you face when **starting from a blank file**, not when\nporting existing C.\n\n## 1. Rules of Thumb (read this first)\n\nEight rules to consult when designing any BSC API. If you only remember one thing,\nremember **Rule 2**.\n\n### Rule 1 — Return values, borrow arguments\nReturn `_Owned` by value; take `_Borrow` as arguments. Only take `_Owned` arguments when\nthe function truly **consumes** (moves) the value (e.g. `Vec::push`, `set_string`).\n\n```c\n// GOOD: caller keeps ownership, function borrows\n_Safe String format_greeting(const String* _Borrow name);\n\n// BAD: caller must move a value it probably still wants\n_Safe String format_greeting(String name);\n```\n\n### Rule 2 — Make the `_Unsafe` surface as small as possible\nDon't mark whole functions `_Unsafe` just because one line needs it. Wrap the minimum\nwith `_Unsafe { ... }` and keep the function's interface `_Safe`. An `_Unsafe` interface\nis **contagious** — every caller pays the cost.\n\n```c\n/* GOOD: interface _Safe, only the libc call is _Unsafe */\n_Safe size_t strlen_via_libc(const char *_Borrow _ArrayElem s) {\n    size_t n = 0;\n    _Unsafe { n = strlen(s); }\n    return n;\n}\n\n/* BAD: whole function is _Unsafe for one line's sake */\n_Unsafe size_t strlen_via_libc(const char *s) {\n    return strlen(s);\n}\n```\n\n### Rule 3 — Choose `T` vs `T *_Owned` deliberately\n\nThis is a real design decision, not a default. Both are valid; pick based on the type's\nsize, lifetime, and use sites.\n\n**Return `struct T` (by value) when:**\n- The type is **small to medium** (~< few hundred bytes) — moves are cheap.\n- The caller will use it locally and let `name_free` consume it at scope exit.\n- You want zero-allocation construction.\n\n```c\n_Safe struct String str_new(void);                       /* small, local use */\n```\n\n**Return `T *_Owned` (raw owned pointer) when:**\n- The type is **large** — pointer-move is `O(1)`, value-move copies bytes.\n- The result must be **nullable** explicitly without an INVALID-sentinel.\n- The caller's lifetime model needs an explicit pointer hand-off.\n\nFor most types in this subset, value-return + INVALID-sentinel (see §9) covers\nthe nullability need and avoids an extra indirection.\n\n### Rule 4 — Many `_Const` readers OR one `_Mut` writer (never both)\n\n`_Const` borrows compose: any number of immutable borrows can coexist on the same value.\nWhat the checker forbids is **overlapping a `_Mut` with anything else** — another `_Mut`,\nor any `_Const`.\n\n```c\n// FINE: many readers, no writer\nconst T* _Borrow r1 = &_Const x;\nconst T* _Borrow r2 = &_Const x;\nconst T* _Borrow r3 = &_Const x;\nread(r1); read(r2); read(r3);   // all OK\n\n// BAD: writer overlaps reader\nconst T* _Borrow r = &_Const x;\nT* _Borrow w = &_Mut x;          // error: r is still live\nmodify(w);\n\n// BAD: two writers overlap\nT* _Borrow w1 = &_Mut x;\nT* _Borrow w2 = &_Mut x;          // error: w1 is still live\n```\n\n**Design implication:** if your API needs multiple readers, take `const T* _Borrow` and\npass freely. If it needs to mutate, take `T* _Borrow` (mut) and ensure no other borrow is\nlive during the call. If you find yourself wanting overlapping `_Mut` borrows, the design\nis wrong — restructure.\n\n```c\n// COMMON DESIGN ERROR: tries to mut-borrow `val` twice\nJSON_Object* _Borrow obj = val.get_object();   // mut borrow #1\nval.validate(&_Mut schema);                     // mut borrow #2 — conflicts\n\n// FIX: scope the first borrow tightly\n{\n    JSON_Object* _Borrow obj = val.get_object();\n    obj->set_string(...);\n}   // borrow #1 ends here\nval.validate(&_Mut schema);   // now OK\n```\n\n### Rule 5 — By-value destructor pattern\nFor every plain struct that holds one or more `T *_Owned _ArrayElem` fields,\nwrite a destructor function that takes the struct by value and consumes each\n`_Owned` field via the project's `safe_free_*` wrapper.\n\n```c\nstruct String {\n    char *_Owned _ArrayElem _Nullable data;\n    size_t len;\n    size_t cap;\n};\n\n_Safe void str_free(struct String s) {\n    safe_free_chars(s.data);   /* consumes s.data; s falls out cleanly */\n}\n```\n\nThe destructor must be called explicitly on every code path — there is no\nauto-call at scope end.\n\n### Rule 6 — Free functions only\nEvery operation is a free function taking either `struct T *_Borrow s` (read/mutate)\nor `struct T s` (consume/destroy). No method-like organisation exists at the\nlanguage level; pick clear `name_op` prefixes (`str_push`, `str_find`, `str_free`)\nso call sites read naturally.\n\n```c\n_Safe size_t str_len(const struct String *_Borrow s);\n_Safe void   str_push(struct String *_Borrow s, char c);\n_Safe void   str_free(struct String s);\n```\n\n### Rule 7 — Pick the unsafe seam deliberately\nEvery BSC library has at least one `_Unsafe` seam. Place it at the **boundary** where\nBSC's model doesn't match reality:\n\n- **FFI / system calls** (`fopen`, `read`, pointer arithmetic on buffers)\n- **Raw allocator wrappers** (`calloc`/`free` + `__take_array_from_raw` /\n  `__move_array_to_raw` inside one `_Unsafe` block per element type)\n- **Performance-critical hot paths** (where the checker would force unnecessary clones)\n\nLookups that may miss are **not** a seam — return `T *_Borrow _Nullable` (compile-time\nnullability tracking keeps the call site `_Safe`). See Rule 8.\n\nNever put the seam in the middle of business logic.\n\n### Rule 8 — Prefer `_Nonnull`; reach for `_Nullable` only when \"absent\" is real\n\n`_Owned` and `_Borrow` default to `_Nonnull`. Keep them that way unless the API genuinely\nhas a no-result/optional/absent case to represent. `_Nullable` forces every use site to\nnull-check before deref — choosing it when the pointer is never actually null just adds\ncaller burden for no benefit.\n\n**Keep default `_Nonnull`** when:\n- The parameter is required (no \"absent input\" case)\n- The return is always produced when the function returns successfully\n- The struct field is always populated after construction\n\n**Reach for `_Nullable`** when:\n- Allocation may fail and you surface that: `T *_Owned _Nullable try_alloc(size_t)`\n- Cleanup paths hold a pointer that may not have been set: `Node *_Owned _Nullable item = nullptr;`\n- A struct field is legitimately optional\n- A setter accepts \"clear\" as a valid input: `void set_cache(Cache *_Owned _Nullable c)`\n\n```c\n// GOOD — Nonnull by default; caller doesn't null-check\n_Safe void render(const Canvas *_Borrow c, const Frame *_Borrow f);\n\n// GOOD — allocation may fail, nullable surfaces it\n_Safe Buffer *_Owned _Nullable try_create_buffer(size_t n);\n\n// BAD — declared _Nullable out of caution; callers null-check for no reason\n_Safe void render(const Canvas *_Borrow _Nullable c, const Frame *_Borrow _Nullable f);\n```\n\nChanging a pointer's nullability (Nonnull ↔ Nullable) on an existing API is a **breaking\nchange** — every caller's null-check assumption shifts. Decide at design time, not patch time.\n\n> For compile-time nullability tracking mechanics and null-check patterns, see `bsc-nullability` Skill.\n\n### Rule 9 — Concentrate all `_Unsafe` into named semantic helpers; public API is zero-`_Unsafe`\n\nRule 2 applies to individual functions. At the **module level**, apply it one\nlevel up: collect every raw memory operation into a dedicated `static _Safe`\nhelper, each containing exactly one `_Unsafe` block for one semantic operation\n(raw view, raw copy, raw compare, free-through-borrow, etc.). Every public\nfunction is then composed entirely from these helpers with no `_Unsafe` of its\nown.\n\nPer-byte read/write through a `*_Borrow` does NOT need a helper at all — the\n`_Owned _ArrayElem` subscript `s->data[i]` works directly in `_Safe` code (see\n`bsc-ownership` §8). Helpers are only needed for operations that touch raw\nmemory in ways the safe zone forbids (memcpy/memcmp/memmove, `free` of the\nunderlying buffer, raw pointer arithmetic).\n\nThe cleanest layering uses a two-tier split:\n\n- **Bottom tier** (`bsc_str_safe.cbs`): wrappers over `<string.h>` / `<stdlib.h>`\n  that take `char *_Borrow _ArrayElem` parameters and contain one minimal\n  `_Unsafe` each. They are independent of any particular struct.\n- **Top tier** (`bsc_str.cbs`): `static _Safe` helpers that hand-off to the\n  bottom tier via `&_Mut s->data[offset]` / `&_Const s->data[offset]`. **Embed\n  the offset in the subscript at the borrow site** so the wrapper doesn't need\n  an explicit offset argument.\n\n```c\n/* bottom tier — takes a borrow at the exact location, no offset param needed */\n_Safe void safe_memcpy_into(char *_Borrow _ArrayElem dst, const char *src, size_t n) {\n    _Unsafe { char *raw = (char *)&_Mut *dst; memcpy(raw, src, n); }\n}\n_Safe int safe_memcmp_arr(const char *_Borrow _ArrayElem a,\n                          const char *_Borrow _ArrayElem b, size_t n) {\n    int r;\n    _Unsafe {\n        const char *ra = (const char *)&_Const *a;\n        const char *rb = (const char *)&_Const *b;\n        r = memcmp(ra, rb, n);\n    }\n    return r;\n}\n/* exception — memmove inside one buffer takes one borrow + two offsets,\n * because the borrow checker rejects two simultaneous &_Mut into the same buffer */\n_Safe void safe_memmove_within(char *_Borrow _ArrayElem buf,\n                               size_t dst_off, size_t src_off, size_t n) {\n    _Unsafe { char *raw = (char *)&_Mut *buf; memmove(raw + dst_off, raw + src_off, n); }\n}\n\n/* top tier — zero _Unsafe; offset goes into the subscript */\nstatic _Safe void str__write_raw(struct String *_Borrow s, size_t offset,\n                                 const char *src,\
      \ size_t n) {\n    safe_memcpy_into(&_Mut s->data[offset], src, n);\n}\nstatic _Safe int str__cmpn(const struct String *_Borrow a,\n                           const struct String *_Borrow b, size_t n) {\n    return safe_memcmp_arr(&_Const a->data[0], &_Const b->data[0], n);\n}\n\n/* public API — zero _Unsafe; subscript reads/writes are inlined */\n_Safe void str_to_upper(struct String *_Borrow s) {\n    for (size_t i = 0; i < s->len; i++) {\n        char c = s->data[i];                                   /* direct subscript */\n        if (c >= 'a' && c <= 'z') s->data[i] = (char)(c - 'a' + 'A');\n    }\n}\n```\n\nBenefits of this factoring:\n\n- **Auditability**: the full `_Unsafe` surface of the module is the list of\n  helpers. An auditor can read ~8 short functions and cover all unsafe code.\n- **Testability**: each helper has one responsibility and can be exercised\n  through the public API that calls it.\n- **Composition safety**: public functions are fully `_Safe` — they can be\n  called from any safe context, and their callers do not become `_Unsafe` just\n  because the implementation touches raw memory.\n- **Easy extension**: adding a new public function means writing safe code only;\n  the set of raw operations is already enumerated.\n\n---\n\n## 2. Designing Types\n\n### Choose the type shape\n\n| Your type has... | Use |\n|---|---|\n| Plain data (no heap pointers, no cleanup) | Plain `struct` with scalar fields only |\n| One heap buffer of a single element type, supports `[]` | Plain `struct` with `T *_Owned _ArrayElem _Nullable` field (see `bsc-ownership` §7.5) + `name_free` consumer |\n| Multiple heap buffers | Plain struct with several `T *_Owned _ArrayElem` fields; the `name_free` consumer must release each |\n| A closed set of variants | Plain `struct` with a tag enum + one field per variant (all variants always initialised; destructor frees them all). |\n\n### Tagged-struct cost for variant types\n\nA plain struct with `{tag, var_a, var_b, var_c}` keeps every variant's storage\nlive at once. For variants holding heap buffers, the constructor must allocate\neach one (even if the active tag uses only one) so the destructor can free them\nall uniformly. Memory cost grows with the number of variants; accept the cost or\nrestructure to avoid the union pattern.\n\n### Destructor (consumer-function) design\n\nThe destructor is a free function that takes the struct by value and consumes\nevery `_Owned` field. It is not auto-called; every code path must invoke it.\n\nFor non-memory resources (file handles, sockets, locks), declare the resource\nfield `_Owned` and re-declare the libc creator/destroyer as `_Safe` with\nownership qualifiers (mixed-mode `_Safe` redeclaration — see `bsc-safe-zone`\n§5). The borrow checker then tracks the handle exactly like a heap buffer,\npreventing leaks and double-close at compile time.\n\n```c\n/* Mixed-mode _Safe redeclaration of libc — tells the borrow checker\n * that fopen produces an owned resource and fclose consumes one. */\n_Safe FILE *_Owned _Nullable fopen(const char *_Borrow _ArrayElem path,\n                                   const char *_Borrow _ArrayElem mode);\n_Safe int fclose(FILE *_Owned fp);\n\nstruct FileHandle {\n    FILE *_Owned _Nullable fp;   /* tracked as owned; null on closed state */\n};\n\n_Safe struct FileHandle filehandle_open(const char *_Borrow _ArrayElem path) {\n    return (struct FileHandle){ .fp = fopen(path, \"r\") };\n}\n\n_Safe void filehandle_close(struct FileHandle h) {\n    if (h.fp == nullptr) return;\n    FILE *_Owned fp = h.fp;          /* narrow nullable → nonnull */\n    (void)fclose(fp);                /* consumes fp; no _Unsafe needed */\n}\n```\n\nCases that require an explicit destructor body:\n\n- Heap buffers held by `T *_Owned _ArrayElem` → call `safe_free_T(s.field)`.\n- Foreign resources (`FILE *`, sockets, locks) → declare the field `_Owned`\n  and use a `_Safe`-redeclared destroyer that consumes the `_Owned` value.\n- Side-effect logic (logging, notifying) before release.\n\n---\n\n## 3. Designing APIs\n\n### Value-in, value-out vs. borrow-in, borrow-out\n\n```c\n// Pattern A: ownership transfer\n_Safe JSON_Object JSON_Object::new(void);            // produces owned value\n_Safe void Obj::set_value(Obj* _Borrow this, JSON_Value v);  // consumes `v`\n\n// Pattern B: read-only access\n_Safe const String* _Borrow Obj::get_name(const Obj* _Borrow this, size_t i);\n_Safe size_t Obj::get_count(const Obj* _Borrow this);\n\n// Pattern C: mutation via borrow\n_Safe void Obj::clear(Obj* _Borrow this);\n```\n\n**Rule:** read → `_Borrow this` + `_Borrow` returns. Mutate → `_Borrow this` (mut)\n+ `void` return or status code. Construct → `_Owned` return, no `this`.\n\n### Returning `_Borrow` that depends on a local\n\nThis bites everyone eventually. If you compute a local `String` and want to return a\n`_Borrow` to something looked up through it, the checker rejects it because the local\ndies at scope exit.\n\n**Three legitimate fixes:**\n\n1. **Restructure** — take the key by borrow from the caller:\n   ```c\n   _Safe T* _Borrow lookup(Table* _Borrow t, const String* _Borrow key);\n   ```\n\n2. **Recursion** — if the local is a transformation of an input, pass the transformed\n   value into a recursive call where its lifetime is self-contained.\n\n3. **Minimal `_Unsafe` seam** — for lookups that the checker can't model (hash-map hits),\n   cast through a raw pointer inside a tight `_Unsafe` block. Document why. (Parson's\n   `dotget_value` does this.)\n\n### Constructor pattern\n\nUse `name_new` / `name_with_capacity` / `name_from_cstr` as the convention:\n\n```c\n_Safe struct String str_new(void);\n_Safe struct String str_with_capacity(size_t cap);\n_Safe struct String str_from_cstr(const char *_Borrow _ArrayElem s);\n```\n\nConstructors return the struct by value. On allocation failure they return an\nINVALID instance (see §9) rather than aborting.\n\n---\n\n## 4. Designing Ownership Flow\n\n### Where ownership lives\n\nFor every heap allocation, decide: **who owns it, for how long, and how does it\nget freed?** Then make the types reflect the answer.\n\n```c\n/* Owner: the struct. Lifetime: until str_free(s) is called. */\nstruct String { char *_Owned _ArrayElem _Nullable data; size_t len, cap; };\n\n/* Owner: the caller of str_push. The char is copied; no transfer. */\n_Safe void str_push(struct String *_Borrow s, char c);\n\n/* Owner: the struct. Returned as a borrow for read-only use. */\n_Safe const char *_Nullable str_as_cstr(const struct String *_Borrow s);\n```\n\n### Move semantics at API edges\n\nWhen a function takes `T *_Owned` or `struct T` by value, the caller loses access\nto the variable after the call. Design so the caller either:\n\n- **Moves it in deliberately** (e.g. `str_free(s)` — `s` is consumed)\n- **Clones first** if they need to keep using the value (`str_clone(&_Const s)`)\n\nDon't have \"sometimes consumes, sometimes doesn't\" functions — pick one.\n\n### Sharing\n\nSingle ownership only. If two places need to read the same value, pass each one\na `*_Borrow`. If two places need to write, redesign the data flow so only one\nwriter exists at a time. There is no shared-ownership primitive in this subset.\n\n---\n\n## 5. Designing the `_Safe` / `_Unsafe` boundary\n\n### Pick the boundary at design time, not during debugging\n\nBefore writing code, list which functions will be `_Safe` and which `_Unsafe`. Common\nlibrary structure:\n\n```\nPublic API (.hbs)\n  ├── _Safe for 90% of the surface\n  └── _Unsafe for:\n        - Constructors that take raw C strings (const char*)\n        - Functions that interop with existing C libraries\n        - Destructors that close system resources\n\nInternal impl (.cbs)\n  ├── _Safe where the model permits\n  └── _Unsafe blocks (NOT whole functions) for:\n        - pointer arithmetic\n        - aliasing that the checker over-rejects\n```\n\n### When to use `_Unsafe` blocks inside `_Safe` functions\n\nTotally legitimate when:\n\n- You need `printf`/`puts` (formatted output is considered unsafe in BSC)\n- You're doing pointer arithmetic over a known-safe buffer (`string->get(i)` returning a raw char pointer)\n- You're casting between `_Owned` and raw for `__take_from_raw` / `__move_to_raw` (C FFI)\n\nNot legitimate for:\n\n- Skipping the borrow checker because it's \"annoying\"\n- Bypassing a diagnostic you don't understand — figure out why it fires first\n\n---\n\n## 6. Anti-Patterns\n\n### Anti-pattern: `_Unsafe` all the way down\nSymptom: every function is `_Unsafe`. You're writing C with a .cbs extension.\nFix: mark the public API `_Safe` and push the `_Unsafe` parts into blocks inside each\nfunction. The checker still helps you at the boundaries.\n\n### Anti-pattern: God struct\nSymptom: one plain struct with 15 fields, most unused in most code paths.\nFix: split into smaller structs composed via `_Owned _ArrayElem` fields. Each\nsub-struct gets its own `name_free` consumer.\n\n### Anti-pattern: returning raw `T*` instead of `T *_Borrow`\nSymptom: a lookup returns `T*` (raw) instead of `T *_Borrow`, forcing callers into\n`_Unsafe` just to use it.\nFix: if the function always succeeds, return `T *_Borrow`. If it can fail, return\n`T *_Borrow _Nullable` — compile-time nullability tracking keeps callers `_Safe` while\nrepresenting the miss case.\n\n### Anti-pattern: destructor that does too much\nSymptom: destructor reaches into unrelated subsystems, calls logging, modifies global state.\nFix: destructors should only release resources owned by `this`. Side effects belong\nin explicit methods the caller invokes.\n\n### Anti-pattern: designing for C first, then \"porting\"\nSymptom: you wrote a C-style API (`Buffer* parse(const char*)`) and are now\nfighting the borrow checker.\nFix: start from the BSC types (`struct Buffer parse(const char *_Borrow _ArrayElem)`)\nand let the signatures drive the implementation.\n\n---\n\n## 7. A Worked Example\n\nA simple string\
      \ library, designed subset-first:\n\n```c\n/* bsc_str.hbs */\nstruct String {\n    char *_Owned _ArrayElem _Nullable data;   /* nullptr → INVALID */\n    size_t len;\n    size_t cap;\n};\n\n_Safe _Bool         str_is_valid(const struct String *_Borrow s);\n_Safe struct String str_new(void);\n_Safe struct String str_from_cstr(const char *_Borrow _ArrayElem s);\n_Safe void          str_free(struct String s);            /* destructor */\n_Safe size_t        str_len(const struct String *_Borrow s);\n_Safe void          str_push(struct String *_Borrow s, char c);\n_Safe _Bool         str_eq(const struct String *_Borrow a,\n                           const struct String *_Borrow b);\n```\n\nDesign notes:\n\n- **Rule 1:** constructors return by value; mutators take `*_Borrow`; readers\n  take `const *_Borrow`.\n- **Rule 5:** `str_free(s)` is the consumer destructor — explicit.\n- **Rule 6:** every operation is a free function — no member-function syntax.\n- **Rule 9:** all raw `memcpy`/`memcmp`/`free` calls live in `static _Safe` helpers\n  inside one `_Unsafe` block each; public API has zero `_Unsafe`.\n- **§9:** on OOM, constructors return `{nullptr, 0, 0}`; mutators on INVALID silently\n  no-op; `str_is_valid` is the validity test.\n\n---\n\n## 8. Quick Reference\n\n| Question | Answer |\n|---|---|\n| Should I return `struct T` or `T *_Owned`? | Value for small/medium with INVALID-sentinel for nullability; `*_Owned` for large or when an explicit pointer hand-off is needed |\n| Should I take `struct T`, `T *_Owned`, or `T *_Borrow`? | `_Borrow` for read, mut-`_Borrow` for modify, by-value for consume/destroy |\n| Should this be `_Safe` or `_Unsafe`? | `_Safe` unless you can't — then wrap `_Unsafe` blocks inside |\n| Do I need a destructor body? | Yes — every `_Owned _ArrayElem` field needs explicit release in a `name_free(struct T s)` consumer |\n| How to signal \"absent\" / OOM? | INVALID-sentinel pattern (§9) — return a struct with `data = nullptr` |\n\nBefore you write a single line: sketch the types, annotate who owns what,\ndecide where the `_Unsafe` seams go. The code almost writes itself after that.\n\n## 9. OOM-tolerant API design: the INVALID-sentinel pattern\n\nWhen a library must propagate allocation failure instead of aborting, use the\n**INVALID-sentinel pattern**. Every struct with an `_Owned _ArrayElem _Nullable`\nbuffer field has two states: **VALID** (buffer non-null, invariants hold) and\n**INVALID** (buffer is `nullptr`, all size fields are 0).\n\n### Type declaration\n\n```c\nstruct String {\n    char *_Owned _ArrayElem _Nullable data;  /* nullptr means INVALID */\n    size_t len;\n    size_t cap;\n};\n```\n\n### Interface rules\n\n| Category | Rule |\n|---|---|\n| Constructor | Return `{.data = nullptr, .len = 0, .cap = 0}` on OOM |\n| Validity test | `_Safe _Bool name_is_valid(const struct T *_Borrow s)` — checks `s->data != nullptr` |\n| Queries | Return a safe default (`0`, `false`, sentinel, `nullptr`) when `s->data == nullptr` |\n| Mutators | Silent no-op when `s->data == nullptr`; also no-op on internal alloc failure |\n| Destructor | By-value consumer; underlying `safe_free` is null-safe — no-op on INVALID |\n\n### Defensive null-guards in helpers\n\nA helper annotated `/* PRECOND: s is VALID */` still cannot subscript\n`s->data[i]` if `data` is typed `_Nullable` — the compiler rejects the\ndereference regardless of the documented precondition. Every helper that touches\n`data` needs a defensive guard:\n\n```c\nstatic _Safe void str__write_raw(struct String *_Borrow s, size_t offset,\n                                 const char *_Borrow _ArrayElem src, size_t n) {\n    if (s->data == nullptr) return;   /* satisfies the type checker */\n    safe_memcpy_into(&_Mut s->data[offset], src, n);\n}\n```\n\nThis guard will never fire at runtime when callers honour the precondition, but\nit is required to compile. It is the unavoidable cost of a `_Nullable` field.\n\n### Destruction is always mandatory\n\nEven INVALID instances hold a consumed `_Owned _ArrayElem _Nullable` slot. The\ncompiler still requires the destructor to be called. Because `safe_free` is\nnull-safe, the destructor is a no-op on INVALID instances with no special casing:\n\n```c\n_Safe void str_free(struct String s) {\n    safe_free_chars(s.data);   /* no-op when data == nullptr */\n}\n```\n\nCallers must call `str_free` even after a constructor returns INVALID.\n</skill-instruction>\n\n<user-request>\n帮我基于此项目 继续开发出bsc的ftp服务器需求 \n</user-request>"
